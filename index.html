// ─────────────────────────────────────────────────────────────────────────────
// TAB: PLAYGROUND — Zoho (source of truth) vs Manual scenario, with Approve & Push flow
// ─────────────────────────────────────────────────────────────────────────────
// Detect whether a deal has any manual override that differs from Zoho's snapshot.
// Returns an object with per-field diffs (each can be null = no diff) plus a boolean any.
function playgroundDiff(d) {
  var diff = { hc: null, mrr: null, win: null, margin: null, any: false };
  // HC override: Zoho stores a single Total Headcount; the playground stores monthly HC. Compare totals.
  var playHc = sumMonths(d.monthlyHC || {});
  if (d.zoho_totalHC !== null && d.zoho_totalHC !== undefined && Math.abs(playHc - d.zoho_totalHC) > 0.5) {
    diff.hc = { zoho: d.zoho_totalHC, play: playHc };
    diff.any = true;
  }
  // MRR override: user typed an mrrAureum that differs from the Zoho MRR (pricing).
  // Filling a gap (Zoho=0, Aureum>0) is NOT an override — it's just providing a value.
  if (d.mrrAureum > 0 && d.pricing > 0 && Math.abs(d.mrrAureum - d.pricing) > 0.5) {
    diff.mrr = { zoho: d.pricing, play: d.mrrAureum };
    diff.any = true;
  }
  // Win Rate override: current winRateAdj differs from snapshot of Zoho probability.
  if (d.zoho_winRateAdj !== null && d.zoho_winRateAdj !== undefined && d.winRateAdj !== undefined && Math.abs(d.winRateAdj - d.zoho_winRateAdj) > 0.005) {
    diff.win = { zoho: d.zoho_winRateAdj, play: d.winRateAdj };
    diff.any = true;
  }
  // Margin override: user typed a marginOverride that differs from Zoho's Target_Margin_Band.
  if (d.marginOverride !== undefined && d.marginOverride !== null && d.marginOverride !== '') {
    var ov = parseFloat(d.marginOverride);
    var z = (d.zohoMargin !== undefined && d.zohoMargin !== null) ? parseFloat(d.zohoMargin) : null;
    if (z === null || Math.abs(ov - z) > 0.005) {
      diff.margin = { zoho: z, play: ov };
      diff.any = true;
    }
  }
  return diff;
}
function dealHasPlaygroundEdits(d) { return playgroundDiff(d).any; }
function toggleApproved(idx) {
  var deals = getDeals();
  if (!deals[idx]) return;
  deals[idx].approved = !deals[idx].approved;
  if (deals[idx].approved) deals[idx].approvedBy = (currentUser && currentUser.name) || ''; else { delete deals[idx].approvedBy; }
  setDeals(deals);
  logActivity('Playground', deals[idx].approved ? 'Approve for push' : 'Unapprove', deals[idx].dealName);
  renderTab();
}
function revertPlayground(idx) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  if (!confirm('Revert this deal\'s playground edits and use Zoho values?\n\nThis clears MRR Aureum override, Margin Override, and resets Win % to Zoho\'s probability.')) return;
  if (d.mrrAureum > 0 && d.pricing > 0) d.mrrAureum = 0;
  d.marginOverride = undefined;
  if (d.zoho_winRateAdj !== null && d.zoho_winRateAdj !== undefined) d.winRateAdj = d.zoho_winRateAdj;
  d.approved = false; delete d.approvedBy;
  setDeals(deals);
  renderTab();
}
// Push approved playground edits back to Zoho via PATCH /Deals/{id}.
// Requires ZohoCRM.modules.Deals.WRITE scope on the OAuth app + the user re-authorized.
// If scope is missing, Zoho returns 401/INVALID_OAUTH/OAUTH_SCOPE_MISMATCH and we surface clearly.
function pushApprovedToZoho() {
  var token = getZohoToken();
  if (!token) { alert('Connect Zoho first (click the Zoho pill in the header).'); return; }
  var deals = getDeals();
  var approved = deals.filter(function(d){ return d.approved && d.zohoId && dealHasPlaygroundEdits(d); });
  if (!approved.length) { alert('No approved deals with pending changes to push.'); return; }

  var preview = approved.slice(0, 5).map(function(d){
    var diff = playgroundDiff(d);
    var bits = [];
    if (diff.hc)     bits.push('HC ' + diff.hc.zoho + '→' + diff.hc.play);
    if (diff.mrr)    bits.push('MRR ' + fmt$k(diff.mrr.zoho) + '→' + fmt$k(diff.mrr.play));
    if (diff.win)    bits.push('Win ' + fmtPct(diff.win.zoho) + '→' + fmtPct(diff.win.play));
    if (diff.margin) bits.push('Margin ' + (diff.margin.zoho !== null ? fmtPct(diff.margin.zoho) : '—') + '→' + fmtPct(diff.margin.play));
    return '  • ' + d.dealName + ': ' + bits.join(', ');
  }).join('\n');
  var more = approved.length > 5 ? '\n  ... and ' + (approved.length - 5) + ' more' : '';

  if (!confirm('Push ' + approved.length + ' approved deal(s) to Zoho?\n\n' + preview + more + '\n\nThis will UPDATE the records in Zoho CRM (write operation).')) return;

  var btn = document.querySelectorAll('.btn-gold');
  // Disable all gold buttons during push
  var pushBtn = null;
  for (var i = 0; i < btn.length; i++) { if (btn[i].textContent.indexOf('Push approved') >= 0) { pushBtn = btn[i]; break; } }
  if (pushBtn) { pushBtn.disabled = true; pushBtn.textContent = 'Pushing 0/' + approved.length + '…'; }

  var pushed = 0, failed = 0, errors = [], done = 0;
  approved.forEach(function(d) {
    var diff = playgroundDiff(d);
    var payload = {};
    if (diff.hc)     payload[ZOHO_HC_FIELD]     = diff.hc.play;
    if (diff.mrr)    payload[ZOHO_MRR_FIELD]    = diff.mrr.play;
    if (diff.win)    payload.Probability         = Math.round(diff.win.play * 100);
    if (diff.margin) payload[ZOHO_MARGIN_FIELD] = Math.round(diff.margin.play * 100) + '%';

    zohoPatchDeal(token, d.zohoId, payload, function(err, _resp) {
      done++;
      if (err) {
        failed++;
        errors.push((d.dealName || d.zohoId) + ' — ' + err.message);
      } else {
        pushed++;
        // Update snapshots to the new Zoho-side values so the diff clears.
        if (diff.hc)     d.zoho_totalHC     = diff.hc.play;
        if (diff.mrr)    d.pricing          = diff.mrr.play;
        if (diff.win)    d.zoho_winRateAdj  = diff.win.play;
        if (diff.margin) d.zohoMargin       = diff.margin.play;
        d.approved = false; delete d.approvedBy;
        d.pushedAt = new Date().toISOString();
        d.pushedBy = (currentUser && currentUser.name) || '';
      }
      if (pushBtn) pushBtn.textContent = 'Pushing ' + done + '/' + approved.length + '…';
      if (done === approved.length) {
        setDeals(deals);
        if (pushBtn) { pushBtn.disabled = false; pushBtn.textContent = '↗ Push approved to Zoho'; }
        var msg = pushed + ' deal(s) updated in Zoho.';
        if (failed) {
          msg += '\n\n' + failed + ' failed:\n' + errors.slice(0, 5).join('\n');
          if (errors.length > 5) msg += '\n…and ' + (errors.length - 5) + ' more';
          if (/401|INVALID_TOKEN|OAUTH_SCOPE|INVALID_OAUTH|forbidden|403/i.test(errors.join(' '))) {
            msg += '\n\n⚠ Looks like the Zoho OAuth app is missing the Deals.WRITE scope.\n' +
                   '  1. Have the Zoho admin add ZohoCRM.modules.Deals.WRITE to the OAuth client at api-console.zoho.com.\n' +
                   '  2. Click the Zoho pill in the header → Disconnect → Connect (you\'ll be asked to grant write access).\n' +
                   '  3. Try Push again.';
          } else if (/INVALID_DATA|MANDATORY_NOT_FOUND|invalid|not present|no such|field/i.test(errors.join(' '))) {
            msg += '\n\n⚠ A field name may be wrong. Confirm the API names in Settings (MRR / Probability / Target_Margin_Band / Total_Headcount).';
          }
        }
        logActivity('Zoho', 'Push to Zoho', pushed + ' updated · ' + failed + ' failed');
        alert(msg);
        renderTab();
      }
    });
  });
}

function renderCleanup() {
  var deals = getDeals();

  var ghosts = deals.filter(function(d){ return !d.zohoId; });

    document.getElementById('mainContent').innerHTML = html;

  }

  // No "best guess" — show them all so the user can decide.
  var rows = ghosts.map(function(g) {
    var actives = zohoDeals.filter(function(z){ return g.client && z.client && clientSimilar(g.client, z.client); });
    var losts   = lostDeals.filter(function(z){ return g.client && z.client && clientSimilar(g.client, z.client); });
    return { ghost: g, gIdx: deals.indexOf(g), actives: actives, losts: losts };
  });
  // Sort: ghosts with NO candidates last; otherwise alphabetical by client
  rows.sort(function(a, b) {
    var ac = (a.actives.length + a.losts.length) > 0 ? 0 : 1;
    var bc = (b.actives.length + b.losts.length) > 0 ? 0 : 1;
    if (ac !== bc) return ac - bc;
    return (a.ghost.client || '').toLowerCase() < (b.ghost.client || '').toLowerCase() ? -1 : 1;
  });

  html += '<div class="card" style="padding:6px"><div class="scroll-x"><table class="grid-tbl" style="min-width:1200px"><thead><tr>';
  html += '<th style="width:25%">Not-in-Zoho Deal</th><th>Client (Excel)</th><th>Stage</th>';
  html += '<th style="width:45%">Zoho deals in the same account → pick one to merge into</th>';
  html += '<th>Action</th>';
  html += '</tr></thead><tbody>';
  rows.forEach(function(r) {

    html += '<td><b>' + esc(g.dealName) + '</b></td>';
    html += '<td>' + esc(g.client || '—') + '</td>';

      r.actives.forEach(function(c) {
        var idx = deals.indexOf(c);
        var url = dealZohoUrl(c);
        html += '<div style="margin-bottom:5px;padding:6px 9px;background:var(--bg);border-radius:5px;border-left:3px solid var(--success)">';
        html += '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--navy);font-weight:600;text-decoration:none">' + esc(c.dealName) + ' ↗</a>';
        html += ' ' + stagePill(c.stage);
        if (c.bde) html += ' <span style="color:var(--muted);font-size:11px">· ' + esc(c.bde) + '</span>';
        html += ' <button class="btn btn-gold btn-sm" style="margin-left:8px" onclick="mergeCleanup(' + r.gIdx + ',' + idx + ')" title="Merge this Excel row into the Zoho deal">Merge →</button>';
        html += '</div>';
      });
      r.losts.forEach(function(c) {
        var url = dealZohoUrl(c);

  document.getElementById('mainContent').innerHTML = html;

function mergeCleanup(ghostIdx, candidateIdx) {

  html += '<div class="card"><div class="card-header"><span class="card-title">Team members</span><span class="card-sub">' + emails.length + ' have signed in to the platform</span></div>';
  if (!emails.length) {
    html += '<div class="empty">No team members tracked yet. They appear here on first sign-in.</div></div>';
    return html;
  }
  // Sort: admins first, then active, then by lastSeen desc.
  emails.sort(function(a, b) {
    var ua = users[a], ub = users[b];
    var aa = isAdmin({email:a, role:ua.role}) ? 0 : 1;
    var ba = isAdmin({email:b, role:ub.role}) ? 0 : 1;
    if (aa !== ba) return aa - ba;
    return (ub.lastSeen || '').localeCompare(ua.lastSeen || '');
  });
  html += '<table><thead><tr><th>Member</th><th>Email</th><th>Role</th><th>Last active</th><th>Status</th><th>Admin</th><th></th></tr></thead><tbody>';
  emails.forEach(function(e) {
    var u = users[e];
    var status = userStatus(u.lastSeen);
    var statusCls = status === 'active' ? 'pill-green' : 'pill-gray';
    var isHardcoded = (function(){ var hc = false; Object.keys(USERS).forEach(function(k){ if (USERS[k].email.toLowerCase() === e.toLowerCase()) hc = true; }); return hc; })();
    var isUserAdmin = isAdmin({ email: e, role: u.role });
    var youBadge = (currentUser && currentUser.email && currentUser.email.toLowerCase() === e.toLowerCase()) ? ' <span class="pill pill-gold" style="font-size:9px;margin-left:4px">YOU</span>' : '';
    html += '<tr>';
    html += '<td><b>' + esc(u.name || e) + '</b>' + youBadge + '<div style="font-size:11px;color:var(--muted)">' + u.loginCount + ' login' + (u.loginCount === 1 ? '' : 's') + ' · since ' + new Date(u.firstSeen).toLocaleDateString() + '</div></td>';
    html += '<td style="color:var(--muted);font-size:11.5px">' + esc(e) + '</td>';
    html += '<td><span class="pill ' + (u.role === 'manager' ? 'pill-blue' : 'pill-gray') + '" style="font-size:10px">' + esc(u.role || 'bde').toUpperCase() + '</span></td>';
    html += '<td style="color:var(--muted);font-size:11.5px">' + timeAgo(u.lastSeen) + '</td>';
    html += '<td><span class="pill ' + statusCls + '" style="font-size:10px">' + (status === 'active' ? '● ACTIVE' : '● IDLE') + '</span></td>';
    html += '<td>' + (isUserAdmin ? '<span class="pill pill-gold" style="font-size:10px">★ ADMIN</span>' : '<span style="color:var(--muted);font-size:11px">—</span>') + '</td>';
    html += '<td>';
    if (isHardcoded) {
      html += '<span style="font-size:10.5px;color:var(--muted)" title="Hardcoded in USERS map — cannot revoke from UI">code-defined</span>';
    } else if (isUserAdmin) {
      html += '<button class="btn btn-ghost btn-sm" onclick="revokeAdmin(\'' + esc(e) + '\')">Revoke admin</button>';
    } else {
      html += '<button class="btn btn-ghost btn-sm" onclick="grantAdmin(\'' + esc(e) + '\')">Grant admin</button>';
    }
    html += '</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}
function grantAdminFromInput() {
  var input = document.getElementById('adminEmailInput');
  var email = (input && input.value || '').trim().toLowerCase();
  if (!email) return;
  if (!/@aspenview\.com$/i.test(email)) { alert('Only @aspenview.com emails can be granted admin.'); return; }
  grantAdmin(email);
  if (input) input.value = '';
}
function grantAdmin(email) {
  email = email.toLowerCase();
  var list = getAdminExtra();
  if (list.indexOf(email) >= 0) { alert(email + ' already has admin access.'); return; }
  list.push(email);
  setAdminExtra(list);
  logActivity('Admin', 'Grant admin', email);
  renderTab();
  renderTopNav();
}
function revokeAdmin(email) {
  email = email.toLowerCase();
  if (!confirm('Revoke admin access for ' + email + '?')) return;
  var list = getAdminExtra().filter(function(e){ return e !== email; });
  setAdminExtra(list);
  logActivity('Admin', 'Revoke admin', email);
  renderTab();
  renderTopNav();
}

function sourceClass(source) {
  var s = (source || '').toLowerCase();
  if (s === 'zoho')      return 'background:#fff4d6;color:#946700';
  if (s === 'firestore' || s === 'firebase') return 'background:#fde2e2;color:#9a2222';
  if (s === 'auth')      return 'background:#e3effd;color:#1d4a86';
  if (s === 'admin')     return 'background:#fdf6e6;color:#946700';
  if (s === 'forecast')  return 'background:#e6f4ea;color:#1b6232';
  return 'background:#eef2f6;color:#5a6a7a';
}

function adminActivitySection(activity) {
  var html = '';
  html += '<div class="card"><div class="card-header"><span class="card-title"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2e7d32;animation:pulse 1.6s infinite;vertical-align:middle;margin-right:6px"></span>Activity Stream</span><span class="card-sub">Last ' + Math.min(activity.length, 50) + ' events · updates in real-time</span></div>';
  if (!activity.length) {
    html += '<div class="empty">No activity recorded yet. Try syncing Zoho or taking a snapshot.</div></div>';
    return html;
  }
  html += '<table><thead><tr><th>Source</th><th>Action</th><th>Details</th><th>Actor</th><th>When</th></tr></thead><tbody>';
  activity.slice().reverse().slice(0, 50).forEach(function(ev) {
    html += '<tr>';
    html += '<td><span style="display:inline-block;padding:3px 9px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;' + sourceClass(ev.source) + '">' + esc(ev.source) + '</span></td>';
    html += '<td><b>' + esc(ev.action) + '</b></td>';
    html += '<td style="font-size:11.5px;color:var(--muted)">' + esc(ev.details) + '</td>';
    html += '<td style="font-size:11.5px;color:var(--muted)">' + esc(ev.actor) + '</td>';
    html += '<td style="font-size:11px;color:var(--muted);white-space:nowrap" title="' + esc(ev.ts) + '">' + timeAgo(ev.ts) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function adminErrorsSection(errors) {
  var html = '';
  // Counts by integration & code
  var bySource = {}, byCode = {};
  errors.forEach(function(e){
    bySource[e.source] = (bySource[e.source] || 0) + 1;
    byCode[e.code]     = (byCode[e.code] || 0) + 1;
  });
  html += '<div class="stat-grid" style="margin-bottom:14px">';
  Object.keys(bySource).sort(function(a,b){ return bySource[b] - bySource[a]; }).slice(0,3).forEach(function(s){
    html += statCard(s, bySource[s], 'errors logged', 'gold');
  });
  if (!Object.keys(bySource).length) html += statCard('No errors', '0', 'all integrations healthy', 'good');
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Error Log</span><span class="card-sub">' + errors.length + ' logged · most recent first</span>';
  if (errors.length) html += ' <button class="btn btn-ghost btn-sm" style="margin-left:10px" onclick="clearErrorLog()">Clear log</button>';
  html += '</div>';
  if (!errors.length) {
    html += '<div class="empty">No errors logged. Zoho / Firestore failures will appear here automatically.</div></div>';
    return html;
  }
  html += '<table><thead><tr><th>Code</th><th>Source</th><th>What happened</th><th>Endpoint</th><th>Actor</th><th>When</th></tr></thead><tbody>';
  errors.slice().reverse().forEach(function(ev) {
    html += '<tr>';
    html += '<td><span class="pill pill-red" style="font-size:10px">' + esc(ev.code) + '</span></td>';
    html += '<td><span style="display:inline-block;padding:3px 9px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;' + sourceClass(ev.source) + '">' + esc(ev.source) + '</span></td>';
    html += '<td style="font-size:11.5px">' + esc(ev.message) + '</td>';
    html += '<td style="font-size:11.5px;color:var(--muted);font-family:monospace">' + esc(ev.endpoint) + '</td>';
    html += '<td style="font-size:11.5px;color:var(--muted)">' + esc(ev.actor) + '</td>';
    html += '<td style="font-size:11px;color:var(--muted);white-space:nowrap" title="' + esc(ev.ts) + '">' + timeAgo(ev.ts) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}
function clearErrorLog() {
  if (!confirm('Clear all logged errors? They will not be recoverable.')) return;
  setErrorLog([]);
  logActivity('Admin', 'Clear error log', '');
  renderTab();
}

function renderSettings() {
  var lastSync = load('last_zoho_sync', null);
  var html = '';
  html += '<div class="page-title"><div><h1>Settings</h1><div class="sub">Integration, data management, and export</div></div></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Zoho CRM Integration</span></div>';
  html += '<div style="font-size:12.5px;color:var(--muted);line-height:1.6">';
  html += 'Status: <b style="color:' + (getZohoToken() ? 'var(--success)' : 'var(--danger)') + '">' + (getZohoToken() ? 'Connected' : 'Disconnected') + '</b>';
  if (lastSync) html += ' &middot; Last sync: ' + new Date(lastSync).toLocaleString();
  html += '<br><br>To enable: register an OAuth app at <code>api-console.zoho.com</code>, add the redirect URI <code>' + esc(ZOHO_REDIRECT) + '</code>, and replace <code>REPLACE_WITH_ZOHO_CLIENT_ID</code> in <code>index.html</code>.';
  html += '<br><br><b>Field mapping</b> (from Zoho Deals module):<br>';
  html += '<ul style="padding-left:22px;margin-top:6px"><li><code>Deal_Name</code> → Deal Name</li><li><code>Account_Name</code> → Client</li><li><code>Stage</code> → Stage (normalized)</li><li><code>Amount</code> → Pricing</li><li><code>Probability</code> → Adjusted Win Rate</li><li><code>Closing_Date</code> → First Billable / Activation Month</li><li><code>Description</code> → Commercial Description (margin signal)</li></ul>';
  html += '</div>';
  html += '<div style="margin-top:12px">';
  html += getZohoToken() ? '<button class="btn btn-ghost btn-sm" onclick="disconnectZoho(); renderTab();">Disconnect Zoho</button> <button class="btn btn-gold btn-sm" onclick="syncZohoDeals()">↻ Sync Deals Now</button>' : '<button class="btn btn-gold btn-sm" onclick="connectZoho()">Connect Zoho</button>';
  html += '</div></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Google Sign-In</span></div>';
  html += '<div style="font-size:12.5px;color:var(--muted);line-height:1.6">';
  html += 'Only <code>@aspenview.com</code> accounts are authorized. To enable real Google Sign-In (instead of dev-mode profile picker), set up an OAuth client at <code>console.cloud.google.com</code> and replace <code>REPLACE_WITH_GOOGLE_CLIENT_ID</code> in <code>index.html</code>.';
  html += '<br><br>See the <b>setup_guide.docx</b> alongside this file for step-by-step instructions.';
  html += '</div></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Data Management</span></div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Export all data (JSON)</button>';
  html += '<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'importFile\').click()">⬆ Import data (JSON)</button>';
  html += '<input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this.files[0])">';
  html += '<button class="btn btn-danger btn-sm" onclick="resetAllData()">⚠ Reset all data</button></div>';
  html += '<div style="font-size:11px;color:var(--muted);margin-top:8px">Deals, margin rules, snapshots, and actuals are all stored in your browser. Export regularly as backup.</div></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Daily Workflow</span></div>';
  html += '<ol style="font-size:12.5px;color:var(--muted);line-height:1.75;padding-left:20px">';
  html += '<li><b>Morning (Don)</b>: open the dashboard. If Zoho is connected, click <i>Sync from Zoho</i> on the Aureum Demand Forecast tab to pull overnight changes.</li>';
  html += '<li><b>Daily</b>: adjust monthly HC and pricing as deals move stages — every cell auto-saves.</li>';
  html += '<li><b>Weekly</b>: review the <i>3 mo. revenue</i> tab. Move the <b>Anchor month</b> forward each new month to roll the window.</li>';
  html += '<li><b>Monthly</b>: after a month closes, go to <i>Forecast Accuracy</i> → <i>Enter Actuals</i> for the closed month. The accuracy bands recompute automatically.</li>';
  html += '<li><b>Quarterly</b>: review <i>Margin Rules</i> with Finance (Eric / John Scott) to keep cash-flow assumptions current.</li>';
  html += '</ol></div>';

  document.getElementById('mainContent').innerHTML = html;
}
function exportData() {
  var dump = { deals: getDeals(), margin_rules: getMarginRules(), snapshots: getSnapshots(), actuals: getActuals(), anchor_month: getAnchorMonth(), exportedAt: new Date().toISOString() };
  var blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aspenview-bde-forecast-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData(file) {
  if (!file) return;
  var r = new FileReader();
  r.onload = function() {
    try {
      var data = JSON.parse(r.result);
      if (!confirm('Replace all current data with imported data? Cannot be undone.')) return;
      if (data.deals)        setDeals(data.deals);
      if (data.margin_rules) setMarginRules(data.margin_rules);
      if (data.snapshots)    setSnapshots(data.snapshots);
      if (data.actuals)      setActuals(data.actuals);
      if (data.anchor_month) setAnchorMonth(data.anchor_month);
      alert('Imported successfully.');
      renderTab();
    } catch (e) { alert('Import failed: ' + e.message); }
  };
  r.readAsText(file);
}
function resetAllData() {
  if (!confirm('Reset ALL data (deals, rules, snapshots, actuals)? Cannot be undone.')) return;
  ['deals','margin_rules','snapshots','actuals','anchor_month'].forEach(function(k) { localStorage.removeItem('bde_' + k); });
  renderTab();
}

function openModal(html)  { document.getElementById('modal').innerHTML = html; document.getElementById('modalOverlay').style.display = 'flex'; }
function closeModal()     { document.getElementById('modalOverlay').style.display = 'none'; }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target.id === 'modalOverlay') closeModal(); });

checkZohoTokenFromUrl();
fbInit();  // Firebase auth state — fires loginAs automatically if user has a session.
// Degrade-mode: if Firebase SDK didn't load at all, fall back to localStorage-only.
setTimeout(function() {
  if (!currentUser && typeof firebase === 'undefined') {
    var savedUser = load('current_user', null);
    if (savedUser) { loginAs(savedUser); autoApplySeedOnce(); renderTab(); }
  }
}, 1500);
</script>

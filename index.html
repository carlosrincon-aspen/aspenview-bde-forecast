<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AspenView — BDE Rolling 12-Month Sales &amp; Readiness Forecast</title>
<style>
  :root {
    color-scheme: light;
    --navy:    #0A1928;
    --navy2:   #132336;
    --navy3:   #1c3250;
    --gold:    #E8B84B;
    --gold2:   #d4a53d;
    --softblue:#D9F1FB;
    --softgreen:#E8F5E9;
    --softred: #FDECEA;
    --softgold:#FFF8E1;
    --aureum:  #00BCD4;
    --bg:      #F2F2F2;
    --card:    #FFFFFF;
    --border:  #E0E8F0;
    --text:    #0A1928;
    --muted:   #5a6a7a;
    --success: #2e7d32;
    --warn:    #b45309;
    --danger:  #c62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
  #loginScreen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; overflow-y: auto; padding: 24px 16px; }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .login-logo .brand { font-size: 22px; font-weight: 700; color: white; letter-spacing: 2px; }
  .login-logo .brand span { color: var(--gold); }
  .login-logo .tagline { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
  .login-title { font-size: 15px; color: rgba(255,255,255,0.6); margin: 8px 0 24px; letter-spacing: 0.5px; text-align: center; }
  .login-box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 28px 36px; text-align: center; max-width: 360px; }
  .login-box .hint { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 18px; letter-spacing: 0.5px; }
  .login-pick { background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.3); border-radius: 8px; padding: 11px 22px; cursor: pointer; color: white; font-size: 13px; font-weight: 700; margin: 6px; font-family: inherit; transition: all 0.15s; }
  .login-pick:hover { background: rgba(232,184,75,0.22); border-color: var(--gold); }
  .login-foot { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 18px; }

  #appScreen { display: none; flex-direction: column; flex: 1; }
  header { background: var(--navy); color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; height: 54px; border-bottom: 3px solid var(--gold); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-text .brand { font-size: 14px; font-weight: 700; color: white; letter-spacing: 1.5px; }
  .logo-text .brand span { color: var(--gold); }
  .logo-text .tagline { font-size: 7.5px; font-weight: 400; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
  .header-center { font-size: 13px; font-weight: 700; color: white; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-user { font-size: 11px; color: rgba(255,255,255,0.7); }
  .logout-btn { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 4px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .logout-btn:hover { background: rgba(255,255,255,0.18); color: white; }
  .zoho-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; padding: 3px 9px; border-radius: 20px; font-weight: 700; cursor: pointer; }
  .zoho-pill.on  { background: rgba(46,125,50,0.18); color: #b6e8b9; border: 1px solid rgba(46,125,50,0.4); }
  .zoho-pill.off { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.18); }

  .topnav { display: flex; gap: 4px; padding: 8px 18px; background: var(--navy2); overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .topnav-btn { padding: 7px 14px; border-radius: 5px; border: none; cursor: pointer; font-size: 11.5px; font-weight: 700; font-family: inherit; transition: all 0.15s; white-space: nowrap; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
  .topnav-btn:hover { background: rgba(255,255,255,0.16); color: white; }
  .topnav-btn.active { background: var(--gold); color: var(--navy); }

  .main { flex: 1; overflow-y: auto; padding: 18px 22px; }
  .page-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
  .page-title h1 { font-size: 18px; font-weight: 700; color: var(--navy); }
  .page-title .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(10,25,40,0.06); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--navy); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .btn { padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 11.5px; font-weight: 700; transition: all 0.15s; font-family: inherit; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy2); }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold2); }
  .btn-ghost { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); color: var(--navy); }
  .btn-danger { background: #fdecea; color: var(--danger); }
  .btn-sm { padding: 4px 9px; font-size: 11px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--navy); margin: 4px 0 1px; }
  .stat-sub { font-size: 10.5px; color: var(--muted); }
  .stat-card.aureum { border-left: 3px solid var(--aureum); }
  .stat-card.gold   { border-left: 3px solid var(--gold); }
  .stat-card.good   { border-left: 3px solid var(--success); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--bg); padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .num-bold { font-weight: 700; color: var(--navy); }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .pill-blue   { background: var(--softblue); color: #0d47a1; }
  .pill-gold   { background: var(--softgold); color: #b45309; }
  .pill-green  { background: var(--softgreen); color: var(--success); }
  .pill-red    { background: var(--softred); color: var(--danger); }
  .pill-aureum { background: #B2EBF2; color: #00838f; }
  .pill-gray   { background: var(--bg); color: var(--muted); }

  .scroll-x { overflow-x: auto; }
  .grid-tbl { font-size: 11.5px; min-width: 1100px; }
  .grid-tbl th { font-size: 9.5px; padding: 6px 7px; }
  .grid-tbl td { padding: 6px 7px; }
  .grid-tbl .cell-hc { text-align: center; font-variant-numeric: tabular-nums; }
  .grid-tbl .cell-hc.gt10k { background: #E8F5E9; color: #1b5e20; font-weight: 700; }
  .grid-tbl .cell-hc.lt10k { background: #FDECEA; color: #b71c1c; font-weight: 700; }
  .grid-tbl .cell-hc.super { background: #B2EBF2; color: #006064; font-weight: 700; }
  .grid-tbl .row-super { background: rgba(0,188,212,0.05); }
  .grid-tbl input { width: 50px; padding: 3px 5px; font-size: 11.5px; border: 1px solid var(--border); border-radius: 4px; text-align: right; font-variant-numeric: tabular-nums; font-family: inherit; background: white; }
  .grid-tbl input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.2); }
  .grid-tbl input.margin { width: 50px; }
  .grid-tbl input.price { width: 80px; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 10.5px; color: var(--muted); margin-top: 8px; align-items: center; }
  .legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: middle; margin-right: 5px; }

  .anchor-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; font-size: 12px; }
  .anchor-row label { font-weight: 700; color: var(--navy); }
  .anchor-row select { padding: 6px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 5px; background: white; font-family: inherit; color: var(--navy); cursor: pointer; }
  .anchor-row select:focus { outline: none; border-color: var(--gold); }

  .acc-bands { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  .acc-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .acc-card.m0 { border-top: 3px solid var(--success); }
  .acc-card.m1 { border-top: 3px solid var(--gold); }
  .acc-card.m2 { border-top: 3px solid var(--danger); }
  .acc-card .acc-h { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
  .acc-card .acc-v { font-size: 28px; font-weight: 700; color: var(--navy); margin: 4px 0 2px; }
  .acc-card .acc-b { font-size: 11px; color: var(--muted); }
  .acc-card .acc-n { font-size: 10px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .var-cell { font-weight: 700; }
  .var-green  { color: var(--success); }
  .var-yellow { color: var(--warn); }
  .var-red    { color: var(--danger); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,25,40,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: white; border-radius: 10px; padding: 22px; width: 520px; max-width: 92vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(10,25,40,0.25); }
  .modal h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 12.5px; font-family: inherit; color: var(--text); background: white; outline: none; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.2); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar input[type="text"], .toolbar select { padding: 5px 9px; font-size: 11.5px; border: 1px solid var(--border); border-radius: 5px; font-family: inherit; background: white; color: var(--text); outline: none; }
  .toolbar input[type="text"]:focus, .toolbar select:focus { border-color: var(--gold); }
  .toolbar .spacer { flex: 1; }

  .empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 12px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #c8d6e5; border-radius: 3px; }

  @media (max-width: 880px) {
    .acc-bands { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>

var currentUser = null;

function load(k, d) {
  try { var v = JSON.parse(localStorage.getItem('bde_' + k)); return (v === null || v === undefined) ? d : v; }
  catch(e) { return d; }
}
function save(k, v) { localStorage.setItem('bde_' + k, JSON.stringify(v)); }

function getDeals() {
  var deals = load('deals', SEED_DEALS);
  // Migration: ensure new fields exist on every deal
  deals.forEach(function(d) {
    if (d.isSuperDeal === undefined) d.isSuperDeal = (d.totalHC || sumMonths(d.monthlyHC || {})) >= 50;
    if (d.inForecast  === undefined) d.inForecast  = sumMonths(d.monthlyHC || {}) > 0;
    if (d.bde         === undefined) d.bde         = '';
    if (d.zohoId      === undefined) d.zohoId      = '';
  });
  return deals;
}
function setDeals(d) { save('deals', d); }

function handleCredentialResponse(resp) {
  try {
    var payload = JSON.parse(atob(resp.credential.split('.')[1]));
    if (!/@aspenview\.com$/i.test(payload.email || '')) {
      document.getElementById('loginError').textContent = 'Only @aspenview.com accounts are authorized.';
      return;
    }
    var match = null;
    Object.keys(USERS).forEach(function(k) { if (USERS[k].email.toLowerCase() === payload.email.toLowerCase()) match = USERS[k]; });
    if (!match) {
      match = { id: payload.email, name: payload.name || payload.email, email: payload.email, role: 'bde', initials: (payload.given_name||'?').substring(0,1) + (payload.family_name||'').substring(0,1) };
    }
    loginAs(match);
  } catch (e) {
    document.getElementById('loginError').textContent = 'Sign-in failed: ' + e.message;
  }
}
function loginAs(u) {

function logout() {

}

function getZohoToken() {
  var t = localStorage.getItem('zoho_token');
  var exp = parseInt(localStorage.getItem('zoho_token_exp') || '0');
  return (t && Date.now() < exp) ? t : null;
}
function checkZohoTokenFromUrl() {
  var hash = window.location.hash || '';
  if (hash.indexOf('access_token') === -1) return;
  var params = {};
  hash.replace(/^#/, '').split('&').forEach(function(p) { var kv = p.split('='); params[kv[0]] = kv[1] ? decodeURIComponent(kv[1]) : ''; });
  if (params.access_token) {
    localStorage.setItem('zoho_token', params.access_token);
    localStorage.setItem('zoho_token_exp', String(Date.now() + (parseInt(params.expires_in || '3600') * 1000)));
    history.replaceState(null, '', window.location.pathname);
  }
}
function connectZoho() {
  if (ZOHO_CLIENT_ID === 'REPLACE_WITH_ZOHO_CLIENT_ID') {
    alert('Zoho not configured yet. See Settings → Zoho integration.');
    return;
  }
  var url = 'https://accounts.zoho.com/oauth/v2/auth?response_type=token' +
    '&client_id=' + ZOHO_CLIENT_ID +
    '&scope=' + encodeURIComponent('ZohoCRM.modules.Deals.READ,ZohoCRM.modules.Accounts.READ') +
    '&redirect_uri=' + encodeURIComponent(ZOHO_REDIRECT) +
    '&access_type=online';
  window.location.href = url;
}
function disconnectZoho() {
  localStorage.removeItem('zoho_token');
  localStorage.removeItem('zoho_token_exp');
  refreshZohoPill();
}
function toggleZoho() { getZohoToken() ? (confirm('Disconnect Zoho?') && disconnectZoho()) : connectZoho(); }
function refreshZohoPill() {
  var p = document.getElementById('zohoPill');
  if (getZohoToken()) { p.className = 'zoho-pill on';  p.textContent = 'Zoho · Connected'; }
  else                { p.className = 'zoho-pill off'; p.textContent = 'Zoho · Disconnected'; }
}
function zohoGet(token, path, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', ZOHO_API + path, true);
  xhr.setRequestHeader('Authorization', 'Zoho-oauthtoken ' + token);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) { try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e); } }
    else if (xhr.status === 204) cb(null, { data: [] });
    else cb(new Error(xhr.status + ': ' + xhr.responseText));
  };
  xhr.send();
}
// Paginate through ALL Zoho deals across pages of 200
function fetchAllZohoDeals(token, cb) {
  var FIELDS = 'Deal_Name,Account_Name,Stage,Owner,Closing_Date,Amount,Probability,Description';
  var all = [];
  function fetchPage(page) {
    zohoGet(token, '/Deals?fields=' + FIELDS + '&per_page=200&page=' + page, function(err, d) {
      if (err) return cb(err);
      var batch = (d && d.data) || [];
      all = all.concat(batch);
      var moreRecords = d && d.info && d.info.more_records;
      if (!moreRecords || batch.length === 0) return cb(null, all);
      if (page >= 50) return cb(null, all); // safety stop at 10,000 deals
      fetchPage(page + 1);
    });
  }
  fetchPage(1);
}

function syncZohoDeals() {
  var token = getZohoToken();
  if (!token) { alert('Connect Zoho first.'); return; }
  var btn = document.getElementById('zohoSyncBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  fetchAllZohoDeals(token, function(err, allDeals) {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Sync from Zoho'; }
    if (err) { alert('Sync failed: ' + err.message); return; }

    // Preserve local edits/flags on existing deals (matched by Zoho id).
    // For deals never seen locally before, fall back to the Excel seed by name match
    // so the original Forecast/Super flags and monthly HC carry over.
    var existing = getDeals();
    var byId = {};
    existing.forEach(function(d) { if (d.zohoId) byId[d.zohoId] = d; });
    var seedIdx = buildSeedIndex();

    var filtered = allDeals.filter(function(r) { return ALLOWED_STAGES.indexOf(r.Stage) >= 0; });

    var seedMatched = 0;
    var mapped = filtered.map(function(r) {
      var prior = byId[r.id];
      var seed = !prior ? seedIdx[normDealName(r.Deal_Name)] : null;
      if (seed) seedMatched++;
      var p = prior || {};
      var seedSum = seed ? sumMonths(seed.monthlyHC || {}) : 0;
      return {
        zohoId:                r.id,
        dealName:              r.Deal_Name || p.dealName || '',
        client:                (r.Account_Name && r.Account_Name.name) || p.client || (seed && seed.client) || '',
        stage:                 r.Stage,
        bde:                   (r.Owner && r.Owner.name) || p.bde || '',
        status:                p.status || (seed && seed.status) || 'Pipeline Account',
        location:              p.location || (seed && seed.location) || 'LATAM',
        firstBillableMonth:    r.Closing_Date || p.firstBillableMonth || (seed && seed.firstBillableMonth) || '',
        activationMonth:       r.Closing_Date || p.activationMonth || (seed && seed.activationMonth) || '',
        pricing:               (parseFloat(r.Amount) || 0) || p.pricing || (seed && seed.pricing) || 0,
        winRate:               p.winRate !== undefined ? p.winRate : (seed && seed.winRate !== undefined ? seed.winRate : 0.5),
        winRateAdj:            (r.Probability !== undefined && r.Probability !== null) ? (parseFloat(r.Probability) || 0) / 100 : (p.winRateAdj !== undefined ? p.winRateAdj : (seed && seed.winRateAdj !== undefined ? seed.winRateAdj : 0.5)),
        monthlyHC:             (p.monthlyHC && Object.keys(p.monthlyHC).length) ? p.monthlyHC : (seed && seed.monthlyHC ? JSON.parse(JSON.stringify(seed.monthlyHC)) : {}),
        totalHC:               p.totalHC || seedSum || 0,
        commercialDescription: r.Description || p.commercialDescription || '',
        inForecast:            p.inForecast  !== undefined ? p.inForecast  : (seed ? seedSum > 0   : false),
        isSuperDeal:           p.isSuperDeal !== undefined ? p.isSuperDeal : (seed ? seedSum >= 50 : false),
        marginOverride:        p.marginOverride
      };
    });

    var skipped = allDeals.length - filtered.length;
    var msg = 'Pulled ' + allDeals.length + ' deals from Zoho.\n' +
              '  • ' + filtered.length + ' match the allowed stages\n' +
              '  • ' + skipped + ' skipped (not in ALLOWED_STAGES)\n' +
              '  • ' + seedMatched + ' new deals matched the Excel seed by name (will inherit Forecast/Super flags + monthly HC)\n\n' +
              'Replace current deals with this set? Local edits on deals already synced are preserved.';
    if (!confirm(msg)) return;
    setDeals(mapped);
    save('last_zoho_sync', new Date().toISOString());
    renderTab();
    alert('Zoho sync complete: ' + mapped.length + ' deals.');
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function currentMonthKey() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
}
function monthKeyAfter(key, n) {
  var p = key.split('-'); var y = parseInt(p[0]), m = parseInt(p[1]) - 1 + n;
  y += Math.floor(m / 12); m = ((m % 12) + 12) % 12;
  return y + '-' + ('0' + (m + 1)).slice(-2);
}
function monthLabel(key) {
  var p = key.split('-'); var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, 1);
  return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}
function fmt$(n)    { if (!n) return '$0'; return '$' + Math.round(n).toLocaleString('en-US'); }
function fmt$k(n)   { if (!n) return '$0'; if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M'; if (Math.abs(n) >= 1e3) return '$' + Math.round(n/1e3) + 'K'; return '$' + Math.round(n); }
function fmtPct(n)  { if (n === null || n === undefined || isNaN(n)) return '—'; return (n * 100).toFixed(0) + '%'; }
function fmtPct1(n) { if (n === null || n === undefined || isNaN(n)) return '—'; return (n * 100).toFixed(1) + '%'; }
function esc(s)     { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function isSuperDeal(d) {
  if (d.isSuperDeal !== undefined) return !!d.isSuperDeal;
  return (d.totalHC || sumMonths(d.monthlyHC)) >= 50;
}
function dealZohoUrl(d) {
  if (!d.zohoId) return '';
  return 'https://crm.zoho.' + ZOHO_DC + '/crm/tab/Potentials/' + encodeURIComponent(d.zohoId);
}
function dealNameCell(d) {
  var url = dealZohoUrl(d);
  if (url) return '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--navy);font-weight:700;text-decoration:none;border-bottom:1px dashed var(--gold)" title="Open in Zoho CRM">' + esc(d.dealName) + ' ↗</a>';
  return '<b>' + esc(d.dealName) + '</b>';
}
function toggleDealFlag(idx, field) {
  var deals = getDeals();
  if (!deals[idx]) return;
  deals[idx][field] = !deals[idx][field];
  setDeals(deals);
  renderTab();
}
function uniqueBdes(deals) {
  var set = {}; deals.forEach(function(d){ if (d.bde) set[d.bde] = 1; });
  return Object.keys(set).sort();
}
function normDealName(s) {
  return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
}
function buildSeedIndex() {
  var idx = {};
  SEED_DEALS.forEach(function(s) {
    var k = normDealName(s.dealName);
    if (k) idx[k] = s;
  });
  return idx;
}
// Runs once per browser: matches current deals against the Excel seed by normalized
// deal name and copies monthlyHC + Forecast/Super-Deal flags where the local deal
// has none yet. Never overwrites user edits. Sets a localStorage flag so it never
// runs again. Triggered automatically on first login after this version.
function autoApplySeedOnce() {
  if (load('seed_applied_v1', false)) return;
  var deals = getDeals();
  var seedIdx = buildSeedIndex();
  deals.forEach(function(d) {
    var seed = seedIdx[normDealName(d.dealName)];
    if (!seed) return;
    var seedHc = seed.monthlyHC || {};
    var seedSum = sumMonths(seedHc);
    if (sumMonths(d.monthlyHC || {}) === 0 && seedSum > 0) {
      d.monthlyHC = JSON.parse(JSON.stringify(seedHc));
      d.totalHC = seedSum;
    }
    if (!d.inForecast  && seedSum > 0)   d.inForecast  = true;
    if (!d.isSuperDeal && seedSum >= 50) d.isSuperDeal = true;
  });
  setDeals(deals);
  save('seed_applied_v1', true);
}
function sumMonths(hc) { return Object.values(hc || {}).reduce(function(s, v) { return s + (v || 0); }, 0); }
function getMarginFor(deal) {
  if (deal.marginOverride !== undefined && deal.marginOverride !== null && deal.marginOverride !== '') return parseFloat(deal.marginOverride);
  var rules = getMarginRules();
  if (isSuperDeal(deal)) { var r = rules.find(function(r){ return r.dealType === 'Aureum / Super-Deal'; }); if (r) return r.margin; }
  var match = rules.find(function(r) { return r.dealType === deal.stage; });
  if (match) return match.margin;
  var fb = rules.find(function(r) { return r.dealType === 'Default'; });
  return fb ? fb.margin : 0.35;
}
function getWinRateFor(deal) {
  if (deal.winRateAdj !== undefined && deal.winRateAdj !== null && deal.winRateAdj !== '') return parseFloat(deal.winRateAdj);
  var s = STAGES.find(function(s){ return s.id === deal.stage; });
  return s ? s.winRate : 0.3;
}
function stagePill(stage) {
  var s = STAGES.find(function(s){ return s.id === stage; });
  var label = s ? s.label : stage;
  var cls = s ? s.cls : 'pill-gray';
  return '<span class="pill ' + cls + '">' + esc(label) + '</span>';
}
function statusPill(st) {
  var cls = STATUS_PILL[st] || 'pill-gray';
  return '<span class="pill ' + cls + '">' + esc(st) + '</span>';
}
function dealRevenueForMonth(deal, monthKey) {
  var hc = (deal.monthlyHC || {})[monthKey] || 0;
  return hc * (deal.pricing && deal.totalHC ? (deal.pricing / Math.max(1, sumMonths(deal.monthlyHC) || deal.totalHC)) : (deal.pricing || 0));
}
// Per-resource MRR derived from pricing / total HC in plan (or pricing if HC unknown)
function pricePerHead(deal) {
  var totHc = sumMonths(deal.monthlyHC) || deal.totalHC;
  if (totHc > 0 && deal.pricing > 0) return deal.pricing / totHc;
  return deal.pricing || 0;
}
function projectedRevenue(deal, monthKey)  { return ((deal.monthlyHC || {})[monthKey] || 0) * pricePerHead(deal); }
function adjustedRevenue(deal, monthKey)   { return projectedRevenue(deal, monthKey) * getWinRateFor(deal); }
function marginDollarsAdj(deal, monthKey)  { return adjustedRevenue(deal, monthKey) * getMarginFor(deal); }

// ─────────────────────────────────────────────────────────────────────────────
// SNAPSHOTS (for forecast accuracy)
// ─────────────────────────────────────────────────────────────────────────────
function ensureMonthlySnapshot() {
  var snaps = getSnapshots();
  var key = currentMonthKey();
  if (snaps.find(function(s){ return s.snapshotMonth === key; })) return;
  var deals = getDeals();
  var snap = { snapshotMonth: key, takenAt: new Date().toISOString(), perDeal: {} };
  deals.forEach(function(d) {
    snap.perDeal[d.dealName] = {
      hc:      { m0: (d.monthlyHC||{})[key] || 0, m1: (d.monthlyHC||{})[monthKeyAfter(key,1)] || 0, m2: (d.monthlyHC||{})[monthKeyAfter(key,2)] || 0 },
      rev:     { m0: projectedRevenue(d, key), m1: projectedRevenue(d, monthKeyAfter(key,1)), m2: projectedRevenue(d, monthKeyAfter(key,2)) },
      adjRev:  { m0: adjustedRevenue(d, key),  m1: adjustedRevenue(d, monthKeyAfter(key,1)),  m2: adjustedRevenue(d, monthKeyAfter(key,2)) },
      margin$: { m0: marginDollarsAdj(d, key), m1: marginDollarsAdj(d, monthKeyAfter(key,1)), m2: marginDollarsAdj(d, monthKeyAfter(key,2)) }
    };
  });
  snaps.push(snap);
  setSnapshots(snaps);
}
// Compute accuracy bands: for each historical snapshot, compare its predictions for
// target month X (where X is one of the snapshot's M0/M1/M2 horizons) against the
// recorded actuals for X. Aggregate (mean ± std-dev) across all snapshots per horizon.
function computeAccuracyBands() {
  var snaps   = getSnapshots();
  var actuals = getActuals();
  var per     = { m0: [], m1: [], m2: [] };
  snaps.forEach(function(s) {
    ['m0','m1','m2'].forEach(function(h, i) {
      var targetMonth = monthKeyAfter(s.snapshotMonth, i);
      var act = actuals[targetMonth];
      if (!act) return;
      var fcastRev = Object.values(s.perDeal).reduce(function(t, p) { return t + (p.adjRev[h] || 0); }, 0);
      var actRev   = act.adjRev || 0;
      if (fcastRev <= 0 && actRev <= 0) return;
      var maxRev = Math.max(fcastRev, actRev, 1);
      var err = Math.abs(fcastRev - actRev) / maxRev;
      per[h].push({ snapshot: s.snapshotMonth, target: targetMonth, fcast: fcastRev, actual: actRev, errPct: err, accPct: 1 - err });
    });
  });
  function bandFor(arr, defaultAcc, defaultBand) {
    if (!arr.length) return { acc: defaultAcc, band: defaultBand, n: 0, isDefault: true };
    var mean = arr.reduce(function(t, x) { return t + x.accPct; }, 0) / arr.length;
    var sd = Math.sqrt(arr.reduce(function(t, x) { return t + Math.pow(x.accPct - mean, 2); }, 0) / arr.length);
    return { acc: mean, band: sd, n: arr.length, isDefault: false };
  }
  return {
    m0: bandFor(per.m0, 0.80, 0.05),
    m1: bandFor(per.m1, 0.75, 0.10),
    m2: bandFor(per.m2, 0.30, 0.20),
    history: per
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: OVERVIEW
// ─────────────────────────────────────────────────────────────────────────────
function renderOverview() {
  var deals    = getDeals();
  var anchor   = getAnchorMonth();
  var months   = [anchor, monthKeyAfter(anchor, 1), monthKeyAfter(anchor, 2)];
  var totals   = { hc: [0,0,0], proj: [0,0,0], adj: [0,0,0], margin$: [0,0,0] };
  deals.forEach(function(d) {
    months.forEach(function(m, i) {
      totals.hc[i]      += (d.monthlyHC || {})[m] || 0;
      totals.proj[i]    += projectedRevenue(d, m);
      totals.adj[i]     += adjustedRevenue(d, m);
      totals.margin$[i] += marginDollarsAdj(d, m);
    });
  });
  var totalAdj      = totals.adj.reduce(function(s,v){ return s + v; }, 0);
  var totalMargin   = totals.margin$.reduce(function(s,v){ return s + v; }, 0);
  var totalHc       = totals.hc.reduce(function(s,v){ return s + v; }, 0);
  var totalDeals    = deals.length;
  var pipelineDeals = deals.filter(function(d){ return /Pipeline|SQL|Commercial|Recruit|Pricing|Paper|Services/.test(d.stage + ' ' + d.status); }).length;
  var aureumDeals   = deals.filter(isSuperDeal).length;
  var bands         = computeAccuracyBands();

  var html = '';
  html += '<div class="page-title"><div><h1>Overview</h1><div class="sub">Anchor month: <b>' + monthLabel(anchor) + '</b> &middot; Rolling 3-month window</div></div>';
  html += '<div style="display:flex;gap:8px;align-items:center"><label style="font-size:11px;color:var(--muted)">Anchor:</label>' + anchorSelectHtml() + '</div></div>';

  html += '<div class="stat-grid">';
  html += statCard('Total Deals',     totalDeals,                   pipelineDeals + ' in pipeline · ' + aureumDeals + ' super-deals', 'gold');
  html += statCard('Forecasted HC (3mo)', totalHc,                   monthLabel(months[0]) + ' → ' + monthLabel(months[2]), 'aureum');
  html += statCard('Adj. Revenue (3mo)',  fmt$k(totalAdj),           'Win-rate-adjusted', 'good');
  html += statCard('Margin $ (3mo)',      fmt$k(totalMargin),        'Adjusted × Margin %', 'good');
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Rolling 3-Month Window</span><span class="card-sub">' + monthLabel(months[0]) + ' &middot; ' + monthLabel(months[1]) + ' &middot; ' + monthLabel(months[2]) + '</span></div>';
  html += '<table><thead><tr><th>Metric</th><th class="num">' + monthLabel(months[0]) + '</th><th class="num">' + monthLabel(months[1]) + '</th><th class="num">' + monthLabel(months[2]) + '</th><th class="num">3-mo Total</th></tr></thead><tbody>';
  html += '<tr><td>Forecasted Headcount</td>' + totals.hc.map(function(v){ return '<td class="num num-bold">' + v + '</td>'; }).join('') + '<td class="num num-bold">' + totalHc + '</td></tr>';
  html += '<tr><td>Projected Revenue</td>'   + totals.proj.map(function(v){ return '<td class="num">' + fmt$k(v) + '</td>'; }).join('') + '<td class="num num-bold">' + fmt$k(totals.proj.reduce(function(s,v){return s+v;},0)) + '</td></tr>';
  html += '<tr><td>Adj. Revenue (× win rate)</td>' + totals.adj.map(function(v){ return '<td class="num">' + fmt$k(v) + '</td>'; }).join('') + '<td class="num num-bold">' + fmt$k(totalAdj) + '</td></tr>';
  html += '<tr><td>Margin $ (× margin %)</td>' + totals.margin$.map(function(v){ return '<td class="num">' + fmt$k(v) + '</td>'; }).join('') + '<td class="num num-bold">' + fmt$k(totalMargin) + '</td></tr>';
  html += '</tbody></table></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Forecast Reliability by Horizon</span><span class="card-sub">' + (bands.m0.isDefault ? 'Default values — accumulates as snapshots build up' : 'Computed from ' + bands.m0.n + '/' + bands.m1.n + '/' + bands.m2.n + ' historical snapshots') + '</span></div>';
  html += '<div class="acc-bands">';
  html += accCard('m0', 'Current Month (M0)', bands.m0);
  html += accCard('m1', '+1 Month (M+1)',     bands.m1);
  html += accCard('m2', '+2 Months (M+2)',    bands.m2);
  html += '</div></div>';

  document.getElementById('mainContent').innerHTML = html;
}
function statCard(label, val, sub, kind) {
  return '<div class="stat-card ' + (kind||'') + '"><div class="stat-label">' + esc(label) + '</div><div class="stat-value">' + esc(val) + '</div><div class="stat-sub">' + esc(sub) + '</div></div>';
}
function accCard(cls, label, b) {
  return '<div class="acc-card ' + cls + '"><div class="acc-h">' + esc(label) + '</div>' +
    '<div class="acc-v">' + fmtPct(b.acc) + '</div>' +
    '<div class="acc-b">± ' + fmtPct(b.band) + '</div>' +
    '<div class="acc-n">' + (b.isDefault ? 'Default (no history yet)' : b.n + ' snapshots') + '</div></div>';
}
function anchorSelectHtml() {

function updateDealHC(idx, monthKey, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  d.monthlyHC = d.monthlyHC || {};
  var v = parseInt(value);
  if (!v || isNaN(v) || v <= 0) delete d.monthlyHC[monthKey];
  else d.monthlyHC[monthKey] = v;
  d.totalHC = sumMonths(d.monthlyHC);
  setDeals(deals);
}
function updateDealField(idx, field, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  d[field] = value === '' || isNaN(parseFloat(value)) ? '' : parseFloat(value);
  setDeals(deals);
}

    html += '<td>' + esc(d.client) + '</td>';

// ─────────────────────────────────────────────────────────────────────────────
function renderForecastAccuracy() {
  var snaps   = getSnapshots();
  var actuals = getActuals();
  var bands   = computeAccuracyBands();

  var html = '';
  html += '<div class="page-title"><div><h1>Forecast Accuracy</h1><div class="sub">Reliability bands by horizon · Snapshots auto-taken on the first session each month</div></div>';
  html += '<div><button class="btn btn-ghost btn-sm" onclick="forceSnapshot()">+ Force Snapshot Now</button> <button class="btn btn-gold btn-sm" onclick="openActualsModal()">Enter Actuals</button></div></div>';

  html += '<div class="acc-bands">';
  html += accCard('m0', 'Current Month (M0)', bands.m0);
  html += accCard('m1', '+1 Month (M+1)',     bands.m1);
  html += accCard('m2', '+2 Months (M+2)',    bands.m2);
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Historical Snapshots</span><span class="card-sub">' + snaps.length + ' snapshots</span></div>';
  if (!snaps.length) {
    html += '<div class="empty">No snapshots yet. One will be auto-taken on your first session each month, or click "Force Snapshot Now" above.</div>';
  } else {
    html += '<table><thead><tr><th>Snapshot Month</th><th>Taken At</th><th>Deals</th><th class="num">M0 Forecast Adj.</th><th class="num">M+1 Forecast Adj.</th><th class="num">M+2 Forecast Adj.</th></tr></thead><tbody>';
    snaps.slice().reverse().forEach(function(s) {
      var sum = ['m0','m1','m2'].map(function(h) {
        return Object.values(s.perDeal).reduce(function(t,p){ return t + (p.adjRev[h] || 0); }, 0);
      });
      html += '<tr><td><b>' + monthLabel(s.snapshotMonth) + '</b></td>';
      html += '<td style="color:var(--muted);font-size:11px">' + new Date(s.takenAt).toLocaleString() + '</td>';
      html += '<td>' + Object.keys(s.perDeal).length + '</td>';
      html += '<td class="num">' + fmt$k(sum[0]) + '</td>';
      html += '<td class="num">' + fmt$k(sum[1]) + '</td>';
      html += '<td class="num">' + fmt$k(sum[2]) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Actuals Recorded</span><span class="card-sub">Used to compute accuracy bands</span></div>';
  var monthsKeys = Object.keys(actuals).sort();
  if (!monthsKeys.length) {
    html += '<div class="empty">No actuals yet. Record actuals as months close so the bands learn from your real outcomes.</div>';
  } else {
    html += '<table><thead><tr><th>Month</th><th class="num">Actual HC</th><th class="num">Actual Adj. Revenue</th><th class="num">Variance vs M0 Forecast</th><th></th></tr></thead><tbody>';
    monthsKeys.forEach(function(mk) {
      var a = actuals[mk] || {};
      var snap = snaps.find(function(s){ return s.snapshotMonth === mk; });
      var fc = snap ? Object.values(snap.perDeal).reduce(function(t,p){ return t + (p.adjRev.m0 || 0); }, 0) : 0;
      var varDollars = fc ? (a.adjRev - fc) : 0;
      var varPct = fc ? (varDollars / fc) : 0;
      var vc = Math.abs(varPct) < 0.05 ? 'var-green' : Math.abs(varPct) < 0.15 ? 'var-yellow' : 'var-red';
      html += '<tr><td>' + monthLabel(mk) + '</td><td class="num">' + (a.hc || '—') + '</td>';
      html += '<td class="num">' + fmt$k(a.adjRev || 0) + '</td>';
      html += '<td class="num var-cell ' + vc + '">' + (fc ? (varPct >= 0 ? '+' : '') + fmtPct1(varPct) : '—') + '</td>';
      html += '<td><button class="btn btn-ghost btn-sm" onclick="openActualsModal(\'' + mk + '\')">&#9998;</button></td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">How accuracy bands are computed</span></div>';
  html += '<div style="font-size:12.5px;color:var(--muted);line-height:1.65">';
  html += 'Every month the app snapshots the rolling 3-month forecast (M0 / M+1 / M+2). When you record actuals for a closed month, the app compares each prior snapshot\'s prediction for that month against the actual, and aggregates the per-horizon error as <b>mean ± std-dev</b> across all snapshots that had that horizon pointing at a now-closed month.';
  html += '<br><br>Before history accumulates, the bands fall back to the targets defined for this project: <b>M0 = 80% ±5</b>, <b>M+1 = 75% ±10</b>, <b>M+2 = 30% ±20</b>.';
  html += '<br><br><b>Not a performance metric.</b> The goal is to give Finance a credible range for cash-flow planning, not to grade the forecaster.';
  html += '</div></div>';

  document.getElementById('mainContent').innerHTML = html;
}

  html += statCard('Total Forecasted HC', deals.reduce(function(s,d){ return s + sumMonths(d.monthlyHC); }, 0), 'Across all months', 'aureum');
  html += statCard('Adj. Pipeline $',     fmt$k(deals.reduce(function(s,d){ return s + (d.pricing || 0) * getWinRateFor(d); }, 0)), 'Pricing × Win Rate', 'gold');
  html += statCard('Adj. Margin $',       fmt$k(deals.reduce(function(s,d){ return s + (d.pricing || 0) * getWinRateFor(d) * getMarginFor(d); }, 0)), 'Pricing × Win × Margin %', 'good');
  html += '</div>';
  html += '<div class="card" style="padding:6px"><div class="scroll-x"><table class="grid-tbl"><thead><tr>';
  html += '<th>BDE</th><th>Client</th><th>Deal</th><th>Stage</th><th class="num">Total HC</th><th class="num">Peak HC</th><th class="num">Pricing</th><th class="num">Win %</th><th class="num">Margin %</th><th class="num">Adj. Rev</th><th class="num">Margin $</th><th class="num">Activation</th>';
  html += '</tr></thead><tbody>';
  deals.sort(function(a,b){ return (b.pricing||0)*getWinRateFor(b) - (a.pricing||0)*getWinRateFor(a); }).forEach(function(d) {
    var peakHc = Math.max.apply(null, Object.values(d.monthlyHC || {0:0}));
    var adj = (d.pricing||0) * getWinRateFor(d);
    var mar = adj * getMarginFor(d);
    html += '<tr class="row-super">';
    html += '<td style="color:var(--muted);font-size:11px">' + esc(d.bde || '—') + '</td>';
    html += '<td>' + esc(d.client) + '</td>';
    html += '<td>' + dealNameCell(d) + '</td>';
    html += '<td>' + stagePill(d.stage) + '</td>';
    html += '<td class="num num-bold">' + sumMonths(d.monthlyHC) + '</td>';
    html += '<td class="num">' + peakHc + '</td>';
    html += '<td class="num">' + fmt$k(d.pricing) + '</td>';
    html += '<td class="num">' + fmtPct(getWinRateFor(d)) + '</td>';
    html += '<td class="num">' + fmtPct(getMarginFor(d)) + '</td>';
    html += '<td class="num num-bold">' + fmt$k(adj) + '</td>';
    html += '<td class="num" style="color:var(--success)">' + fmt$k(mar) + '</td>';
    html += '<td class="num" style="color:var(--muted)">' + esc(d.activationMonth || '') + '</td>';
    html += '</tr>';
  });
  if (!deals.length) html += '<tr><td colspan="12" class="empty">No deals flagged as Super-Deal yet. Go to <b>Aureum Demand Forecast</b> and check the <b>Super</b> box on deals that qualify.</td></tr>';
  html += '</tbody></table></div></div>';
  document.getElementById('mainContent').innerHTML = html;
}

// TAB: FULFILLMENT VIEW (Active Roles)
// ─────────────────────────────────────────────────────────────────────────────
function renderFulfillmentView() {
  var deals = getDeals();
  var anchor = getAnchorMonth();
  var months = [];
  var idx = ALL_MONTHS.indexOf(anchor); if (idx < 0) idx = 0;
  for (var i = 0; i < 9 && idx + i < ALL_MONTHS.length; i++) months.push(ALL_MONTHS[idx + i]);
  var html = '';
  html += '<div class="page-title"><div><h1>Fulfillment View (Active Roles + Super-Deals)</h1><div class="sub">Headcount by deal-type for delivery / recruiting prioritization</div></div>';
  html += '<div class="anchor-row"><label>Anchor:</label>' + anchorSelectHtml() + '</div></div>';

  function fulfillTable(filter, title, isSuper) {
    var rows = deals.filter(filter);
    var hcTot = months.map(function(){ return 0; });
    var h = '<div class="card"><div class="card-header"><span class="card-title">' + title + '</span><span class="card-sub">' + rows.length + ' deals</span></div>';
    h += '<div class="scroll-x"><table class="grid-tbl"><thead><tr><th>Client</th><th>Deal</th><th>Stage</th>';
    months.forEach(function(m){ h += '<th class="num">' + monthLabel(m) + '</th>'; });
    h += '<th class="num">Total</th></tr></thead><tbody>';
    rows.forEach(function(d) {
      h += '<tr' + (isSuper ? ' class="row-super"' : '') + '><td>' + esc(d.client) + '</td><td><b>' + esc(d.dealName) + '</b></td><td>' + stagePill(d.stage) + '</td>';
      var tot = 0;
      months.forEach(function(m, i) {
        var hc = (d.monthlyHC || {})[m] || 0;
        hcTot[i] += hc; tot += hc;
        h += '<td class="num">' + (hc || '—') + '</td>';
      });
      h += '<td class="num num-bold">' + tot + '</td></tr>';
    });
    h += '<tr style="background:var(--navy);color:white;font-weight:700"><td colspan="3" style="color:white">Total HC</td>';
    hcTot.forEach(function(v){ h += '<td class="num" style="color:white">' + v + '</td>'; });
    h += '<td class="num" style="color:var(--gold)">' + hcTot.reduce(function(s,v){return s+v;},0) + '</td></tr>';
    h += '</tbody></table></div></div>';
    return h;
  }
  html += fulfillTable(function(d){ return !isSuperDeal(d) && /Closed Won|Active|Expanding|Recruit|Paper|Pricing/.test(d.status + ' ' + d.stage); }, 'Active Roles (non-Super)', false);
  html += fulfillTable(isSuperDeal, 'Super-Deal Active Roles', true);

  document.getElementById('mainContent').innerHTML = html;
}

// TAB: MRR FORECAST 2026
// ─────────────────────────────────────────────────────────────────────────────
function renderMRRForecast() {
  var deals = getDeals();
  var html = '';
  html += '<div class="page-title"><div><h1>MRR Forecast 2026</h1><div class="sub">Monthly Recurring Revenue projection · adjusted by win rate</div></div></div>';
  var months = ALL_MONTHS;
  // Group by client
  var byClient = {};
  deals.forEach(function(d) { if (!byClient[d.client]) byClient[d.client] = []; byClient[d.client].push(d); });
  var clients = Object.keys(byClient).sort();
  var html2 = '<div class="card" style="padding:6px"><div class="scroll-x"><table class="grid-tbl"><thead><tr><th>Client</th>';
  months.forEach(function(m){ html2 += '<th class="num">' + monthLabel(m) + '</th>'; });
  html2 += '<th class="num">Total Adj.</th></tr></thead><tbody>';
  var grand = months.map(function(){ return 0; });
  clients.forEach(function(c) {
    var sums = months.map(function(){ return 0; });
    byClient[c].forEach(function(d) {
      months.forEach(function(m, i){
        sums[i] += adjustedRevenue(d, m);
      });
    });
    var tot = sums.reduce(function(s,v){ return s + v; }, 0);
    if (tot < 1) return;
    html2 += '<tr><td>' + esc(c) + '</td>';
    sums.forEach(function(v, i){ grand[i] += v; html2 += '<td class="num">' + (v ? fmt$k(v) : '—') + '</td>'; });
    html2 += '<td class="num num-bold">' + fmt$k(tot) + '</td></tr>';
  });
  html2 += '<tr style="background:var(--navy);color:white;font-weight:700"><td style="color:white">TOTAL</td>';
  grand.forEach(function(v){ html2 += '<td class="num" style="color:white">' + fmt$k(v) + '</td>'; });
  html2 += '<td class="num" style="color:var(--gold)">' + fmt$k(grand.reduce(function(s,v){return s+v;},0)) + '</td></tr>';
  html2 += '</tbody></table></div></div>';
  html += html2;
  document.getElementById('mainContent').innerHTML = html;
}

    html += '<tr><td><b>' + esc(r.dealType) + '</b></td>';
    html += '<td class="num"><input type="number" min="0" max="100" step="1" value="' + Math.round(r.margin * 100) + '" onchange="updateMarginRule(' + i + ', this.value/100)" style="width:70px;padding:3px 7px;text-align:right;border:1px solid var(--border);border-radius:4px;font-family:inherit"></td>';

  html += '<ol style="font-size:12.5px;color:var(--muted);line-height:1.7;padding-left:20px">';

  html += '<li><b>By Deal Stage</b> — looks up the rule matching the deal\'s current stage (e.g. <i>Pricing</i>, <i>Recruitment</i>).</li>';

function updateMarginRule(idx, val) {
  var rules = getMarginRules();
  rules[idx].margin = parseFloat(val) || 0;
  setMarginRules(rules);
}
function openMarginRuleModal(idx) {
  var rules = getMarginRules();
  var r = idx === null ? { dealType:'', margin: 0.35, note:'' } : rules[idx];
  var html = '<h3>' + (idx === null ? 'Add Margin Rule' : 'Edit Margin Rule') + '</h3>';
  html += '<div class="form-group"><label>Deal Type / Stage</label><input id="r_type" value="' + esc(r.dealType) + '" placeholder="e.g. Pricing"></div>';
  html += '<div class="form-group"><label>Margin %</label><input type="number" min="0" max="100" step="1" id="r_margin" value="' + Math.round(r.margin * 100) + '"></div>';
  html += '<div class="form-group"><label>Note</label><textarea id="r_note">' + esc(r.note || '') + '</textarea></div>';
  html += '<div class="modal-actions">';
  if (idx !== null) html += '<button class="btn btn-danger" onclick="deleteMarginRule(' + idx + ')">Delete</button>';
  html += '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>';
  html += '<button class="btn btn-gold" onclick="saveMarginRule(' + (idx === null ? 'null' : idx) + ')">Save</button></div>';
  openModal(html);
}
function saveMarginRule(idx) {
  var rules = getMarginRules();
  var r = { dealType: document.getElementById('r_type').value.trim(), margin: (parseFloat(document.getElementById('r_margin').value) || 0) / 100, note: document.getElementById('r_note').value };
  if (idx === null) rules.push(r); else rules[idx] = r;
  setMarginRules(rules);
  closeModal();
  renderTab();
}
function deleteMarginRule(idx) {
  if (!confirm('Delete this rule?')) return;
  var rules = getMarginRules(); rules.splice(idx, 1); setMarginRules(rules); closeModal(); renderTab();
}
function resetMarginRules() {
  if (!confirm('Reset margin rules to defaults?')) return;
  setMarginRules(DEFAULT_MARGIN_RULES);
  renderTab();
}

function exportData() {
  var dump = { deals: getDeals(), margin_rules: getMarginRules(), snapshots: getSnapshots(), actuals: getActuals(), anchor_month: getAnchorMonth(), exportedAt: new Date().toISOString() };
  var blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aspenview-bde-forecast-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData(file) {
  if (!file) return;
  var r = new FileReader();
  r.onload = function() {
    try {
      var data = JSON.parse(r.result);
      if (!confirm('Replace all current data with imported data? Cannot be undone.')) return;
      if (data.deals)        setDeals(data.deals);
      if (data.margin_rules) setMarginRules(data.margin_rules);
      if (data.snapshots)    setSnapshots(data.snapshots);
      if (data.actuals)      setActuals(data.actuals);
      if (data.anchor_month) setAnchorMonth(data.anchor_month);
      alert('Imported successfully.');
      renderTab();
    } catch (e) { alert('Import failed: ' + e.message); }
  };
  r.readAsText(file);
}
function resetAllData() {
  if (!confirm('Reset ALL data (deals, rules, snapshots, actuals)? Cannot be undone.')) return;
  ['deals','margin_rules','snapshots','actuals','anchor_month'].forEach(function(k) { localStorage.removeItem('bde_' + k); });
  renderTab();
}

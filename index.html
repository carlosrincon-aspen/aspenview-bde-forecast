  h += '</div>';
  return h;
}

function renderPipelineOverview() {
  var allDeals = getDeals();
  // Exclude Closed Lost (not relevant to forecast or cash-flow).
  var afterLostFilter = allDeals.filter(function(d){ return d.stage !== 'Closed Lost'; });
  var lostCount = allDeals.length - afterLostFilter.length;
  // Only deals whose stage maps to one of Michael's 5 phases count toward the rollup.
  var unmappedCount = 0;
  var deals = afterLostFilter.filter(function(d) {
    var pid = phaseForDeal(d);
    if (!pid) { unmappedCount++; return false; }
    return true;
  });

  // Per-phase aggregates
  var perPhase = {};
  PHASES.forEach(function(p){ perPhase[p.id] = { deals:[], hc:0, mrr:0, arr:0 }; });
  deals.forEach(function(d){
    var pid = phaseForDeal(d);
    perPhase[pid].deals.push(d);
    perPhase[pid].hc  += dealHcForRollup(d);
    perPhase[pid].mrr += dealMRR(d);
    perPhase[pid].arr += dealARR(d);
  });

  var totalDeals = 0, totalHC = 0, totalMRR = 0, totalARR = 0;
  Object.keys(perPhase).forEach(function(k){
    totalDeals += perPhase[k].deals.length;
    totalHC    += perPhase[k].hc;
    totalMRR   += perPhase[k].mrr;
    totalARR   += perPhase[k].arr;
  });

  var html = '';
  html += '<div class="page-title"><div><h1>Pipeline <span style="color:var(--muted);font-weight:400">Overview</span></h1><div class="sub">Full pipeline grouped by the 5-phase sales model — the C-suite snapshot for sales, finance, and investors</div></div>';
  html += '<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="syncZohoDeals()">↻ Sync from Zoho</button></div></div>';

  // Coverage note: explain the difference vs the raw deal count in Aureum.
  if (lostCount > 0 || unmappedCount > 0) {
    var parts = [];
    if (lostCount > 0)     parts.push('<b>' + lostCount + '</b> Closed Lost');
    if (unmappedCount > 0) parts.push('<b>' + unmappedCount + '</b> with a stage not yet mapped to a phase');
    html += '<div style="margin:-4px 0 16px;padding:8px 12px;font-size:11.5px;color:var(--muted);background:#f6f9fc;border-left:3px solid var(--border);border-radius:0 4px 4px 0">';
    html += '<b style="color:var(--navy)">Showing ' + totalDeals + ' of ' + allDeals.length + ' deals.</b> Excluded: ' + parts.join(' · ') + '.';
    html += ' <span style="font-style:italic">Closed Lost deals don\'t contribute to forecast or cash-flow. Unmapped stages are usually legacy ghost deals — check the <b>Cleanup</b> tab to resolve them.</span>';
    html += '</div>';
  }

  // ─── KPI strip ───
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px">';
  html += pipelineKpiCard('Total Deals',          totalDeals.toLocaleString(),    'Across all 5 phases',     'navy');
  html += pipelineKpiCard('Total Headcount',      totalHC.toLocaleString(),       'Active resources',         'blue');
  html += pipelineKpiCard('Total Pipeline MRR',   fmt$k(totalMRR),                'Monthly recurring',        'gold');
  html += pipelineKpiCard('Total Pipeline ARR',   fmt$k(totalARR),                'Annual recurring',         'teal');
  html += '</div>';

  // ─── Forecast Coverage by Phase (Michael's idea) ───
  html += forecastCoverageCardHtml();

  // ─── Phase Breakdown table ───
  html += '<div class="card" style="padding:0;overflow:hidden;margin-bottom:22px">';
  html += '<div style="padding:10px 16px;border-bottom:1px solid var(--border);background:#f6f9fc"><b style="color:var(--navy);font-size:12px;text-transform:uppercase;letter-spacing:.4px">Phase Breakdown</b></div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#3a6fb2;color:white">';
  html += '<th style="text-align:left;padding:11px 14px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Phase</th>';
  html += '<th style="text-align:right;padding:11px 14px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Deals</th>';
  html += '<th style="text-align:right;padding:11px 14px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px">HC</th>';
  html += '<th style="text-align:right;padding:11px 14px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px">MRR</th>';
  html += '<th style="text-align:right;padding:11px 14px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px">ARR</th>';
  html += '<th style="text-align:right;padding:11px 14px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px">% of Total MRR</th>';
  html += '</tr></thead><tbody>';
  // Render in REVERSE phase order so Closed Won is at the top (like the investor screenshot).
  var phaseColors = { 1:'#3a6fb2', 2:'#9b59b6', 3:'#e8b84b', 4:'#2e9676', 5:'#c0392b' };
  var phasesReversed = PHASES.slice().reverse();
  phasesReversed.forEach(function(p, idx) {
    var stat = perPhase[p.id];
    var pct = totalMRR > 0 ? (stat.mrr / totalMRR) : 0;
    var focused = (pipelineSelectedPhase === p.id);
    var bg = focused ? '#fff8e1' : (idx % 2 === 0 ? 'white' : '#f9fbfd');
    var dot = phaseColors[p.id] || '#5a6a7a';
    html += '<tr style="background:' + bg + ';border-bottom:1px solid var(--border);cursor:pointer" onclick="focusPipelinePhase(' + p.id + ')" title="Click to focus the breakdown on this phase">';
    html += '<td style="padding:12px 14px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + dot + ';vertical-align:middle;margin-right:9px"></span>';
    html += '<span style="font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-right:10px">Phase ' + p.id + '</span>';
    html += '<b style="color:var(--navy)">' + esc(p.short) + '</b>';
    html += '</td>';
    html += '<td style="text-align:right;padding:12px 14px;font-weight:600">' + stat.deals.length + '</td>';
    html += '<td style="text-align:right;padding:12px 14px">' + stat.hc.toLocaleString() + '</td>';
    html += '<td style="text-align:right;padding:12px 14px;font-weight:700">' + fmt$k(stat.mrr) + '</td>';
    html += '<td style="text-align:right;padding:12px 14px;font-weight:700;color:var(--navy)">' + fmt$k(stat.arr) + '</td>';
    html += '<td style="text-align:right;padding:12px 14px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + dot + ';margin-right:8px"></span><b>' + (pct * 100).toFixed(1) + '%</b></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // ─── Deal Breakdown per phase (focused phase only if any selected) ───
  var phasesToShow = pipelineSelectedPhase ? [phaseById(pipelineSelectedPhase)] : phasesReversed;
  html += '<div style="margin-bottom:22px"><b style="color:var(--navy);font-size:12px;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:8px"><span style="display:inline-block;width:18px;height:2px;background:#3a6fb2"></span>Deal Breakdown' + (pipelineSelectedPhase ? ' — ' + esc(phaseById(pipelineSelectedPhase).short) + ' <button class="btn btn-ghost btn-sm" onclick="focusPipelinePhase(null)" style="margin-left:10px">✕ Show all phases</button>' : '') + '</b></div>';

  phasesToShow.forEach(function(p) {
    if (!p) return;
    var stat = perPhase[p.id];
    var expanded = pipelineSelectedPhase ? true : !!pipelineExpanded[p.id];
    var dot = phaseColors[p.id] || '#5a6a7a';
    html += '<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">';
    html += '<div style="padding:11px 16px;background:#f6f9fc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer" onclick="togglePipelinePhase(' + p.id + ')">';
    html += '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + dot + '"></span>';
    html += '<span style="font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700">Phase ' + p.id + '</span>';
    html += '<b style="color:var(--navy);font-size:14px">' + esc(p.short) + '</b>';
    html += '<span style="color:var(--muted);font-size:11.5px">' + stat.deals.length + ' deals · ' + stat.hc.toLocaleString() + ' HC · ' + fmt$k(stat.mrr) + ' MRR · ' + fmt$k(stat.arr) + ' ARR</span>';
    html += '<span style="margin-left:auto;font-size:11px;color:var(--muted)">' + (expanded ? '▾' : '▸') + '</span>';
    html += '</div>';

    if (expanded) {
      // Size bands inside this phase: Super (100+), Large (50-99), Mid (11-49), Small (1-10)
      var sizeGroups = { super: [], large: [], mid: [], small: [] };
      stat.deals.forEach(function(d) { sizeGroups[dealSizeBucket(dealHcForRollup(d))].push(d); });
      Object.keys(sizeGroups).forEach(function(k) {
        sizeGroups[k].sort(function(a,b){ return dealMRR(b) - dealMRR(a); });
      });

      if (!stat.deals.length) {
        html += '<div class="empty" style="padding:18px">No deals in this phase.</div>';
      } else {
        html += '<table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr style="background:#3a6fb2;color:white">';
        html += '<th style="text-align:left;padding:9px 12px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px">Deal Name</th>';
        html += '<th style="text-align:left;padding:9px 12px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px">Closing Date</th>';
        html += '<th style="text-align:right;padding:9px 12px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px">HC</th>';
        html += '<th style="text-align:right;padding:9px 12px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px">$/HC</th>';
        html += '<th style="text-align:right;padding:9px 12px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px">Total MRR</th>';
        html += '<th style="text-align:right;padding:9px 12px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px">Total ARR</th>';
        html += '</tr></thead><tbody>';

        var groupLabels = { super: { label: 'SUPER DEAL', range: '+100 HC',  bg:'#0A1928', color:'white' },
                            large: { label: 'LARGE',      range: '50–99 HC', bg:'#e8b84b', color:'#0A1928' },
                            mid:   { label: 'MID',        range: '11–49 HC', bg:'#3a6fb2', color:'white' },
                            small: { label: 'SMALL',      range: '1–10 HC',  bg:'#2e9676', color:'white' } };
        var rowNum = 0;
        ['super','large','mid','small'].forEach(function(k) {
          var arr = sizeGroups[k];
          if (!arr.length) return;
          var g = groupLabels[k];
          var groupHC  = arr.reduce(function(s,d){return s+dealHcForRollup(d);},0);
          var groupMRR = arr.reduce(function(s,d){return s+dealMRR(d);},0);
          var groupARR = arr.reduce(function(s,d){return s+dealARR(d);},0);
          html += '<tr style="background:' + g.bg + ';color:' + g.color + '">';
          html += '<td colspan="2" style="padding:8px 12px"><span style="padding:3px 9px;background:rgba(255,255,255,.18);border-radius:14px;font-size:10px;font-weight:700;letter-spacing:.4px;margin-right:8px">' + g.label + '</span>' + arr.length + ' DEAL' + (arr.length > 1 ? 'S' : '') + ' · ' + g.range + '</td>';
          html += '<td style="text-align:right;padding:8px 12px;font-weight:700">' + groupHC.toLocaleString() + '</td>';
          html += '<td style="text-align:right;padding:8px 12px">' + (groupHC > 0 ? fmt$k(groupMRR/groupHC) : '—') + '</td>';
          html += '<td style="text-align:right;padding:8px 12px;font-weight:700">' + fmt$k(groupMRR) + '</td>';
          html += '<td style="text-align:right;padding:8px 12px;font-weight:700">' + fmt$k(groupARR) + '</td>';
          html += '</tr>';
          arr.forEach(function(d) {
            rowNum++;
            var hc = dealHcForRollup(d);
            var mrr = dealMRR(d);
            var perHead = hc > 0 ? mrr / hc : 0;
            var bg = rowNum % 2 === 0 ? '#f9fbfd' : 'white';
            var dealCell = esc(d.dealName);
            if (d.zohoId) {
              var url = 'https://crm.zoho.' + ZOHO_DC + '/crm/tab/Potentials/' + encodeURIComponent(d.zohoId);
              dealCell = '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--navy);text-decoration:none;border-bottom:1px dashed var(--gold)">' + esc(d.dealName) + '</a>';
            }
            html += '<tr style="background:' + bg + ';border-bottom:1px solid var(--border)">';
            html += '<td style="padding:8px 12px"><span style="color:var(--muted);font-size:11px;margin-right:8px">' + rowNum + '.</span>' + dealCell + '</td>';
            html += '<td style="padding:8px 12px;color:var(--muted);font-size:11.5px">' + (d.closingDate ? formatClosingDate(d.closingDate) : '—') + '</td>';
            html += '<td style="text-align:right;padding:8px 12px"><span style="display:inline-block;min-width:32px;padding:2px 8px;background:#e8eef5;border-radius:12px;font-weight:600">' + (hc || '—') + '</span></td>';
            html += '<td style="text-align:right;padding:8px 12px">' + (perHead > 0 ? fmt$k(perHead) : '—') + '</td>';
            html += '<td style="text-align:right;padding:8px 12px;font-weight:700">' + fmt$k(mrr) + '</td>';
            html += '<td style="text-align:right;padding:8px 12px;font-weight:700;color:var(--navy)">' + fmt$k(mrr * 12) + '</td>';
            html += '</tr>';
          });
        });

        // Summary row
        html += '<tr style="background:#3a6fb2;color:white;font-weight:700">';
        html += '<td colspan="2" style="padding:10px 12px;text-transform:uppercase;letter-spacing:.4px;font-size:11px">Summary</td>';
        html += '<td style="text-align:right;padding:10px 12px">' + stat.hc.toLocaleString() + '</td>';
        html += '<td style="text-align:right;padding:10px 12px">' + (stat.hc > 0 ? fmt$k(stat.mrr/stat.hc) : '—') + '</td>';
        html += '<td style="text-align:right;padding:10px 12px">' + fmt$k(stat.mrr) + '</td>';
        html += '<td style="text-align:right;padding:10px 12px">' + fmt$k(stat.arr) + '</td>';
        html += '</tr>';
        html += '</tbody></table>';
      }
    }
    html += '</div>';
  });

  // ─── Deal Age Segmentation ───
  var ageBuckets = { healthy:[], active:[], slow:[], critical:[] };
  var ageless = 0;
  deals.forEach(function(d) {
    var b = dealAgeBucket(d);
    if (!b) { ageless++; return; }
    ageBuckets[b].push(d);
  });
  function ageCard(key, label, sub, dot, bg) {
    var arr = ageBuckets[key];
    var hc  = arr.reduce(function(s,d){return s+dealHcForRollup(d);},0);
    var mrr = arr.reduce(function(s,d){return s+dealMRR(d);},0);
    return '<div style="flex:1;min-width:170px;padding:14px 16px;background:' + bg + ';border-radius:10px;border:1px solid rgba(0,0,0,.05)">'
         + '<div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:' + dot + '">● ' + esc(label) + '</div>'
         + '<div style="font-size:10.5px;color:var(--muted);margin-top:1px">' + esc(sub) + '</div>'
         + '<div style="font-size:24px;font-weight:900;margin-top:8px;color:var(--navy)">' + arr.length + ' <span style="font-size:12px;color:var(--muted);font-weight:400">deals</span></div>'
         + '<div style="font-size:11px;color:var(--muted);margin-top:4px">' + hc.toLocaleString() + ' HC · ' + fmt$k(mrr) + ' MRR · ' + fmt$k(mrr*12) + ' ARR</div>'
         + '</div>';
  }
  html += '<div style="margin:6px 0 10px"><b style="color:var(--navy);font-size:12px;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:8px"><span style="display:inline-block;width:18px;height:2px;background:#3a6fb2"></span>Deal Age Segmentation — Likelihood to Close by Creation Date</b></div>';
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap">';
  html += ageCard('healthy',  'HEALTHY',         '<3 months',      '#2e9676', '#eaf6ef');
  html += ageCard('active',   'ACTIVE PIPELINE', '3–6 months',     '#5a6a7a', '#f1f4f8');
  html += ageCard('slow',     'SLOW-MOVING',     '6–12 months',    '#e8b84b', '#fdf6e6');
  html += ageCard('critical', 'CRITICAL',        '>1 year',        '#c0392b', '#fdecea');
  html += '</div>';
  if (ageless > 0) {
    html += '<div style="margin-top:10px;font-size:11px;color:var(--muted);font-style:italic">' + ageless + ' deal' + (ageless === 1 ? '' : 's') + ' have no Created_Time from Zoho yet — they will join an age bucket after the next ↻ Sync from Zoho.</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
}

function formatClosingDate(s) {
  if (!s) return '';
  // Accept 'YYYY-MM-DD' or full ISO. Display 'MMM dd, YYYY'.
  var m = String(s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return esc(s);
  var d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
}

// Bottom-bar actions on Aureum (Michael's flow: review totals → lock → push, all on one screen).
function aureumLockForecast() {
  var anchor = getAnchorMonth();
  lockForecast(anchor);   // saves the snapshot + re-renders
  setTimeout(function(){
    if (confirm('Forecast locked for ' + monthLabel(anchor) + '.\n\nPush any changed deals to Zoho now?')) aureumPushToZoho();
  }, 60);
}
function aureumPushToZoho() {
  var anchor = getAnchorMonth();
  var snap = getSnapshots().find(function(s){ return s.snapshotMonth === anchor; });
  if (!snap || !snap.locked) { alert('Lock the forecast first — click “🔒 Lock ' + monthLabel(anchor) + ' forecast”, then push changes to Zoho.'); return; }
  pushApprovedToZoho();   // existing push (handles Zoho token + WRITE scope; messages if not enabled)
}
// ─────────────────────────────────────────────────────────────────────────────
// TAB: AUREUM DEMAND FORECAST (main grid)
// ─────────────────────────────────────────────────────────────────────────────
function renderAureumGrid() {
  var deals  = getDeals();
  var f      = filterScope('aureum');
  var anchor = getAnchorMonth();
  // Multi-year single input (Michael's model): on one tab Don spreads HC month-by-month for the
  // current calendar year (Y1, from the anchor → Dec) and the next full year (Y2, Jan–Dec), with a
  // calendar-year $ total after each. The third year (Y3) is NOT spread — it's a growth-% per deal
  // (default at top, overridable) applied to the Y2 total.
  function _pad2(n){ return ('0' + n).slice(-2); }
  var aYear = parseInt(anchor.split('-')[0]), aMon = parseInt(anchor.split('-')[1]);
  var Y1 = aYear, Y2 = aYear + 1, Y3 = aYear + 2;
  var monthsY1 = []; for (var _m = aMon; _m <= 12; _m++) monthsY1.push(Y1 + '-' + _pad2(_m));
  var monthsY2 = []; for (var _m = 1;   _m <= 12; _m++) monthsY2.push(Y2 + '-' + _pad2(_m));
  var months   = monthsY1.concat(monthsY2);     // all editable months (used for cell rendering / totals)
  var N1 = monthsY1.length;
  var defGrowth = getDefaultGrowthPct();
  // Annual $ for a deal over a set of months = Σ (HC[m] × $/head).
  function yearDollars(d, mk, pph) { return mk.reduce(function(s, m){ return s + (((d.monthlyHC || {})[m] || 0) * pph); }, 0); }

  var activePhases = getActivePhases();
  var filtered = deals.filter(function(d) {
    if (!passSearch('aureum', (d.dealName || '') + ' ' + (d.client || '') + ' ' + (d.bde || ''))) return false;
    if (!passMulti('aureum', 'status', d.status)) return false;
    if (!passMulti('aureum', 'stage',  d.stage))  return false;
    if (!passMulti('aureum', 'bde',    d.bde))    return false;
    if (f.forecastOnly && !d.inForecast) return false;
    if (f.superOnly    && !isSuperDeal(d)) return false;
    if (f.phaseFilterOn) {
      var pid = phaseForDeal(d);
      if (!pid || activePhases.indexOf(pid) < 0) return false;
    }
    return true;
  });
  // Account-level traceability: group all deals of the same client together (then by deal name)
  filtered.sort(function(a, b) {
    var ca = (a.client || '').toLowerCase(), cb = (b.client || '').toLowerCase();
    if (ca !== cb) return ca < cb ? -1 : 1;
    return (a.dealName || '').toLowerCase() < (b.dealName || '').toLowerCase() ? -1 : 1;
  });

  var bdes = uniqueBdes(deals);

  var html = '';
  html += '<div class="page-title"><div><h1>Aureum Demand Forecast (Pipeline + Active)</h1><div class="sub">The single input — one screen for <b>' + Y1 + ', ' + Y2 + ' &amp; ' + Y3 + '</b>. Spread ' + Y1 + '/' + Y2 + ' by month; ' + Y3 + ' by growth %. Lock &amp; push to Zoho at the bottom.</div></div>';
  html += '<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" id="zohoSyncBtn" onclick="syncZohoDeals()">↻ Sync from Zoho</button>';
  html += '<button class="btn btn-gold btn-sm" onclick="newDealInZoho()">+ New Deal (in Zoho)</button></div></div>';

  // "Build & Invoice, not Close" reminder — Michael's framing for the whole model.
  html += '<div style="margin:0 0 14px;padding:10px 14px;background:linear-gradient(90deg,#fff8e1 0%, #fdf6e6 100%);border-left:4px solid var(--gold);border-radius:0 6px 6px 0;font-size:12.5px;color:var(--navy)">';
  html += '<b style="text-transform:uppercase;letter-spacing:.5px;font-size:11px">⚡ Build &amp; Invoice — NOT Close</b><br>';
  html += '<span style="color:var(--muted)">HC by month is when a person actually <b>starts billing</b>, not when the deal closes. CGI may close in June but ramp 35 → 70 → 70 across the next weeks — put those in the month they bill, not the month you sign.</span>';
  html += '</div>';

  // Phase filter strip — Michael's 5 phases. He asked for the "Filter by phase"
  // control to sit on the LEFT, right next to the phase pills, so it's easy to find.
  html += '<div style="margin-bottom:14px;padding:12px 14px;background:#f6f9fc;border:1px solid var(--border);border-radius:8px">';
  html += '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
  // LEFT: master "Filter by phase" toggle
  html += '<label style="display:flex;align-items:center;gap:8px;white-space:nowrap;padding:8px 14px;background:' + (f.phaseFilterOn ? 'var(--gold)' : 'white') + ';border:1px solid ' + (f.phaseFilterOn ? '#c79827' : 'var(--border)') + ';border-radius:8px;cursor:pointer">';
  html += '<input type="checkbox"' + (f.phaseFilterOn ? ' checked' : '') + ' onchange="filterScope(\'aureum\').phaseFilterOn=this.checked; renderAureumGrid()">';
  html += '<span style="font-weight:700;color:var(--navy);font-size:12px">⛃ Filter by phase</span></label>';
  // Phase pills
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;flex:1;align-items:center">';
  PHASES.forEach(function(p) {
    var active = activePhases.indexOf(p.id) >= 0;
    var count  = deals.filter(function(d){ return phaseForDeal(d) === p.id; }).length;
    var dim    = f.phaseFilterOn ? '' : 'opacity:.55;';   // pills only "live" when the filter is on
    var bg, color, border;
    if (active) {
      if (p.cls === 'pill-gold')        { bg = '#E8B84B'; color = '#0A1928'; border = '#c79827'; }
      else if (p.cls === 'pill-blue')   { bg = '#1d4a86'; color = 'white';   border = '#13335c'; }
      else if (p.cls === 'pill-green')  { bg = '#2e7d32'; color = 'white';   border = '#1f5a23'; }
      else if (p.cls === 'pill-aureum') { bg = '#00838f'; color = 'white';   border = '#00606b'; }
      else                              { bg = '#0A1928'; color = 'white';   border = '#000';    }
    } else { bg = 'white'; color = 'var(--muted)'; border = 'var(--border)'; }
    html += '<button onclick="togglePhaseActive(' + p.id + ')" title="' + esc(p.note) + '" style="' + dim + 'padding:6px 12px;background:' + bg + ';color:' + color + ';border:1px solid ' + border + ';border-radius:20px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px">';
    html += (active ? '✓ ' : '') + esc(p.short);
    html += ' <span style="opacity:.7;font-size:10px;font-weight:500">(' + count + ')</span>';
    html += '</button>';
  });
  html += '</div>';
  html += '<div style="font-size:11px;color:var(--muted);max-width:230px">Turn on the filter, then pick which phases enter the forecast. Closed Won is captured in cash flow, not forecasted.</div>';
  html += '</div></div>';

  html += '<div class="toolbar">';
  html += searchBox('aureum', 'Search deal, client, BDE…');
  html += msDropdown('aureum', 'bde',    'BDE',    bdes);
  html += msDropdown('aureum', 'stage',  'Stage',  ALLOWED_STAGES);
  html += '<label style="font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px"><input type="checkbox"' + (f.forecastOnly ? ' checked' : '') + ' onchange="filterScope(\'aureum\').forecastOnly=this.checked; renderAureumGrid()"> Forecast only</label>';
  html += '<label style="font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px"><input type="checkbox"' + (f.superOnly ? ' checked' : '') + ' onchange="filterScope(\'aureum\').superOnly=this.checked; renderAureumGrid()"> Super-deals only</label>';
  if (canGovern()) html += '<label style="font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px" title="Default annual growth % for ' + Y3 + ' — applies to any deal with no per-deal % set"><b style="color:var(--navy)">' + Y3 + ' default growth</b> <input type="number" step="0.5" value="' + defGrowth + '" onchange="setDefaultGrowthPct(this.value)" style="width:54px"> %</label>';

function updateDealHC(idx, monthKey, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  d.monthlyHC = d.monthlyHC || {};
  var oldV = d.monthlyHC[monthKey] || 0;
  var v = parseInt(value);
  if (!v || isNaN(v) || v <= 0) delete d.monthlyHC[monthKey];
  else d.monthlyHC[monthKey] = v;
  d.totalHC = sumMonths(d.monthlyHC);
  setDeals(deals);
  logActivity('Forecast', 'Edit HC', d.dealName + ' · ' + monthKey + ': ' + oldV + ' → ' + (d.monthlyHC[monthKey] || 0));
}
// Fcst HC is an independent field: Don types the total headcount he forecasts for the deal.
// It is NOT tied to the monthly cells — the ⇶ Spread tool is what distributes this total
// across the phases/months when Don is ready. So we only store the total here.
function updateForecastHC(idx, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  var total = parseInt(value); if (isNaN(total) || total < 0) total = 0;
  var oldTotal = d.totalHC || 0;
  d.totalHC = total;
  setDeals(deals);
  logActivity('Forecast', 'Edit Fcst HC', d.dealName + ': ' + oldTotal + ' → ' + total);
  renderTab();
}
// Revert a deal's manual forecast edits back to the original Zoho baseline (Michael's "go back to
// what was originally there"). Clears per-deal overrides + the monthly build; Zoho HC / Zoho $/head
// are read-only and never changed, so they're the reference we restore to.
function revertDeal(idx) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  if (!confirm('Revert "' + (d.dealName || 'this deal') + '" to its original Zoho values?\n\nThis clears your manual changes — forecast HC build, $/head, win %, margin and growth % — and restores the Zoho figures.')) return;
  delete d.dollarPerHead;
  delete d.winRateAdj;
  delete d.actualMargin;
  delete d.marginOverride;
  delete d.growthPct;
  d.monthlyHC = {};
  d.totalHC = (d.zoho_totalHC && d.zoho_totalHC > 0) ? d.zoho_totalHC : 0;
  setDeals(deals);
  logActivity('Forecast', 'Revert deal', (d.dealName || '') + ' restored to original Zoho values');
  renderTab();
}
function updateDealField(idx, field, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  var oldV = d[field];
  d[field] = value === '' || isNaN(parseFloat(value)) ? '' : parseFloat(value);
  setDeals(deals);
  var labels = { winRateAdj: 'Win %', actualMargin: 'Actual margin %', marginOverride: 'Actual margin %', dollarPerHead: '$/head' };
  var label = labels[field] || field;
  var fmtVal = function(v){
    if (v === '' || v === undefined || v === null) return '—';
    if (field === 'winRateAdj' || field === 'actualMargin' || field === 'marginOverride') return Math.round(v * 100) + '%';
    return v;
  };
  logActivity('Forecast', 'Edit ' + label, d.dealName + ': ' + fmtVal(oldV) + ' → ' + fmtVal(d[field]));
}

function openSpreadModal(idx) {

  var monthOpts = rollingMonths(anchor, 24).map(function(m){ return '<option value="' + m + '"' + (m === anchor ? ' selected' : '') + '>' + monthLabel(m) + '</option>'; }).join('');
  var html = '';
  html += '<h3>Spread headcount — ' + esc(d.dealName) + '</h3>';
  html += '<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Enter the total headcount and how it ramps. The tool fills the monthly build for you — it <b>overwrites</b> this deal\'s current build.</p>';
  html += '<div class="form-row"><div class="form-group"><label>Total headcount</label><input type="number" id="sp_total" min="0" value="' + totalDefault + '"></div>';
  html += '<div class="form-group"><label>Start month</label><select id="sp_start">' + monthOpts + '</select></div></div>';
  html += '<div class="form-row"><div class="form-group"><label>First wave at start (HC you know now)</label><input type="number" id="sp_first" min="0" value="0" placeholder="0 = even spread"></div>';
  html += '<div class="form-group"><label># of phases / waves</label><input type="number" id="sp_phases" min="1" value="3"></div></div>';
  html += '<div class="form-row"><div class="form-group"><label>Months between phases</label><input type="number" id="sp_step" min="1" value="2"></div><div class="form-group"></div></div>';
  html += '<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="applySpread(' + idx + ')">Spread it</button></div>';
  openModal(html);
}
function applySpread(idx) {
  var deals = getDeals(); var d = deals[idx]; if (!d) { closeModal(); return; }
  var total  = parseInt(document.getElementById('sp_total').value) || 0;
  var start  = document.getElementById('sp_start').value;
  var first  = parseInt(document.getElementById('sp_first').value) || 0;
  var phases = Math.max(1, parseInt(document.getElementById('sp_phases').value) || 1);
  var step   = Math.max(1, parseInt(document.getElementById('sp_step').value) || 1);
  if (total <= 0) { alert('Enter a total headcount greater than 0.'); return; }
  if (first > total) first = total;
  var plan = {};
  if (first > 0) {
    plan[start] = first;
    var remaining = total - first, lp = phases - 1;
    if (lp <= 0) { plan[start] = total; }
    else {
      var per = Math.floor(remaining / lp), left = remaining - per * lp;
      for (var i = 1; i <= lp; i++) { var mk = monthKeyAfter(start, i * step); var c = per + (i === lp ? left : 0); if (c > 0) plan[mk] = (plan[mk] || 0) + c; }
    }
  } else {
    var per2 = Math.floor(total / phases), left2 = total - per2 * phases;
    for (var j = 0; j < phases; j++) { var mk2 = monthKeyAfter(start, j * step); var c2 = per2 + (j === phases - 1 ? left2 : 0); if (c2 > 0) plan[mk2] = (plan[mk2] || 0) + c2; }
  }
  d.monthlyHC = plan;
  d.totalHC = sumMonths(plan);
  setDeals(deals);
  logActivity('Forecast', 'Spread headcount', d.dealName + ' · ' + total + ' HC over ' + phases + ' phase(s), every ' + step + ' mo');
  closeModal();
  renderTab();
}

var adjustedByAccuracy = false;

// Cache: per-BDE accuracy bands { bde_lower: {m0,m1,m2} } + aggregate fallback.
// Recomputed on each render (cheap; snapshots are small).
function accuracyLookup() {
  var bdes = bdesInSnapshots();
  var lookup = { __aggregate__: computeAccuracyBands() };
  bdes.forEach(function(b) { lookup[b.toLowerCase()] = computeAccuracyBands({ bde: b }); });
  return lookup;
}
function accuracyForDeal(d, horizon, lookup) {
  // horizon: 'm0' | 'm1' | 'm2'. Falls back to aggregate when no per-BDE history yet.
  var key = (d.bde || '').toLowerCase();
  var b = lookup[key] || lookup.__aggregate__;
  return b[horizon] && !b[horizon].isDefault ? b[horizon].acc : lookup.__aggregate__[horizon].acc;
}

// Week-over-week forecast changes (Don's ask): diff the two most recent weekly snapshots
// per deal — what was added, removed, or had its headcount / adjusted revenue change.
function weekOverWeekChanges() {
  var snaps = getTrendSnapshots().filter(function(s){ return !s.isDemo && s.deals; })
    .sort(function(a,b){ return a.weekKey < b.weekKey ? -1 : 1; });
  if (snaps.length < 2) return null;
  var cur = snaps[snaps.length - 1], prev = snaps[snaps.length - 2];
  var prevBy = {}; (prev.deals || []).forEach(function(d){ prevBy[d.dealName] = d; });
  var curBy  = {}; (cur.deals  || []).forEach(function(d){ curBy[d.dealName]  = d; });
  var added = [], removed = [], changed = [];
  (cur.deals || []).forEach(function(d){
    var p = prevBy[d.dealName];
    if (!p) { added.push(d); return; }
    if ((p.hc || 0) !== (d.hc || 0) || Math.abs((p.adjRev || 0) - (d.adjRev || 0)) > 0.5) {
      changed.push({ deal: d, prevHc: p.hc || 0, hc: d.hc || 0, prevAdj: p.adjRev || 0, adj: d.adjRev || 0 });
    }
  });
  (prev.deals || []).forEach(function(d){ if (!curBy[d.dealName]) removed.push(d); });
  return { cur: cur, prev: prev, added: added, removed: removed, changed: changed };
}

  if (!w) { h += '<div class="empty">Once the platform has two weekly snapshots, changes to forecasted deals (added, removed, headcount up or down) show here.</div></div>'; return h; }

  h += '</tbody></table></div>';
  return h;
}

// TAB: FORECAST TREND (weekly snapshots of headline totals)
// ─────────────────────────────────────────────────────────────────────────────
// ISO-week key: yyyy-Www. Snapshots are deduped on this key so multiple opens
// on the same week produce only one entry; weekly cadence aligns with Monday.
function weekKeyFromDate(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  var weekNum = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return date.getUTCFullYear() + '-W' + ('0' + weekNum).slice(-2);
}
function currentWeekKey() { return weekKeyFromDate(new Date()); }
function mondayOfWeekKey(weekKey) {
  var parts = weekKey.split('-W');
  var year = parseInt(parts[0], 10);
  var week = parseInt(parts[1], 10);
  var jan4 = new Date(Date.UTC(year, 0, 4));
  var jan4Day = jan4.getUTCDay() || 7;
  var mondayW1 = new Date(jan4); mondayW1.setUTCDate(jan4.getUTCDate() - (jan4Day - 1));
  var monday = new Date(mondayW1); monday.setUTCDate(mondayW1.getUTCDate() + (week - 1) * 7);
  return monday;
}
function weekShortLabel(weekKey) {
  var m = mondayOfWeekKey(weekKey);
  return m.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Snapshot shape: {weekKey, takenAt, takenBy, anchorMonth, dealsForecasted,
// totalHC, totalAdjRev, isDemo, deals: [perDeal contributions]}.
// deals is populated for snapshots taken AFTER the drill-down feature shipped;
// older snapshots and the seeded demo points have it undefined, in which case
// the drill-down falls back to the current forecast list with a disclaimer.
function computeTrendDealList() {
  var deals  = getDeals();
  var anchor = getAnchorMonth();
  var months = [anchor, monthKeyAfter(anchor, 1), monthKeyAfter(anchor, 2)];
  return deals.filter(function(d){ return d.inForecast; }).map(function(d) {
    var hc = 0, adjRev = 0;
    months.forEach(function(mk) {
      hc     += (d.monthlyHC || {})[mk] || 0;
      adjRev += adjustedRevenue(d, mk);
    });
    return {
      dealName: d.dealName,
      client:   d.client || '',
      bde:      d.bde || '',
      stage:    d.stage || '',
      zohoId:   d.zohoId || '',
      hc:       hc,
      mrr:      effectivePricing(d),
      win:      getWinRateFor(d),
      margin:   getMarginFor(d),
      adjRev:   adjRev,
      isSuperDeal: !!d.isSuperDeal
    };
  });
}
function computeTrendTotalsNow() {
  var deals  = getDeals();
  var anchor = getAnchorMonth();
  var months = [anchor, monthKeyAfter(anchor, 1), monthKeyAfter(anchor, 2)];
  var totHC = 0, totAdj = 0, count = 0;
  deals.forEach(function(d) {
    if (!d.inForecast) return;
    count++;
    months.forEach(function(mk) {
      totHC  += (d.monthlyHC || {})[mk] || 0;
      totAdj += adjustedRevenue(d, mk);
    });
  });
  return { dealsForecasted: count, totalHC: totHC, totalAdjRev: totAdj, anchorMonth: anchor };
}
function ensureWeeklyTrendSnapshot() {
  var snaps = getTrendSnapshots();
  var key   = currentWeekKey();
  if (snaps.find(function(s){ return s.weekKey === key && !s.isDemo; })) return;
  // Replace any demo snapshot at the current week with the real one.
  snaps = snaps.filter(function(s){ return s.weekKey !== key; });
  var t = computeTrendTotalsNow();
  snaps.push({
    weekKey: key,
    takenAt: new Date().toISOString(),
    takenBy: (currentUser && currentUser.email) || 'auto',
    anchorMonth: t.anchorMonth,
    dealsForecasted: t.dealsForecasted,
    totalHC: t.totalHC,
    totalAdjRev: t.totalAdjRev,
    deals: computeTrendDealList(),
    isDemo: false
  });
  // Keep ordered by weekKey for deterministic rendering.
  snaps.sort(function(a,b){ return a.weekKey < b.weekKey ? -1 : a.weekKey > b.weekKey ? 1 : 0; });
  setTrendSnapshots(snaps);
  logActivity('Forecast', 'Weekly trend snapshot', key + ' · ' + t.dealsForecasted + ' deals · ' + t.totalHC + ' HC');
}
function forceTrendSnapshot() {
  var snaps = getTrendSnapshots();

  setTrendSnapshots(snaps);

}

// Toggle granularity is rendered client-side; not persisted.
var trendGranularity = 'weekly';
function setTrendGranularity(g) { trendGranularity = g; renderTab(); }

function aggregateTrendByGranularity(snaps, granularity) {
  // Snapshots come in week order. For 'monthly' we keep the LAST snapshot of each
  // month; for 'quarterly' the last of each Q. 'weekly' keeps the last ~12 entries.
  if (granularity === 'weekly') {
    return snaps.slice(-12);
  }
  function bucketKey(s) {
    var m = mondayOfWeekKey(s.weekKey);
    var y = m.getUTCFullYear();
    var mo = m.getUTCMonth();
    if (granularity === 'monthly') return y + '-' + ('0' + (mo + 1)).slice(-2);
    var q = Math.floor(mo / 3) + 1;
    return y + '-Q' + q;
  }
  var buckets = {};
  snaps.forEach(function(s) { buckets[bucketKey(s)] = s; });
  var keys = Object.keys(buckets).sort();
  if (granularity === 'monthly') keys = keys.slice(-6);
  else                            keys = keys.slice(-4);
  return keys.map(function(k){ return buckets[k]; });
}
function trendXAxisLabel(s, granularity) {
  if (granularity === 'weekly') return weekShortLabel(s.weekKey);
  var m = mondayOfWeekKey(s.weekKey);
  if (granularity === 'monthly') return m.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
  var q = Math.floor(m.getUTCMonth() / 3) + 1;
  return 'Q' + q + ' ' + String(m.getUTCFullYear()).slice(-2);
}

  html += deltaCell(first.dealsForecasted, last.dealsForecasted) + '</div>';
  html += '<div class="card" style="padding:12px 14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Total HC (3-mo)</div>';

  // Three chart cards — each shows Forecast (solid) vs Actual (dashed green).
  var clickHint = ' · <b style="color:var(--gold)">Click any point</b> to see the deals behind it';
  var actualHint = '<span style="font-size:10.5px;color:var(--muted);margin-left:6px">· solid = forecast · <span style="color:#2e7d32">dashed = actual</span> (filled from Actuals + backfill)</span>';

var _trendChartInstances = {};
var _currentTrendPoints  = [];  // referenced by chart onClick to open the drill-down
// Build "Actual" series per snapshot point: for each snapshot, sum actuals across
// its 3-month anchor window. Months without actuals leave that point as null
// (Chart.js renders gaps). Sources: getActuals() (Enter Actuals) + historical
// accuracy backfill (per-month actual rollup across BDE rows).
function computeActualSeries(points) {
  var actuals = getActuals();
  var hist    = getHistoricalAccuracy();
  var deals   = getDeals();
  // Pre-index historical_accuracy by month → summed actual across BDE rows.
  var histByMonth = {};
  hist.forEach(function(h) {
    if (!h.month || !h.actual) return;
    histByMonth[h.month] = (histByMonth[h.month] || 0) + h.actual;
  });
  // Pre-index closed-won deals by closing month for the deals "actual" series.
  var cwByMonth = {};
  deals.forEach(function(d) {
    if (d.stage !== 'Closed Won' || !d.closingDate) return;
    var m = (d.closingDate.match(/^\d{4}-\d{2}/) || [])[0];
    if (!m) return;
    cwByMonth[m] = (cwByMonth[m] || 0) + 1;
  });
  return {
    deals: points.map(function(s) {
      var window = [s.anchorMonth, monthKeyAfter(s.anchorMonth, 1), monthKeyAfter(s.anchorMonth, 2)];
      var total = 0, found = 0;
      window.forEach(function(m) { if (cwByMonth[m] !== undefined) { total += cwByMonth[m]; found++; } });
      return found === 0 ? null : total;
    }),
    hc: points.map(function(s) {
      var window = [s.anchorMonth, monthKeyAfter(s.anchorMonth, 1), monthKeyAfter(s.anchorMonth, 2)];
      var total = 0, found = 0;
      window.forEach(function(m) { var a = actuals[m]; if (a && a.hc != null && a.hc !== '') { total += a.hc; found++; } });
      return found === 0 ? null : total;
    }),
    adjRev: points.map(function(s) {
      var window = [s.anchorMonth, monthKeyAfter(s.anchorMonth, 1), monthKeyAfter(s.anchorMonth, 2)];
      var total = 0, found = 0;
      window.forEach(function(m) {
        var a = actuals[m];
        if (a && a.adjRev != null && a.adjRev > 0) { total += a.adjRev; found++; }
        else if (histByMonth[m] > 0)               { total += histByMonth[m]; found++; }
      });
      return found === 0 ? null : total;
    })
  };
}

// Build the Super-Deals qualitative table from the live 100+ HC deals (Michael's rule),
// grouped by client. Per-client qualitative assessments + notes + any activation override
// are preserved across syncs; peak HC / phase-1 / activation are recomputed from the deals.
function reconcileSuperPrograms() {
  var stored = getSuperPrograms();
  var byClient = {};
  stored.forEach(function(p){ byClient[normDealName(p.client || '')] = p; });
  var groups = {};
  getDeals().filter(isSuperDeal).forEach(function(d){
    var key = normDealName(d.client || d.dealName || '');
    if (!key) return;
    if (!groups[key]) groups[key] = { client: d.client || d.dealName, hc:0, phase1:0, acts:[], topHC:-1, zohoId:'', dealName:'' };
    var hc = dealHcForRollup(d);
    groups[key].hc += hc;
    var mk = Object.keys(d.monthlyHC || {}).sort();
    var firstWave = mk.length ? (d.monthlyHC[mk[0]] || 0) : 0;
    // Representative deal for the client = its largest deal. The Zoho link AND Phase 1 both point
    // at this deal, so Phase 1 = the first wave (first build month) of the deal you open on click.
    if (hc > groups[key].topHC) {
      groups[key].topHC = hc;
      groups[key].zohoId = d.zohoId || '';
      groups[key].dealName = d.dealName || '';
      groups[key].phase1 = firstWave;
    }
    if (mk.length) groups[key].acts.push(mk[0]);
    if (d.startDate) groups[key].acts.push(String(d.startDate).slice(0,7));
  });
  var out = Object.keys(groups).sort().map(function(key){
    var g = groups[key], prev = byClient[key] || {};
    var p = {};
    Object.keys(SUPER_OPTIONS).forEach(function(f){ p[f] = prev[f] || ''; });
    p.notes      = prev.notes || '';
    p.client     = g.client;
    p.peakHC     = g.hc;
    p.phase1     = g.phase1;
    p.zohoId     = g.zohoId;
    p.dealName   = g.dealName;
    var firstAct = g.acts.filter(Boolean).sort()[0] || '';
    p.activation = prev.activation || (/^\d{4}-\d{2}$/.test(firstAct) ? monthLabel(firstAct) : firstAct);
    return p;
  });
  // Only persist when something actually changed — avoids Firestore sync churn on every render.
  if (JSON.stringify(out) !== JSON.stringify(stored)) setSuperPrograms(out);
  return out;
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: PLAYGROUND — Zoho (source of truth) vs Manual scenario, with Approve & Push flow
// ─────────────────────────────────────────────────────────────────────────────
// Detect whether a deal has any manual override that differs from Zoho's snapshot.
// Returns an object with per-field diffs (each can be null = no diff) plus a boolean any.
function playgroundDiff(d) {
  var diff = { hc: null, mrr: null, win: null, margin: null, any: false };
  // HC override: Zoho stores a single Total Headcount; the playground stores monthly HC. Compare totals.
  var playHc = sumMonths(d.monthlyHC || {});
  if (d.zoho_totalHC !== null && d.zoho_totalHC !== undefined && Math.abs(playHc - d.zoho_totalHC) > 0.5) {
    diff.hc = { zoho: d.zoho_totalHC, play: playHc };
    diff.any = true;
  }
  // MRR override: user typed an mrrAureum that differs from the Zoho MRR (pricing).
  // Filling a gap (Zoho=0, Aureum>0) is NOT an override — it's just providing a value.
  if (d.mrrAureum > 0 && d.pricing > 0 && Math.abs(d.mrrAureum - d.pricing) > 0.5) {
    diff.mrr = { zoho: d.pricing, play: d.mrrAureum };
    diff.any = true;
  }
  // Win Rate override: current winRateAdj differs from snapshot of Zoho probability.
  if (d.zoho_winRateAdj !== null && d.zoho_winRateAdj !== undefined && d.winRateAdj !== undefined && Math.abs(d.winRateAdj - d.zoho_winRateAdj) > 0.005) {
    diff.win = { zoho: d.zoho_winRateAdj, play: d.winRateAdj };
    diff.any = true;
  }
  // Margin override: user typed a marginOverride that differs from Zoho's Target_Margin_Band.
  if (d.marginOverride !== undefined && d.marginOverride !== null && d.marginOverride !== '') {
    var ov = parseFloat(d.marginOverride);
    var z = (d.zohoMargin !== undefined && d.zohoMargin !== null) ? parseFloat(d.zohoMargin) : null;
    if (z === null || Math.abs(ov - z) > 0.005) {
      diff.margin = { zoho: z, play: ov };
      diff.any = true;
    }
  }
  return diff;
}
function dealHasPlaygroundEdits(d) { return playgroundDiff(d).any; }
function toggleApproved(idx) {

// Push approved playground edits back to Zoho via PATCH /Deals/{id}.
// Requires ZohoCRM.modules.Deals.WRITE scope on the OAuth app + the user re-authorized.
// If scope is missing, Zoho returns 401/INVALID_OAUTH/OAUTH_SCOPE_MISMATCH and we surface clearly.
function pushApprovedToZoho() {
  var token = getZohoToken();
  if (!token) { alert('Connect Zoho first (click the Zoho pill in the header).'); return; }
  var deals = getDeals();
  var approved = deals.filter(function(d){ return d.approved && d.zohoId && dealHasPlaygroundEdits(d); });
  if (!approved.length) { alert('No approved deals with pending changes to push.'); return; }

  var preview = approved.slice(0, 5).map(function(d){
    var diff = playgroundDiff(d);
    var bits = [];
    if (diff.hc)     bits.push('HC ' + diff.hc.zoho + '→' + diff.hc.play);
    if (diff.mrr)    bits.push('MRR ' + fmt$k(diff.mrr.zoho) + '→' + fmt$k(diff.mrr.play));
    if (diff.win)    bits.push('Win ' + fmtPct(diff.win.zoho) + '→' + fmtPct(diff.win.play));
    if (diff.margin) bits.push('Margin ' + (diff.margin.zoho !== null ? fmtPct(diff.margin.zoho) : '—') + '→' + fmtPct(diff.margin.play));
    return '  • ' + d.dealName + ': ' + bits.join(', ');
  }).join('\n');
  var more = approved.length > 5 ? '\n  ... and ' + (approved.length - 5) + ' more' : '';

  if (!confirm('Push ' + approved.length + ' approved deal(s) to Zoho?\n\n' + preview + more + '\n\nThis will UPDATE the records in Zoho CRM (write operation).')) return;

  var btn = document.querySelectorAll('.btn-gold');
  // Disable all gold buttons during push
  var pushBtn = null;
  for (var i = 0; i < btn.length; i++) { if (btn[i].textContent.indexOf('Push approved') >= 0) { pushBtn = btn[i]; break; } }
  if (pushBtn) { pushBtn.disabled = true; pushBtn.textContent = 'Pushing 0/' + approved.length + '…'; }

  var pushed = 0, failed = 0, errors = [], done = 0;
  approved.forEach(function(d) {
    var diff = playgroundDiff(d);
    var payload = {};
    if (diff.hc)     payload[ZOHO_HC_FIELD]     = diff.hc.play;
    if (diff.mrr)    payload[ZOHO_MRR_FIELD]    = diff.mrr.play;
    if (diff.win)    payload.Probability         = Math.round(diff.win.play * 100);
    if (diff.margin) payload[ZOHO_MARGIN_FIELD] = Math.round(diff.margin.play * 100) + '%';

    zohoPatchDeal(token, d.zohoId, payload, function(err, _resp) {
      done++;
      if (err) {
        failed++;
        errors.push((d.dealName || d.zohoId) + ' — ' + err.message);
      } else {
        pushed++;
        // Update snapshots to the new Zoho-side values so the diff clears.
        if (diff.hc)     d.zoho_totalHC     = diff.hc.play;
        if (diff.mrr)    d.pricing          = diff.mrr.play;
        if (diff.win)    d.zoho_winRateAdj  = diff.win.play;
        if (diff.margin) d.zohoMargin       = diff.margin.play;
        d.approved = false; delete d.approvedBy;
        d.pushedAt = new Date().toISOString();
        d.pushedBy = (currentUser && currentUser.name) || '';
      }
      if (pushBtn) pushBtn.textContent = 'Pushing ' + done + '/' + approved.length + '…';
      if (done === approved.length) {
        setDeals(deals);
        if (pushBtn) { pushBtn.disabled = false; pushBtn.textContent = '↗ Push approved to Zoho'; }
        var msg = pushed + ' deal(s) updated in Zoho.';
        if (failed) {
          msg += '\n\n' + failed + ' failed:\n' + errors.slice(0, 5).join('\n');
          if (errors.length > 5) msg += '\n…and ' + (errors.length - 5) + ' more';
          if (/401|INVALID_TOKEN|OAUTH_SCOPE|INVALID_OAUTH|forbidden|403/i.test(errors.join(' '))) {
            msg += '\n\n⚠ Looks like the Zoho OAuth app is missing the Deals.WRITE scope.\n' +
                   '  1. Have the Zoho admin add ZohoCRM.modules.Deals.WRITE to the OAuth client at api-console.zoho.com.\n' +
                   '  2. Click the Zoho pill in the header → Disconnect → Connect (you\'ll be asked to grant write access).\n' +
                   '  3. Try Push again.';
          } else if (/INVALID_DATA|MANDATORY_NOT_FOUND|invalid|not present|no such|field/i.test(errors.join(' '))) {
            msg += '\n\n⚠ A field name may be wrong. Confirm the API names in Settings (MRR / Probability / Target_Margin_Band / Headcounts).';
          }
        }
        logActivity('Zoho', 'Push to Zoho', pushed + ' updated · ' + failed + ' failed');
        alert(msg);
        renderTab();
      }
    });
  });
}

function renderCleanup() {

    var losts   = lostDeals.filter(function(z){ return g.client && z.client && clientSimilar(g.client, z.client); });
    return { ghost: g, gIdx: deals.indexOf(g), actives: actives, losts: losts };

  // Sort: ghosts with NO candidates last; otherwise alphabetical by client

    var ac = (a.actives.length + a.losts.length) > 0 ? 0 : 1;
    var bc = (b.actives.length + b.losts.length) > 0 ? 0 : 1;

    return (a.ghost.client || '').toLowerCase() < (b.ghost.client || '').toLowerCase() ? -1 : 1;
  });

  html += '<div class="card" style="padding:6px"><div class="scroll-x"><table class="grid-tbl" style="min-width:1200px"><thead><tr>';

        html += '<div style="margin-bottom:5px;padding:6px 9px;background:var(--bg);border-radius:5px;border-left:3px solid var(--success)">';

  html += '<div class="legend" style="margin-top:10px"><span style="font-style:italic"><b>Green border</b> = active Zoho deal — click <b>Merge →</b> to keep that Zoho row (with its stage/owner/link) plus the Excel HC/MRR/flags. <b>Red border</b> = Closed Lost in Zoho — usually means the engagement died; consider killing the ghost or creating a new active deal in Zoho.</span></div>';

  document.getElementById('mainContent').innerHTML = html;

function mergeCleanup(ghostIdx, candidateIdx) {
  var deals = getDeals();

  setDeals(deals);

  if (!email) return;
  if (!/@aspenview\.com$/i.test(email)) { alert('Only @aspenview.com emails can be granted admin.'); return; }
  grantAdmin(email);
  if (input) input.value = '';
}
function grantAdmin(email) {
  email = email.toLowerCase();
  var list = getAdminExtra();
  if (list.indexOf(email) >= 0) { alert(email + ' already has admin access.'); return; }
  list.push(email);
  setAdminExtra(list);
  logActivity('Admin', 'Grant admin', email);
  renderTab();
  renderTopNav();
}
function revokeAdmin(email) {
  email = email.toLowerCase();
  if (!confirm('Revoke admin access for ' + email + '?')) return;
  var list = getAdminExtra().filter(function(e){ return e !== email; });
  setAdminExtra(list);
  logActivity('Admin', 'Revoke admin', email);
  renderTab();
  renderTopNav();
}

function sourceClass(source) {
  var s = (source || '').toLowerCase();
  if (s === 'zoho')      return 'background:#fff4d6;color:#946700';
  if (s === 'firestore' || s === 'firebase') return 'background:#fde2e2;color:#9a2222';
  if (s === 'auth')      return 'background:#e3effd;color:#1d4a86';
  if (s === 'admin')     return 'background:#fdf6e6;color:#946700';
  if (s === 'forecast')  return 'background:#e6f4ea;color:#1b6232';
  return 'background:#eef2f6;color:#5a6a7a';
}

function adminActivitySection(activity) {
  var html = '';
  html += '<div class="card"><div class="card-header"><span class="card-title"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2e7d32;animation:pulse 1.6s infinite;vertical-align:middle;margin-right:6px"></span>Activity Stream</span><span class="card-sub">Last ' + Math.min(activity.length, 50) + ' events · updates in real-time</span></div>';
  if (!activity.length) {
    html += '<div class="empty">No activity recorded yet. Try syncing Zoho or taking a snapshot.</div></div>';
    return html;
  }
  html += '<table><thead><tr><th>Source</th><th>Action</th><th>Details</th><th>Actor</th><th>When</th></tr></thead><tbody>';
  activity.slice().reverse().slice(0, 50).forEach(function(ev) {
    html += '<tr>';
    html += '<td><span style="display:inline-block;padding:3px 9px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;' + sourceClass(ev.source) + '">' + esc(ev.source) + '</span></td>';
    html += '<td><b>' + esc(ev.action) + '</b></td>';
    html += '<td style="font-size:11.5px;color:var(--muted)">' + esc(ev.details) + '</td>';
    html += '<td style="font-size:11.5px;color:var(--muted)">' + esc(ev.actor) + '</td>';
    html += '<td style="font-size:11px;color:var(--muted);white-space:nowrap" title="' + esc(ev.ts) + '">' + timeAgo(ev.ts) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function adminErrorsSection(errors) {
  var html = '';
  // Counts by integration & code
  var bySource = {}, byCode = {};
  errors.forEach(function(e){
    bySource[e.source] = (bySource[e.source] || 0) + 1;
    byCode[e.code]     = (byCode[e.code] || 0) + 1;
  });
  html += '<div class="stat-grid" style="margin-bottom:14px">';
  Object.keys(bySource).sort(function(a,b){ return bySource[b] - bySource[a]; }).slice(0,3).forEach(function(s){
    html += statCard(s, bySource[s], 'errors logged', 'gold');
  });
  if (!Object.keys(bySource).length) html += statCard('No errors', '0', 'all integrations healthy', 'good');
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Error Log</span><span class="card-sub">' + errors.length + ' logged · most recent first</span>';
  if (errors.length) html += ' <button class="btn btn-ghost btn-sm" style="margin-left:10px" onclick="clearErrorLog()">Clear log</button>';
  html += '</div>';
  if (!errors.length) {
    html += '<div class="empty">No errors logged. Zoho / Firestore failures will appear here automatically.</div></div>';
    return html;
  }
  html += '<table><thead><tr><th>Code</th><th>Source</th><th>What happened</th><th>Endpoint</th><th>Actor</th><th>When</th></tr></thead><tbody>';
  errors.slice().reverse().forEach(function(ev) {
    html += '<tr>';
    html += '<td><span class="pill pill-red" style="font-size:10px">' + esc(ev.code) + '</span></td>';
    html += '<td><span style="display:inline-block;padding:3px 9px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;' + sourceClass(ev.source) + '">' + esc(ev.source) + '</span></td>';
    html += '<td style="font-size:11.5px">' + esc(ev.message) + '</td>';
    html += '<td style="font-size:11.5px;color:var(--muted);font-family:monospace">' + esc(ev.endpoint) + '</td>';
    html += '<td style="font-size:11.5px;color:var(--muted)">' + esc(ev.actor) + '</td>';
    html += '<td style="font-size:11px;color:var(--muted);white-space:nowrap" title="' + esc(ev.ts) + '">' + timeAgo(ev.ts) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}
function clearErrorLog() {
  if (!confirm('Clear all logged errors? They will not be recoverable.')) return;
  setErrorLog([]);
  logActivity('Admin', 'Clear error log', '');
  renderTab();
}

    [0.05,0.10,0.15,0.20,0.25,0.30,0.40,0.50].forEach(function(g){ var sel = Math.abs(g - mAcc) < 0.0001 ? ' selected' : ''; html += '<option value="' + g + '"' + sel + '>' + Math.round(g*100) + '%</option>'; });
    html += '</select></div>';

    html += '<input type="number" min="0" value="' + getDefaultPricePerHead() + '" onchange="setDefaultPricePerHead(parseFloat(this.value)||0)" style="width:120px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12.5px;font-weight:700"></div>';
    html += '<div style="font-size:11px;color:var(--muted);max-width:340px">Margin &amp; accuracy feed the months 4–12 figures. The default $/head is used when a deal has no override and no Zoho MRR to divide.</div>';

  html += '<ol style="font-size:12.5px;color:var(--muted);line-height:1.75;padding-left:20px">';

  html += '<li><b>Weekly</b>: review the <i>3 mo. revenue</i> tab. Move the <b>Anchor month</b> forward each new month to roll the window.</li>';
  html += '<li><b>Monthly</b>: after a month closes, go to <i>Forecast Accuracy</i> → <i>Enter Actuals</i> for the closed month. The accuracy bands recompute automatically.</li>';
  html += '<li><b>Quarterly</b>: review <i>Margin Rules</i> with Finance (Eric / John Scott) to keep cash-flow assumptions current.</li>';
  html += '</ol></div>';

  document.getElementById('mainContent').innerHTML = html;
}
function exportData() {
  var dump = { deals: getDeals(), margin_rules: getMarginRules(), snapshots: getSnapshots(), actuals: getActuals(), anchor_month: getAnchorMonth(), exportedAt: new Date().toISOString() };
  var blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aspenview-bde-forecast-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData(file) {
  if (!file) return;
  var r = new FileReader();
  r.onload = function() {
    try {
      var data = JSON.parse(r.result);
      if (!confirm('Replace all current data with imported data? Cannot be undone.')) return;
      if (data.deals)        setDeals(data.deals);
      if (data.margin_rules) setMarginRules(data.margin_rules);
      if (data.snapshots)    setSnapshots(data.snapshots);
      if (data.actuals)      setActuals(data.actuals);
      if (data.anchor_month) setAnchorMonth(data.anchor_month);
      alert('Imported successfully.');
      renderTab();
    } catch (e) { alert('Import failed: ' + e.message); }
  };
  r.readAsText(file);
}
function resetAllData() {
  if (!confirm('Reset ALL data (deals, rules, snapshots, actuals)? Cannot be undone.')) return;
  ['deals','margin_rules','snapshots','actuals','anchor_month'].forEach(function(k) { localStorage.removeItem('bde_' + k); });
  renderTab();
}

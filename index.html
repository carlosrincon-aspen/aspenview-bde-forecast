<style>
  :root {
    color-scheme: light;
    --navy:    #0A1928;
    --navy2:   #132336;
    --navy3:   #1c3250;
    --gold:    #E8B84B;
    --gold2:   #d4a53d;
    --softblue:#D9F1FB;
    --softgreen:#E8F5E9;
    --softred: #FDECEA;
    --softgold:#FFF8E1;
    --aureum:  #00BCD4;
    --bg:      #F2F2F2;
    --card:    #FFFFFF;
    --border:  #E0E8F0;
    --text:    #0A1928;
    --muted:   #5a6a7a;
    --success: #2e7d32;
    --warn:    #b45309;
    --danger:  #c62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
  #loginScreen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; overflow-y: auto; padding: 24px 16px; }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .login-logo .brand { font-size: 22px; font-weight: 700; color: white; letter-spacing: 2px; }
  .login-logo .brand span { color: var(--gold); }
  .login-logo .tagline { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
  .login-title { font-size: 15px; color: rgba(255,255,255,0.6); margin: 8px 0 24px; letter-spacing: 0.5px; text-align: center; }
  .login-box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 28px 36px; text-align: center; max-width: 360px; }
  .login-box .hint { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 18px; letter-spacing: 0.5px; }
  .login-pick { background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.3); border-radius: 8px; padding: 11px 22px; cursor: pointer; color: white; font-size: 13px; font-weight: 700; margin: 6px; font-family: inherit; transition: all 0.15s; }
  .login-pick:hover { background: rgba(232,184,75,0.22); border-color: var(--gold); }
  .login-foot { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 18px; }

  #appScreen { display: none; flex-direction: column; flex: 1; }
  header { background: var(--navy); color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; height: 54px; border-bottom: 3px solid var(--gold); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-text .brand { font-size: 14px; font-weight: 700; color: white; letter-spacing: 1.5px; }
  .logo-text .brand span { color: var(--gold); }
  .logo-text .tagline { font-size: 7.5px; font-weight: 400; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
  .header-center { font-size: 13px; font-weight: 700; color: white; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-user { font-size: 11px; color: rgba(255,255,255,0.7); }
  .logout-btn { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 4px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .logout-btn:hover { background: rgba(255,255,255,0.18); color: white; }
  .zoho-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; padding: 3px 9px; border-radius: 20px; font-weight: 700; cursor: pointer; }
  .zoho-pill.on  { background: rgba(46,125,50,0.18); color: #b6e8b9; border: 1px solid rgba(46,125,50,0.4); }
  .zoho-pill.off { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.18); }

  .topnav { display: flex; gap: 4px; padding: 8px 18px; background: var(--navy2); overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .topnav-btn { padding: 7px 14px; border-radius: 5px; border: none; cursor: pointer; font-size: 11.5px; font-weight: 700; font-family: inherit; transition: all 0.15s; white-space: nowrap; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
  .topnav-btn:hover { background: rgba(255,255,255,0.16); color: white; }
  .topnav-btn.active { background: var(--gold); color: var(--navy); }

  .main { flex: 1; overflow-y: auto; padding: 18px 22px; }
  .page-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
  .page-title h1 { font-size: 18px; font-weight: 700; color: var(--navy); }
  .page-title .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(10,25,40,0.06); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--navy); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .btn { padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 11.5px; font-weight: 700; transition: all 0.15s; font-family: inherit; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy2); }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold2); }
  .btn-ghost { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); color: var(--navy); }
  .btn-danger { background: #fdecea; color: var(--danger); }
  .btn-sm { padding: 4px 9px; font-size: 11px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--navy); margin: 4px 0 1px; }
  .stat-sub { font-size: 10.5px; color: var(--muted); }
  .stat-card.aureum { border-left: 3px solid var(--aureum); }
  .stat-card.gold   { border-left: 3px solid var(--gold); }
  .stat-card.good   { border-left: 3px solid var(--success); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--bg); padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .num-bold { font-weight: 700; color: var(--navy); }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .pill-blue   { background: var(--softblue); color: #0d47a1; }
  .pill-gold   { background: var(--softgold); color: #b45309; }
  .pill-green  { background: var(--softgreen); color: var(--success); }
  .pill-red    { background: var(--softred); color: var(--danger); }
  .pill-aureum { background: #B2EBF2; color: #00838f; }
  .pill-gray   { background: var(--bg); color: var(--muted); }

  .scroll-x { overflow-x: auto; max-height: 70vh; overflow-y: auto; }
  /* Sticky header rows inside scrollable grids */
  .scroll-x table.grid-tbl thead th { position: sticky; top: 0; z-index: 5; }
  .scroll-x table.grid-tbl thead tr:nth-child(2) th { top: 28px; }
  .grid-tbl { font-size: 11.5px; min-width: 1100px; }
  .grid-tbl th { font-size: 9.5px; padding: 6px 7px; }
  .grid-tbl td { padding: 6px 7px; }
  .grid-tbl .cell-hc { text-align: center; font-variant-numeric: tabular-nums; }
  .grid-tbl .cell-hc.gt10k { background: #E8F5E9; color: #1b5e20; font-weight: 700; }
  .grid-tbl .cell-hc.lt10k { background: #FDECEA; color: #b71c1c; font-weight: 700; }
  .grid-tbl .cell-hc.super { background: #B2EBF2; color: #006064; font-weight: 700; }
  .grid-tbl .row-super { background: rgba(0,188,212,0.05); }
  .grid-tbl input { width: 50px; padding: 3px 5px; font-size: 11.5px; border: 1px solid var(--border); border-radius: 4px; text-align: right; font-variant-numeric: tabular-nums; font-family: inherit; background: white; }
  .grid-tbl input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.2); }
  .grid-tbl input.margin { width: 50px; }
  .grid-tbl input.price { width: 80px; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 10.5px; color: var(--muted); margin-top: 8px; align-items: center; }
  .legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: middle; margin-right: 5px; }

  .anchor-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; font-size: 12px; }
  .anchor-row label { font-weight: 700; color: var(--navy); }
  .anchor-row select { padding: 6px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 5px; background: white; font-family: inherit; color: var(--navy); cursor: pointer; }
  .anchor-row select:focus { outline: none; border-color: var(--gold); }

  .acc-bands { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  .acc-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .acc-card.m0 { border-top: 3px solid var(--success); }
  .acc-card.m1 { border-top: 3px solid var(--gold); }
  .acc-card.m2 { border-top: 3px solid var(--danger); }
  .acc-card .acc-h { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
  .acc-card .acc-v { font-size: 28px; font-weight: 700; color: var(--navy); margin: 4px 0 2px; }
  .acc-card .acc-b { font-size: 11px; color: var(--muted); }
  .acc-card .acc-n { font-size: 10px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .var-cell { font-weight: 700; }
  .var-green  { color: var(--success); }
  .var-yellow { color: var(--warn); }
  .var-red    { color: var(--danger); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,25,40,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: white; border-radius: 10px; padding: 22px; width: 520px; max-width: 92vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(10,25,40,0.25); }
  .modal h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 12.5px; font-family: inherit; color: var(--text); background: white; outline: none; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.2); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar input[type="text"], .toolbar select { padding: 5px 9px; font-size: 11.5px; border: 1px solid var(--border); border-radius: 5px; font-family: inherit; background: white; color: var(--text); outline: none; }
  .toolbar input[type="text"]:focus, .toolbar select:focus { border-color: var(--gold); }
  .toolbar .spacer { flex: 1; }

  .empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 12px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #c8d6e5; border-radius: 3px; }

  .zoho-pill.syncing { background: rgba(232,184,75,0.18); color: var(--gold); border: 1px solid rgba(232,184,75,0.4); }

  /* Multi-select filter dropdown */
  .ms { position: relative; display: inline-block; }
  .ms > summary { list-style: none; cursor: pointer; padding: 5px 10px; font-size: 11.5px; border: 1px solid var(--border); border-radius: 5px; background: white; color: var(--text); white-space: nowrap; user-select: none; }
  .ms > summary::-webkit-details-marker { display: none; }
  .ms > summary::marker { content: ''; }
  .ms[open] > summary { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.2); }
  .ms-panel { position: absolute; z-index: 60; top: calc(100% + 4px); left: 0; background: white; border: 1px solid var(--border); border-radius: 7px; box-shadow: 0 10px 30px rgba(10,25,40,0.18); padding: 6px; min-width: 210px; max-height: 300px; overflow-y: auto; }
  .ms-opt { display: flex; align-items: center; gap: 8px; padding: 5px 8px; font-size: 12px; cursor: pointer; border-radius: 4px; white-space: nowrap; }
  .ms-opt:hover { background: var(--bg); }
  .ms-clear { font-size: 10.5px; color: var(--muted); cursor: pointer; padding: 5px 8px; display: block; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .ms-clear:hover { color: var(--navy); }
  .ms-badge { background: var(--gold); color: var(--navy); border-radius: 10px; padding: 0 6px; font-size: 10px; font-weight: 700; margin-left: 4px; }

  @media (max-width: 880px) {
    .acc-bands { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>

var currentUser = null;
var currentTab  = 'overview';

function load(k, d) {
  try { var v = JSON.parse(localStorage.getItem('bde_' + k)); return (v === null || v === undefined) ? d : v; }
  catch(e) { return d; }
}
function save(k, v) {
  localStorage.setItem('bde_' + k, JSON.stringify(v));
  if (FB_SYNCED_KEYS.indexOf(k) >= 0) fbSchedulePush();
}

function getDeals() {
  var deals = load('deals', SEED_DEALS);
  // Migration: ensure new fields exist on every deal
  deals.forEach(function(d) {
    if (d.isSuperDeal === undefined) d.isSuperDeal = (d.totalHC || sumMonths(d.monthlyHC || {})) >= 50;
    if (d.inForecast  === undefined) d.inForecast  = sumMonths(d.monthlyHC || {}) > 0;
    if (d.bde         === undefined) d.bde         = '';
    if (d.zohoId      === undefined) d.zohoId      = '';
    // Dual-MRR migration: pricing = Zoho.Amount (sync target). mrrAureum = Don's manual.
    // Legacy data with pricing but no mrrAureum: move value to mrrAureum (it was Don's, not Zoho's).
    if (d.mrrAureum   === undefined) { d.mrrAureum = d.pricing || 0; }
    if (d.inExcel     === undefined) d.inExcel = false;  // set by v11 migration / sync
  });
  return deals;
}
function setDeals(d) { save('deals', d); }

function setMarginRules(r) { save('margin_rules', r); }

// UI-initiated anchor change: log it (setAnchorMonth itself is also called from
// Firestore onSnapshot when a remote teammate moves the anchor — we don't want
// to log that as a local action, so we wrap it here for user clicks only).
function changeAnchorMonth(m) {
  var prev = getAnchorMonth();
  if (prev === m) return;
  setAnchorMonth(m);
  logActivity('Forecast', 'Change anchor month', prev + ' → ' + m);
  renderTab();
}

// True when the user is a hardcoded manager OR was granted admin via the panel.
function isAdmin(u) {
  u = u || currentUser;
  if (!u) return false;
  if (u.role === 'manager') return true;
  return getAdminExtra().indexOf((u.email || '').toLowerCase()) >= 0;
}
function recordKnownUser(u) {
  if (!u || !u.email) return;
  var users = getKnownUsers();
  var k = u.email.toLowerCase();
  var now = new Date().toISOString();
  var prev = users[k] || {};
  users[k] = {
    email:      u.email,
    name:       u.name || prev.name || u.email,
    firstSeen:  prev.firstSeen || now,
    lastSeen:   now,
    loginCount: (prev.loginCount || 0) + 1,
    role:       u.role || prev.role || 'bde'
  };
  setKnownUsers(users);
}
function logActivity(source, action, details) {
  var log = getActivityLog();
  log.push({
    ts:      new Date().toISOString(),
    source:  source || 'app',
    action:  action || '',
    details: details || '',
    actor:   (currentUser && currentUser.email) || 'anon'
  });
  if (log.length > 200) log = log.slice(-200);
  setActivityLog(log);
}
function logError(source, code, endpoint, message) {
  var log = getErrorLog();
  log.push({
    ts:       new Date().toISOString(),
    source:   source || 'app',
    code:     String(code || ''),
    endpoint: endpoint || '',
    message:  String(message || '').slice(0, 500),
    actor:    (currentUser && currentUser.email) || 'anon'
  });
  if (log.length > 100) log = log.slice(-100);
  setErrorLog(log);
}
function timeAgo(iso) {
  if (!iso) return '—';
  var s = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
  if (s < 60)        return s + 's ago';
  if (s < 3600)      return Math.floor(s / 60) + 'm ago';
  if (s < 86400)     return Math.floor(s / 3600) + 'h ago';
  if (s < 86400 * 7) return Math.floor(s / 86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}
function userStatus(lastSeen) {
  if (!lastSeen) return 'idle';
  var hours = (Date.now() - new Date(lastSeen).getTime()) / 3600000;
  return hours < 24 ? 'active' : 'idle';
}

// ─────────────────────────────────────────────────────────────────────────────
// FIRESTORE (shared state across Carlos / Michael / Don)
// ─────────────────────────────────────────────────────────────────────────────
// NOTE: seed_applied_* flags are NOT synced — kept local so each browser independently
// runs its migration once after Firestore fetch completes (otherwise Firestore overwrites
// the flag back to false and migration races with fetch).
var FB_SYNCED_KEYS = ['deals','margin_rules','snapshots','actuals','anchor_month','last_zoho_sync','super_programs','trend_snapshots','admin_extra','known_users','activity_log','error_log'];
var fbApp = null, fbAuth = null, fbDb = null, fbDocRef = null;
var fbReady = false;          // true after initial fetch completes
var fbSuppressPush = false;   // true while applying remote updates (avoid echo loop)
var fbPushTimer = null;
var fbInitTried = false;

function fbInit() {
  if (fbInitTried) return;
  fbInitTried = true;
  if (typeof firebase === 'undefined') { console.warn('Firebase SDK not loaded'); return; }
  try {
    fbApp  = firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    fbDb   = firebase.firestore();
    fbAuth.onAuthStateChanged(function(user) {
      if (user) {
        var savedUser = load('current_user', null);
        if (savedUser && !currentUser) loginAs(savedUser);
        fbInitDataSync();
      } else {
        fbReady = false;
        setFbPill('off', 'Sync · Off');
      }
    });
  } catch(e) {
    console.error('Firebase init failed:', e);
    setFbPill('off', 'Sync · Error');
  }
}
function setFbPill(state, text) {
  var p = document.getElementById('fbPill');
  if (!p) return;
  p.className = 'zoho-pill ' + state;
  p.textContent = text;
}
function fbInitDataSync() {
  if (!fbAuth || !fbAuth.currentUser || !fbDb) return;
  fbDocRef = fbDb.collection('dashboard').doc('state');
  setFbPill('syncing', 'Sync · Loading');
  fbDocRef.get().then(function(doc) {
    if (doc.exists) {
      var data = doc.data();
      fbSuppressPush = true;
      FB_SYNCED_KEYS.forEach(function(k) { if (data[k] !== undefined) save(k, data[k]); });
      fbSuppressPush = false;
      fbReady = true;
      setFbPill('on', 'Sync · Live');
      autoApplySeedOnce();   // now sees latest Firestore data; setDeals triggers push if changed
      seedDemoTrendSnapshotsIfEmpty();
      ensureWeeklyTrendSnapshot();
      renderTab();
    } else {
      fbReady = true;
      setFbPill('on', 'Sync · Live (first push)');
      autoApplySeedOnce();   // populates ghosts before first push
      seedDemoTrendSnapshotsIfEmpty();
      ensureWeeklyTrendSnapshot();
      fbPushNow();
      renderTab();
    }
    fbDocRef.onSnapshot(function(snap) {
      if (!snap.exists) return;
      var data = snap.data();
      if (data.updatedBy && fbAuth.currentUser && data.updatedBy === fbAuth.currentUser.email) return;
      fbSuppressPush = true;
      FB_SYNCED_KEYS.forEach(function(k) { if (data[k] !== undefined) save(k, data[k]); });
      fbSuppressPush = false;
      setFbPill('on', 'Sync · Live (updated by ' + (data.updatedBy || 'someone') + ')');
      renderTab();
    }, function(err) {
      console.error('Firestore onSnapshot error:', err);
      setFbPill('off', 'Sync · Error');
    });
  }).catch(function(err) {
    console.error('Firestore initial fetch failed:', err);
    setFbPill('off', 'Sync · Error');
  });
}
function fbSchedulePush() {
  if (!fbReady || !fbDocRef || fbSuppressPush) return;
  if (fbPushTimer) clearTimeout(fbPushTimer);
  setFbPill('syncing', 'Sync · Saving…');
  fbPushTimer = setTimeout(fbPushNow, 800);
}
function fbPushNow() {
  if (!fbReady || !fbDocRef) return;
  var payload = { updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: (fbAuth.currentUser && fbAuth.currentUser.email) || '' };
  FB_SYNCED_KEYS.forEach(function(k) { payload[k] = load(k, null); });
  fbDocRef.set(payload, { merge: false }).then(function() {
    setFbPill('on', 'Sync · Live');
  }).catch(function(err) {
    console.error('Firestore push failed:', err);
    setFbPill('off', 'Sync · Error');
  });
}
function fbSignOut() {
  if (fbAuth) { try { fbAuth.signOut(); } catch(e) {} }
  fbReady = false;
  fbDocRef = null;
  if (fbPushTimer) clearTimeout(fbPushTimer);
  setFbPill('off', 'Sync · Off');
}

function signInWithGoogle() {
  if (!fbAuth) { document.getElementById('loginError').textContent = 'Firebase not loaded.'; return; }
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'aspenview.com' }); // restrict chooser to @aspenview.com
  fbAuth.signInWithPopup(provider).then(function(result) {
    var u = result.user;
    if (!/@aspenview\.com$/i.test(u.email || '')) {
      document.getElementById('loginError').textContent = 'Only @aspenview.com accounts are authorized.';
      fbAuth.signOut();
      return;
    }
    var match = null;
    Object.keys(USERS).forEach(function(k) { if (USERS[k].email.toLowerCase() === u.email.toLowerCase()) match = USERS[k]; });
    if (!match) {
      var name = u.displayName || u.email;
      var initials = name.split(' ').map(function(s){ return s[0] || ''; }).join('').substring(0,2).toUpperCase();
      match = { id: u.email, name: name, email: u.email, role: 'bde', initials: initials };
    }
    loginAs(match);
  }).catch(function(err) {
    document.getElementById('loginError').textContent = 'Sign-in failed: ' + (err.message || err.code);
  });
}
function loginAs(u) {
  // Re-resolve role/name from the current USERS map every time. Sessions cached
  // with an older role (e.g. user was BDE before being added as manager) get
  // refreshed automatically, no sign-out needed.
  Object.keys(USERS).forEach(function(k) {
    if (USERS[k].email && (u.email || '').toLowerCase() === USERS[k].email.toLowerCase()) {
      u.role = USERS[k].role;
      u.name = USERS[k].name || u.name;
      u.initials = USERS[k].initials || u.initials;
    }
  });
  currentUser = u;
  save('current_user', u);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'flex';
  recordKnownUser(u);
  logActivity('Auth', 'Sign in', u.name + ' (' + u.role + ')');
  var roleLabel = isAdmin(u) ? 'Admin' : (u.role === 'manager' ? 'Manager' : 'BDE');
  document.getElementById('headerUser').textContent    = u.name + ' · ' + roleLabel;
  var adminBtn = document.getElementById('adminBtn');
  if (adminBtn) adminBtn.style.display = isAdmin(u) ? '' : 'none';
  // autoApplySeedOnce is called from fbInitDataSync after Firestore fetch (or from degrade fallback)
  ensureMonthlySnapshot();
  renderTopNav();
  renderTab();
  refreshZohoPill();
}
function logout() {
  currentUser = null;
  localStorage.removeItem('bde_current_user');
  fbSignOut();
  document.getElementById('appScreen').style.display   = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function getZohoToken() {
  var t = localStorage.getItem('zoho_token');
  var exp = parseInt(localStorage.getItem('zoho_token_exp') || '0');
  return (t && Date.now() < exp) ? t : null;
}
function checkZohoTokenFromUrl() {
  var hash = window.location.hash || '';
  if (hash.indexOf('access_token') === -1) return;
  var params = {};
  hash.replace(/^#/, '').split('&').forEach(function(p) { var kv = p.split('='); params[kv[0]] = kv[1] ? decodeURIComponent(kv[1]) : ''; });
  if (params.access_token) {
    localStorage.setItem('zoho_token', params.access_token);
    localStorage.setItem('zoho_token_exp', String(Date.now() + (parseInt(params.expires_in || '3600') * 1000)));
    history.replaceState(null, '', window.location.pathname);
  }
}
function connectZoho() {
  if (ZOHO_CLIENT_ID === 'REPLACE_WITH_ZOHO_CLIENT_ID') {
    alert('Zoho not configured yet. See Settings → Zoho integration.');
    return;
  }
  var url = 'https://accounts.zoho.com/oauth/v2/auth?response_type=token' +
    '&client_id=' + ZOHO_CLIENT_ID +

    '&redirect_uri=' + encodeURIComponent(ZOHO_REDIRECT) +

function disconnectZoho() {

  localStorage.removeItem('zoho_token_exp');

}
function toggleZoho() { getZohoToken() ? (confirm('Disconnect Zoho?') && disconnectZoho()) : connectZoho(); }
function refreshZohoPill() {
  var p = document.getElementById('zohoPill');
  if (getZohoToken()) { p.className = 'zoho-pill on';  p.textContent = 'Zoho · Connected'; }
  else                { p.className = 'zoho-pill off'; p.textContent = 'Zoho · Disconnected'; }
}
function zohoGet(token, path, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', ZOHO_API + path, true);
  xhr.setRequestHeader('Authorization', 'Zoho-oauthtoken ' + token);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) { try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e); } }
    else if (xhr.status === 204) cb(null, { data: [] });
    else { logError('Zoho', xhr.status, path, xhr.responseText); cb(new Error(xhr.status + ': ' + xhr.responseText)); }
  };
  xhr.send();
}
// PATCH a single Zoho deal. payload = { Field_API_Name: value, ... }
function zohoPatchDeal(token, dealId, payload, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('PATCH', ZOHO_API + '/Deals/' + encodeURIComponent(dealId), true);
  xhr.setRequestHeader('Authorization', 'Zoho-oauthtoken ' + token);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status >= 200 && xhr.status < 300) {
      try {
        var resp = JSON.parse(xhr.responseText);
        var rec = resp && resp.data && resp.data[0];
        // Zoho responds 200 but the record can still have a per-record failure (status:'error')
        if (rec && rec.status === 'error') { logError('Zoho', rec.code || 'ERROR', '/Deals/' + dealId, rec.message || xhr.responseText); return cb(new Error((rec.code || 'ERROR') + ': ' + ((rec.message) || xhr.responseText))); }
        return cb(null, rec || resp);
      } catch(e) { logError('Zoho', 'PARSE', '/Deals/' + dealId, e.message); return cb(e); }
    }
    logError('Zoho', xhr.status, 'PATCH /Deals/' + dealId, xhr.responseText);
    cb(new Error(xhr.status + ': ' + xhr.responseText));
  };
  xhr.send(JSON.stringify({ data: [payload] }));
}
// Paginate through ALL Zoho deals across pages of 200
function fetchAllZohoDeals(token, cb) {
  var EXTRA = [ZOHO_MRR_FIELD, ZOHO_MARGIN_FIELD, ZOHO_HC_FIELD].filter(Boolean).join(',');
  var FIELDS_FULL = ZOHO_BASE_FIELDS + (EXTRA ? ',' + EXTRA : '');
  var all = [];
  // Resilient: if a custom field API name is wrong, Zoho rejects the whole query — so on a
  // page-1 field error we retry with base fields only (sync still works; extras just stay blank).
  function fetchPage(page, fields, triedFallback) {
    zohoGet(token, '/Deals?fields=' + fields + '&per_page=200&page=' + page, function(err, d) {
      if (err) {
        if (!triedFallback && page === 1 && /invalid|not present|no such|field/i.test(err.message || '')) {
          console.warn('Deals fetch failed with extra fields (' + EXTRA + '); retrying with base fields. ' + err.message);
          window._zohoFieldWarning = 'Could not read fields: ' + EXTRA + '. Check the API names in Settings. Sync used base fields only.';
          return fetchPage(1, ZOHO_BASE_FIELDS, true);
        }
        return cb(err);
      }
      var batch = (d && d.data) || [];
      all = all.concat(batch);
      var moreRecords = d && d.info && d.info.more_records;
      if (!moreRecords || batch.length === 0) return cb(null, all);
      if (page >= 50) return cb(null, all); // safety stop at 10,000 deals
      fetchPage(page + 1, fields, triedFallback);
    });
  }
  window._zohoFieldWarning = '';
  fetchPage(1, FIELDS_FULL, false);
}

// Paginate the Accounts module and build a map: normalized account name → Account_Status.
function fetchAllZohoAccounts(token, cb) {
  var all = [];
  function fetchPage(page) {
    zohoGet(token, '/Accounts?fields=Account_Name,Account_Status&per_page=200&page=' + page, function(err, d) {
      if (err) return cb(err);
      var batch = (d && d.data) || [];
      all = all.concat(batch);
      var more = d && d.info && d.info.more_records;
      if (!more || batch.length === 0) return cb(null, all);
      if (page >= 50) return cb(null, all);
      fetchPage(page + 1);
    });
  }
  fetchPage(1);
}

function syncZohoDeals() {
  var token = getZohoToken();
  if (!token) { alert('Connect Zoho first.'); return; }
  var btn = document.getElementById('zohoSyncBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  // First pull Accounts (for Account_Status), then Deals.
  fetchAllZohoAccounts(token, function(accErr, accounts) {
    var statusByAccount = {};
    if (!accErr && accounts) {
      accounts.forEach(function(a) {
        var nm = normDealName(a.Account_Name);
        if (nm && a.Account_Status) statusByAccount[nm] = a.Account_Status;
      });
    }
  fetchAllZohoDeals(token, function(err, allDeals) {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Sync from Zoho'; }
    if (err) { alert('Sync failed: ' + err.message); return; }

    // Preserve local edits on existing deals (matched by Zoho id), but if a field
    // is empty/zero locally AND empty/zero in Zoho, fall back to the Excel seed
    // matched by deal name. This way pricing/HC from the original Excel survive
    // even when Zoho's Amount field is blank.
    var existing = getDeals();
    var byId = {};
    existing.forEach(function(d) { if (d.zohoId) byId[d.zohoId] = d; });
    var seedIdx = buildSeedIndex();

    var filtered = allDeals.filter(function(r) { return ALLOWED_STAGES.indexOf(r.Stage) >= 0; });
    // Capture Closed Lost deals separately for the Cleanup tab (not used in any main forecast view)
    var lostMapped = allDeals.filter(function(r){ return r.Stage === 'Closed Lost'; }).map(function(r) {
      return {
        zohoId: r.id,
        dealName: r.Deal_Name || '',
        client: (r.Account_Name && r.Account_Name.name) || '',
        stage: 'Closed Lost',
        bde: (r.Owner && r.Owner.name) || '',
        zohoLost: true
      };
    });
    setLostDeals(lostMapped);

    var seedMatched = 0;
    var mapped = filtered.map(function(r) {
      var prior = byId[r.id];
      var seed  = seedIdx[normDealName(r.Deal_Name)];
      if (seed && !prior) seedMatched++;
      var p = prior || {};
      var seedHc = (seed && seed.monthlyHC) || {};
      var seedSum = sumMonths(seedHc);
      var localHc = p.monthlyHC || {};
      var hasLocalHc = Object.keys(localHc).length > 0;
      // MRR Zoho: the MRR field is the real monthly recurring revenue. Amount is usually blank.
      var zohoMRRfield = parseFloat(r[ZOHO_MRR_FIELD]) || 0;
      var zohoAmount = zohoMRRfield > 0 ? zohoMRRfield : (parseFloat(r.Amount) || 0);
      var zohoProb   = (r.Probability !== undefined && r.Probability !== null) ? (parseFloat(r.Probability) || 0) / 100 : null;
      var acctName   = (r.Account_Name && r.Account_Name.name) || p.client || (seed && seed.client) || '';
      var zohoStatus = statusByAccount[normDealName(acctName)] || '';  // Account_Status from Zoho Accounts
      return {
        zohoId:                r.id,
        dealName:              r.Deal_Name || p.dealName || '',
        client:                acctName,
        stage:                 r.Stage,
        bde:                   (r.Owner && r.Owner.name) || p.bde || '',
        // Status: Zoho Account_Status wins; else prior local; else seed; else default.
        status:                zohoStatus || p.status || (seed && seed.status) || 'Pipeline Account',
        location:              p.location || (seed && seed.location) || 'LATAM',
        firstBillableMonth:    r.Closing_Date || p.firstBillableMonth || (seed && seed.firstBillableMonth) || '',
        activationMonth:       r.Closing_Date || p.activationMonth || (seed && seed.activationMonth) || '',
        // MRR Zoho: ALWAYS what Zoho says (Amount field). 0 if not set in CRM.
        pricing:               zohoAmount,
        // MRR Aureum (Don's manual): preserved across syncs. Sync never touches it.
        mrrAureum:             p.mrrAureum !== undefined ? p.mrrAureum : ((seed && seed.mrrAureum) || 0),
        // Win rate adjusted: Zoho's Probability > local edit > seed > default 0.5
        winRateAdj:            (zohoProb !== null && zohoProb > 0) ? zohoProb : ((p.winRateAdj !== undefined && p.winRateAdj > 0) ? p.winRateAdj : ((seed && seed.winRateAdj) || 0.5)),
        // Snapshot of Zoho's probability at this sync (for Playground diff vs current value)
        zoho_winRateAdj:       (zohoProb !== null) ? zohoProb : (p.zoho_winRateAdj !== undefined ? p.zoho_winRateAdj : null),
        // Snapshot of Zoho's Total Headcount (single number) for Playground diff vs sum of monthly HC
        zoho_totalHC:          (r[ZOHO_HC_FIELD] !== undefined && r[ZOHO_HC_FIELD] !== null && r[ZOHO_HC_FIELD] !== '') ? (parseFloat(r[ZOHO_HC_FIELD]) || 0) : (p.zoho_totalHC !== undefined ? p.zoho_totalHC : null),
        winRate:               p.winRate !== undefined ? p.winRate : ((seed && seed.winRate) || 0.5),
        // HC plan: local if any, else seed (Zoho doesn't track monthly HC)
        monthlyHC:             hasLocalHc ? localHc : (seedSum > 0 ? JSON.parse(JSON.stringify(seedHc)) : {}),
        totalHC:               p.totalHC || seedSum || 0,
        commercialDescription: r.Description || p.commercialDescription || '',
        // Flags: if user has touched this deal before, respect their flag; else use seed default
        inForecast:            prior ? !!p.inForecast  : (seed ? !!seed.inForecast  : false),
        isSuperDeal:           prior ? !!p.isSuperDeal : (seed ? !!seed.isSuperDeal : false),
        inExcel:               !!seed || !!(prior && prior.inExcel),  // matched Don's Excel seed
        // Zoho commercial-design target margin (Target_Margin_Band). Source of truth for margin.
        zohoMargin:            parseMarginBand(r[ZOHO_MARGIN_FIELD]),
        zohoMarginBand:        (r[ZOHO_MARGIN_FIELD] !== undefined && r[ZOHO_MARGIN_FIELD] !== null) ? String(r[ZOHO_MARGIN_FIELD]) : '',
        marginOverride:        p.marginOverride
      };
    });

    var skipped = allDeals.length - filtered.length;
    // Reconcile prior ghosts against the freshly-pulled Zoho deals: merge matches in, keep
    // only the truly-not-in-Zoho ones (flagged). This collapses stale duplicates automatically.
    var priorGhosts = existing.filter(function(d) { return !d.zohoId; });
    var rec = reconcileGhosts(mapped, priorGhosts);
    var msg = 'Pulled ' + allDeals.length + ' deals from Zoho.\n' +
              '  • ' + filtered.length + ' match the allowed stages\n' +
              '  • ' + skipped + ' skipped (not in ALLOWED_STAGES)\n' +
              '  • ' + seedMatched + ' new deals matched the Excel seed by name\n' +
              '  • ' + rec.merged + ' prior manual deals reconciled into their Zoho record\n' +
              '  • ' + rec.flagged + ' deals not found in Zoho (kept & flagged for review)\n\n' +
              'Replace the deal list with this reconciled set? Your HC / MRR Aureum / flags are preserved.';
    if (!confirm(msg)) return;
    var finalDeals = mapped.concat(rec.kept);
    backfillOwners(finalDeals);
    setDeals(finalDeals);
    save('last_zoho_sync', new Date().toISOString());
    renderTab();
    var warn = window._zohoFieldWarning ? '\n\n⚠ ' + window._zohoFieldWarning : '';
    logActivity('Zoho', 'Sync from Zoho', mapped.length + ' pulled · ' + rec.merged + ' merged · ' + rec.flagged + ' flagged');
    alert('Zoho sync complete: ' + mapped.length + ' from Zoho + ' + rec.kept.length + ' not-in-Zoho = ' + finalDeals.length + ' total. ' + rec.merged + ' duplicates reconciled.' + warn);
  });
  });
}

function currentMonthKey() {
  var d = new Date();

}
function monthKeyAfter(key, n) {
  var p = key.split('-'); var y = parseInt(p[0]), m = parseInt(p[1]) - 1 + n;
  y += Math.floor(m / 12); m = ((m % 12) + 12) % 12;
  return y + '-' + ('0' + (m + 1)).slice(-2);
}
function monthLabel(key) {
  var p = key.split('-'); var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, 1);
  return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}
function fmt$(n)    { if (!n) return '$0'; return '$' + Math.round(n).toLocaleString('en-US'); }
function fmt$k(n)   { if (!n) return '$0'; if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M'; if (Math.abs(n) >= 1e3) return '$' + Math.round(n/1e3) + 'K'; return '$' + Math.round(n); }
function fmtPct(n)  { if (n === null || n === undefined || isNaN(n)) return '—'; return (n * 100).toFixed(0) + '%'; }
function fmtPct1(n) { if (n === null || n === undefined || isNaN(n)) return '—'; return (n * 100).toFixed(1) + '%'; }
function esc(s)     { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function isSuperDeal(d) {
  if (d.isSuperDeal !== undefined) return !!d.isSuperDeal;
  return (d.totalHC || sumMonths(d.monthlyHC)) >= 50;
}
function dealZohoUrl(d) {
  if (!d.zohoId) return '';

function dealNameCell(d) {

  if (url) return '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--navy);font-weight:700;text-decoration:none;border-bottom:1px dashed var(--gold)" title="Open in Zoho CRM">' + esc(d.dealName) + ' ↗</a>';
  var warn = ' <span class="pill pill-red" style="font-size:9px" title="This deal is not linked to a Zoho record — verify it still exists in Zoho. Its stage/owner may be stale.">⚠ not in Zoho</span>';
  return '<b>' + esc(d.dealName) + '</b>' + warn;
}
function toggleDealFlag(idx, field) {
  var deals = getDeals();
  if (!deals[idx]) return;
  deals[idx][field] = !deals[idx][field];
  var label = field === 'inForecast' ? 'Fcst' : field === 'isSuperDeal' ? 'Super' : field;
  logActivity('Forecast', 'Toggle ' + label, deals[idx].dealName + ' → ' + (deals[idx][field] ? 'ON' : 'OFF'));
  setDeals(deals);
  renderTab();
}
function uniqueBdes(deals) {
  var set = {}; deals.forEach(function(d){ if (d.bde) set[d.bde] = 1; });

var FILTERS = {};  // scope -> filter object
function filterScope(scope) {

}
function setSearch(scope, v) { filterScope(scope).search = v; renderTab(); restoreFocus(scope + 'Search'); }
function toggleFilter(scope, field, value) {

  var i = f[field].indexOf(value);
  if (i >= 0) f[field].splice(i, 1); else f[field].push(value);
  renderTab();
  var el = document.getElementById('ms_' + scope + '_' + field); if (el) el.open = true; // keep panel open
}
function clearFilter(scope, field) { var f = filterScope(scope); f[field] = []; renderTab(); }
function restoreFocus(id) {

}
function searchBox(scope, placeholder) {

}
function msDropdown(scope, field, label, options) {

  h += '<span class="ms-clear" onclick="clearFilter(\'' + scope + '\',\'' + field + '\')">✕ Clear ' + esc(label) + '</span>';

// True if deal passes a multi-select field filter (empty selection = pass all)

function normDealName(s) {
  return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
}
function buildSeedIndex() {
  var idx = {};
  SEED_DEALS.forEach(function(s) {
    var k = normDealName(s.dealName);
    if (k) idx[k] = s;
  });
  return idx;
}
// Two tokens "match" if equal, or one is a prefix of the other (≥4 chars) — so
// "info" ≈ "information", "sec" stays distinct from "security" (too short).
function tokMatch(x, y) {
  if (x === y) return true;
  if (x.length >= 4 && y.length >= 4 && (y.indexOf(x) === 0 || x.indexOf(y) === 0)) return true;
  return false;
}
// Returns true if a and b refer to the same deal, allowing for prefix differences
// like "Istari-Global (for Ball Corp) - " and word variants like Info/Information.
function nameSimilar(a, b) {
  var na = normDealName(a);
  var nb = normDealName(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  // Substring (one fully contains the other)
  if (na.length >= 8 && nb.indexOf(na) >= 0) return true;
  if (nb.length >= 8 && na.indexOf(nb) >= 0) return true;
  // Token overlap with prefix matching — ≥2 common, ≥66% of the shorter side
  var ta = na.split(' ').filter(function(t){ return t.length > 2; });
  var tb = nb.split(' ').filter(function(t){ return t.length > 2; });
  if (ta.length < 2 || tb.length < 2) return false;
  var common = 0;
  ta.forEach(function(x){ if (tb.some(function(y){ return tokMatch(x, y); })) common++; });
  var minLen = Math.min(ta.length, tb.length);
  return common >= 2 && (common / minLen >= 0.66);
}
// Client safeguard: prevents cross-client false matches. One of the client names must
// be a substring of the other (case-insensitive, normalized). E.g. "ISTARI" ⊂ "Istari-Global".
function clientSimilar(a, b) {
  var na = normDealName(a);
  var nb = normDealName(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  if (na.length >= 3 && nb.indexOf(na) >= 0) return true;
  if (nb.length >= 3 && na.indexOf(nb) >= 0) return true;
  return false;
}
// True if two deals are the same engagement. Names must be similar. The client check
// normally guards against cross-client false matches, BUT a strong name signal overrides
// it — handles cases like Excel client "Zilliant" vs Zoho account "Madison Dearborn
// Partners" where the deal is named "MDP – [Zilliant]".
function sameDeal(a, b) {
  if (!nameSimilar(a.dealName, b.dealName)) return false;
  var na = normDealName(a.dealName), nb = normDealName(b.dealName);
  var aTok = na.split(' ').filter(function(t){ return t.length > 2; });
  // Strong override 1: exact normalized deal name with ≥2 meaningful tokens
  if (na === nb && aTok.length >= 2) return true;
  // Strong override 2: one side's client name appears inside the other side's deal name
  var ca = normDealName(a.client), cb = normDealName(b.client);
  if (ca && ca.length >= 4 && nb.indexOf(ca) >= 0) return true;
  if (cb && cb.length >= 4 && na.indexOf(cb) >= 0) return true;
  // Default: require client similarity to avoid cross-client false positives
  if (a.client && b.client) return clientSimilar(a.client, b.client);
  return true;
}
// Reconcile Excel ghosts against the live Zoho deal list. A ghost (zohoId='') that
// matches a real Zoho deal (same name+client) is merged into it and dropped — so the
// row keeps Zoho's correct stage/owner/link plus the Excel HC/MRR/flags. Ghosts with
// no Zoho match are kept but flagged notInZoho so the data quality is transparent.
// Returns { kept: [...remaining ghosts...], merged, flagged }.
function reconcileGhosts(zohoDeals, ghosts) {
  var kept = [], merged = 0, flagged = 0;
  ghosts.forEach(function(g) {
    var match = null;
    for (var i = 0; i < zohoDeals.length; i++) {
      if (sameDeal(g, zohoDeals[i])) { match = zohoDeals[i]; break; }
    }
    if (match) { mergeSeedData(match, g); merged++; }
    else { g.notInZoho = true; g.inExcel = true; flagged++; kept.push(g); }
  });
  return { kept: kept, merged: merged, flagged: flagged };
}
// Similarity score 0–1 between two deals (compares dealName tokens; small boost if clients align).
function nameScore(a, b) {
  var na = normDealName(a && a.dealName), nb = normDealName(b && b.dealName);
  if (!na || !nb) return 0;
  var base;
  if (na === nb) base = 1;
  else {
    var ta = na.split(' ').filter(function(t){ return t.length > 2; });
    var tb = nb.split(' ').filter(function(t){ return t.length > 2; });
    if (!ta.length || !tb.length) return 0;
    var common = 0;
    ta.forEach(function(x){ if (tb.some(function(y){ return tokMatch(x, y); })) common++; });
    base = common / Math.max(ta.length, tb.length);
  }
  if (a && b && a.client && b.client && clientSimilar(a.client, b.client)) base = Math.min(1, base + 0.15);
  return base;
}
// Best matching Zoho deal for a ghost. Prefers deals in the SAME account (client similar),
// then the closest name within that account; falls back to global best name match.
function bestZohoCandidate(ghost, zohoDeals, deals) {
  var sameAcct = zohoDeals.filter(function(z){ return ghost.client && z.client && clientSimilar(ghost.client, z.client); });
  var pool = sameAcct.length ? sameAcct : zohoDeals;
  var best = null;
  pool.forEach(function(z) {
    var sc = nameScore(ghost, z);
    if (!best || sc > best.score) best = { deal: z, idx: deals.indexOf(z), score: sc, sameAccount: sameAcct.length > 0 };
  });
  return best;
}
// Every deal must have an owner. For deals with no BDE, inherit the majority owner
// among same-account siblings (deals whose client matches via clientSimilar).
function backfillOwners(deals) {
  var filled = 0;
  deals.forEach(function(d) {
    if (d.bde) return;
    if (!d.client) return;
    var counts = {};
    deals.forEach(function(o) {
      if (o.bde && o !== d && clientSimilar(d.client, o.client)) counts[o.bde] = (counts[o.bde] || 0) + 1;
    });
    var best = null, bestN = 0;
    Object.keys(counts).forEach(function(k) { if (counts[k] > bestN) { bestN = counts[k]; best = k; } });
    if (best) { d.bde = best; d.bdeInferred = true; filled++; }
  });
  return filled;
}
// Copies seed-only fields into a target deal where the target has gaps. Never overwrites real data.
function mergeSeedData(dst, src) {
  if ((!dst.mrrAureum || dst.mrrAureum <= 0) && src.mrrAureum > 0) dst.mrrAureum = src.mrrAureum;
  var dstHc = dst.monthlyHC || {};
  if (Object.keys(dstHc).length === 0 && src.monthlyHC && Object.keys(src.monthlyHC).length > 0) {
    dst.monthlyHC = JSON.parse(JSON.stringify(src.monthlyHC));
    dst.totalHC = sumMonths(dst.monthlyHC);
  }
  if (src.inForecast  && !dst.inForecast)  dst.inForecast  = true;
  if (src.isSuperDeal && !dst.isSuperDeal) dst.isSuperDeal = true;
  dst.inExcel = true;  // src always comes from Don's Excel seed/ghost
}
// Idempotent seed merge with smart name matching — called AFTER Firestore fetch.
// (1) Merges existing ghosts into matching Zoho deals (cleanup of v5 duplicates),
// (2) For each seed deal, finds a similar-named local deal and merges data into it,
//     or adds as ghost if no match. Local flag prevents re-runs in this browser.
function autoApplySeedOnce() {
  // v9: reconcile Excel ghosts against the live Zoho deals (improved fuzzy matching),
  // collapsing duplicates so each row reflects Zoho's stage/owner/link. Then re-backfill owners.
  if (!load('reconciled_v10', false)) {
    var dv = getDeals();
    var zoho = dv.filter(function(d){ return d.zohoId; });
    var ghosts = dv.filter(function(d){ return !d.zohoId; });
    var r = reconcileGhosts(zoho, ghosts);
    var all = zoho.concat(r.kept);
    backfillOwners(all);
    setDeals(all);
    save('reconciled_v10', true);
    console.log('Reconcile v10: ' + r.merged + ' ghosts merged into Zoho deals & removed, ' + r.flagged + ' kept & flagged not-in-Zoho.');
  }
  // Independent step: backfill owners on every load-once-per-version (runs even if v7 done)
  if (!load('owners_backfilled_v8', false)) {
    var dd = getDeals();
    var n = backfillOwners(dd);
    if (n > 0) setDeals(dd);
    save('owners_backfilled_v8', true);
    console.log('Owner backfill v8: ' + n + ' deals got an owner from account siblings.');
  }
  // v11: mark which deals are in Don's Excel (matched a seed deal, or are not-in-Zoho ghosts).
  if (!load('inexcel_flagged_v11', false)) {
    var de = getDeals();
    var changed = 0;
    de.forEach(function(d) {
      var inX = !d.zohoId; // ghosts came from Excel
      if (!inX) {
        for (var i = 0; i < SEED_DEALS.length; i++) { if (sameDeal(d, SEED_DEALS[i])) { inX = true; break; } }
      }
      if (d.inExcel !== inX) { d.inExcel = inX; changed++; }
    });
    if (changed > 0) setDeals(de);
    save('inexcel_flagged_v11', true);
    console.log('In-Excel flag v11: ' + de.filter(function(d){return d.inExcel;}).length + ' deals marked as in Don\'s Excel.');
  }
  if (load('seed_merged_v7', false)) return;
  var deals  = getDeals();
  var zohoDeals = deals.filter(function(d) { return d.zohoId; });
  var ghosts    = deals.filter(function(d) { return !d.zohoId; });

  // 1) Merge existing ghosts into matching Zoho deals (de-duplicate)
  var keepGhosts = [];
  var ghostsMerged = 0;
  ghosts.forEach(function(g) {
    var match = null;
    for (var i = 0; i < zohoDeals.length; i++) {
      if (sameDeal(g, zohoDeals[i])) { match = zohoDeals[i]; break; }
    }
    if (match) { mergeSeedData(match, g); ghostsMerged++; }
    else keepGhosts.push(g);
  });

  // 2) For each seed deal, find a local match (Zoho or kept ghost) via nameSimilar
  var localPool = zohoDeals.concat(keepGhosts);
  var seedApplied = 0, newGhosts = 0;
  SEED_DEALS.forEach(function(s) {
    var match = null;
    for (var i = 0; i < localPool.length; i++) {
      if (sameDeal(s, localPool[i])) { match = localPool[i]; break; }
    }
    if (match) { mergeSeedData(match, s); seedApplied++; }
    else {
      var copy = JSON.parse(JSON.stringify(s));
      copy.zohoId = '';
      copy.bde = '';
      copy.commercialDescription = '';
      keepGhosts.push(copy);
      localPool.push(copy);
      newGhosts++;
    }
  });

  var allMerged = zohoDeals.concat(keepGhosts);
  var ownersFilled = backfillOwners(allMerged);
  setDeals(allMerged);
  save('seed_merged_v7', true);
  console.log('Seed merge v7: ' + ghostsMerged + ' ghosts merged, ' + seedApplied + ' seed applied, ' + newGhosts + ' Excel-only ghosts, ' + ownersFilled + ' owners backfilled from account siblings.');
}
function sumMonths(hc) { return Object.values(hc || {}).reduce(function(s, v) { return s + (v || 0); }, 0); }
// Margin resolution (Michael's model):
//   1. Manual override (Don types it in the playground)
//   2. Zoho commercial-design target margin  ← HOOK: deal.zohoMargin (filled once the
//      Zoho margin field API name is wired into the sync). Today usually undefined.
//   3. Super-Deal rule (if flagged)
//   4. Stage standard margin
//   5. Default
function getMarginFor(deal) {
  if (deal.marginOverride !== undefined && deal.marginOverride !== null && deal.marginOverride !== '') return parseFloat(deal.marginOverride);
  if (deal.zohoMargin !== undefined && deal.zohoMargin !== null && deal.zohoMargin !== '' && parseFloat(deal.zohoMargin) > 0) return parseFloat(deal.zohoMargin);
  var rules = getMarginRules();
  if (isSuperDeal(deal)) { var r = rules.find(function(r){ return r.dealType === 'Aureum / Super-Deal'; }); if (r) return r.margin; }
  var match = rules.find(function(r) { return r.dealType === deal.stage; });
  if (match) return match.margin;
  var fb = rules.find(function(r) { return r.dealType === 'Default'; });
  return fb ? fb.margin : 0.35;
}
// True when a deal that SHOULD have a real target margin (Commercial Design+) is falling
// back to a stage default — i.e. neither a manual override nor a Zoho target margin is set.
function marginIsMissing(deal) {
  if (MARGIN_EXPECTED_STAGES.indexOf(deal.stage) < 0) return false;
  var hasManual = deal.marginOverride !== undefined && deal.marginOverride !== null && deal.marginOverride !== '';
  var hasZoho   = deal.zohoMargin !== undefined && deal.zohoMargin !== null && deal.zohoMargin !== '' && parseFloat(deal.zohoMargin) > 0;
  return !hasManual && !hasZoho;
}
function getWinRateFor(deal) {
  if (deal.winRateAdj !== undefined && deal.winRateAdj !== null && deal.winRateAdj !== '') return parseFloat(deal.winRateAdj);
  var rules = getMarginRules();
  var match = rules.find(function(r){ return r.dealType === deal.stage; });
  if (match && match.winRate !== undefined) return match.winRate;
  var s = STAGES.find(function(s){ return s.id === deal.stage; });
  return s ? s.winRate : 0.3;
}
function stagePill(stage) {
  var s = STAGES.find(function(s){ return s.id === stage; });
  var label = s ? s.label : stage;
  var cls = s ? s.cls : 'pill-gray';
  return '<span class="pill ' + cls + '">' + esc(label) + '</span>';
}
function statusPill(st) {
  var cls = STATUS_PILL[st] || 'pill-gray';
  return '<span class="pill ' + cls + '">' + esc(st) + '</span>';
}
function dealRevenueForMonth(deal, monthKey) {
  var hc = (deal.monthlyHC || {})[monthKey] || 0;
  return hc * (deal.pricing && deal.totalHC ? (deal.pricing / Math.max(1, sumMonths(deal.monthlyHC) || deal.totalHC)) : (deal.pricing || 0));
}
// Parse Zoho's Target_Margin_Band into a 0–1 margin. Handles a plain number (40 or 0.40),
// a range ("30-40%" → midpoint 0.35), or a single % ("35%" → 0.35). Returns null if no
// number can be found (e.g. a label like "High") so the stage default is used instead.
function parseMarginBand(val) {
  if (val === null || val === undefined || val === '') return null;
  var s = String(val);
  var nums = (s.match(/\d+(?:\.\d+)?/g) || []).map(parseFloat);
  if (!nums.length) return null;
  var v;
  if (nums.length >= 2) v = (nums[0] + nums[1]) / 2; // midpoint of a band
  else v = nums[0];
  if (v > 1) v = v / 100;          // 40 → 0.40
  if (v < 0 || v > 1) return null; // sanity
  return v;
}
// Effective deal total: MRR Zoho (pricing) wins when populated; otherwise MRR Aureum (Don's manual).
function effectivePricing(deal) {
  if (deal && deal.pricing && deal.pricing > 0) return deal.pricing;
  return (deal && deal.mrrAureum) || 0;
}
// Per-resource MRR per month: effective total / total HC in plan.
function pricePerHead(deal) {
  var totHc = sumMonths(deal.monthlyHC) || deal.totalHC;
  var p = effectivePricing(deal);
  if (totHc > 0 && p > 0) return p / totHc;
  return p || 0;
}
function projectedRevenue(deal, monthKey)  { return ((deal.monthlyHC || {})[monthKey] || 0) * pricePerHead(deal); }
function adjustedRevenue(deal, monthKey)   { return projectedRevenue(deal, monthKey) * getWinRateFor(deal); }
function marginDollarsAdj(deal, monthKey)  { return adjustedRevenue(deal, monthKey) * getMarginFor(deal); }

// SNAPSHOTS (for forecast accuracy)
// ─────────────────────────────────────────────────────────────────────────────
function ensureMonthlySnapshot() {
  var snaps = getSnapshots();
  var key = currentMonthKey();
  if (snaps.find(function(s){ return s.snapshotMonth === key; })) return;
  var deals = getDeals();
  var snap = { snapshotMonth: key, takenAt: new Date().toISOString(), perDeal: {} };
  deals.forEach(function(d) {
    snap.perDeal[d.dealName] = {
      hc:      { m0: (d.monthlyHC||{})[key] || 0, m1: (d.monthlyHC||{})[monthKeyAfter(key,1)] || 0, m2: (d.monthlyHC||{})[monthKeyAfter(key,2)] || 0 },
      rev:     { m0: projectedRevenue(d, key), m1: projectedRevenue(d, monthKeyAfter(key,1)), m2: projectedRevenue(d, monthKeyAfter(key,2)) },
      adjRev:  { m0: adjustedRevenue(d, key),  m1: adjustedRevenue(d, monthKeyAfter(key,1)),  m2: adjustedRevenue(d, monthKeyAfter(key,2)) },
      margin$: { m0: marginDollarsAdj(d, key), m1: marginDollarsAdj(d, monthKeyAfter(key,1)), m2: marginDollarsAdj(d, monthKeyAfter(key,2)) }
    };
  });
  snaps.push(snap);
  setSnapshots(snaps);
  logActivity('Forecast', 'Monthly snapshot', key + ' · ' + deals.length + ' deals');
}
// Compute accuracy bands: for each historical snapshot, compare its predictions for
// target month X (where X is one of the snapshot's M0/M1/M2 horizons) against the
// recorded actuals for X. Aggregate (mean ± std-dev) across all snapshots per horizon.
function computeAccuracyBands() {
  var snaps   = getSnapshots();
  var actuals = getActuals();
  var per     = { m0: [], m1: [], m2: [] };
  snaps.forEach(function(s) {
    ['m0','m1','m2'].forEach(function(h, i) {
      var targetMonth = monthKeyAfter(s.snapshotMonth, i);
      var act = actuals[targetMonth];
      if (!act) return;
      var fcastRev = Object.values(s.perDeal).reduce(function(t, p) { return t + (p.adjRev[h] || 0); }, 0);
      var actRev   = act.adjRev || 0;
      if (fcastRev <= 0 && actRev <= 0) return;
      var maxRev = Math.max(fcastRev, actRev, 1);
      var err = Math.abs(fcastRev - actRev) / maxRev;
      per[h].push({ snapshot: s.snapshotMonth, target: targetMonth, fcast: fcastRev, actual: actRev, errPct: err, accPct: 1 - err });
    });
  });
  function bandFor(arr, defaultAcc, defaultBand) {
    if (!arr.length) return { acc: defaultAcc, band: defaultBand, n: 0, isDefault: true };
    var mean = arr.reduce(function(t, x) { return t + x.accPct; }, 0) / arr.length;
    var sd = Math.sqrt(arr.reduce(function(t, x) { return t + Math.pow(x.accPct - mean, 2); }, 0) / arr.length);
    return { acc: mean, band: sd, n: arr.length, isDefault: false };
  }
  return {
    m0: bandFor(per.m0, 0.80, 0.05),
    m1: bandFor(per.m1, 0.75, 0.10),
    m2: bandFor(per.m2, 0.30, 0.20),
    history: per
  };
}

function renderOverview() {
  var deals    = getDeals();
  var anchor   = getAnchorMonth();
  var months   = [anchor, monthKeyAfter(anchor, 1), monthKeyAfter(anchor, 2)];
  var totals   = { hc: [0,0,0], proj: [0,0,0], adj: [0,0,0], margin$: [0,0,0] };
  deals.forEach(function(d) {
    months.forEach(function(m, i) {
      totals.hc[i]      += (d.monthlyHC || {})[m] || 0;
      totals.proj[i]    += projectedRevenue(d, m);
      totals.adj[i]     += adjustedRevenue(d, m);
      totals.margin$[i] += marginDollarsAdj(d, m);
    });
  });
  var totalAdj      = totals.adj.reduce(function(s,v){ return s + v; }, 0);
  var totalMargin   = totals.margin$.reduce(function(s,v){ return s + v; }, 0);
  var totalHc       = totals.hc.reduce(function(s,v){ return s + v; }, 0);
  var totalDeals    = deals.length;
  var pipelineDeals = deals.filter(function(d){ return /Pipeline|SQL|Commercial|Recruit|Pricing|Paper|Services/.test(d.stage + ' ' + d.status); }).length;
  var aureumDeals   = deals.filter(isSuperDeal).length;
  var bands         = computeAccuracyBands();

  var html = '';
  html += '<div class="page-title"><div><h1>Overview</h1><div class="sub">Anchor month: <b>' + monthLabel(anchor) + '</b> &middot; Rolling 3-month window</div></div>';
  html += '<div style="display:flex;gap:8px;align-items:center"><label style="font-size:11px;color:var(--muted)">Anchor:</label>' + anchorSelectHtml() + '</div></div>';

  html += '<div class="stat-grid">';
  html += statCard('Total Deals',     totalDeals,                   pipelineDeals + ' in pipeline · ' + aureumDeals + ' super-deals', 'gold');
  html += statCard('Forecasted HC (3mo)', totalHc,                   monthLabel(months[0]) + ' → ' + monthLabel(months[2]), 'aureum');
  html += statCard('Adj. Revenue (3mo)',  fmt$k(totalAdj),           'Win-rate-adjusted', 'good');
  html += statCard('Margin $ (3mo)',      fmt$k(totalMargin),        'Adjusted × Margin %', 'good');
  html += '</div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Rolling 3-Month Window</span><span class="card-sub">' + monthLabel(months[0]) + ' &middot; ' + monthLabel(months[1]) + ' &middot; ' + monthLabel(months[2]) + '</span></div>';
  html += '<table><thead><tr><th>Metric</th><th class="num">' + monthLabel(months[0]) + '</th><th class="num">' + monthLabel(months[1]) + '</th><th class="num">' + monthLabel(months[2]) + '</th><th class="num">3-mo Total</th></tr></thead><tbody>';
  html += '<tr><td>Forecasted Headcount</td>' + totals.hc.map(function(v){ return '<td class="num num-bold">' + v + '</td>'; }).join('') + '<td class="num num-bold">' + totalHc + '</td></tr>';
  html += '<tr><td>Projected Revenue</td>'   + totals.proj.map(function(v){ return '<td class="num">' + fmt$k(v) + '</td>'; }).join('') + '<td class="num num-bold">' + fmt$k(totals.proj.reduce(function(s,v){return s+v;},0)) + '</td></tr>';
  html += '<tr><td>Adj. Revenue (× win rate)</td>' + totals.adj.map(function(v){ return '<td class="num">' + fmt$k(v) + '</td>'; }).join('') + '<td class="num num-bold">' + fmt$k(totalAdj) + '</td></tr>';
  html += '<tr><td>Margin $ (× margin %)</td>' + totals.margin$.map(function(v){ return '<td class="num">' + fmt$k(v) + '</td>'; }).join('') + '<td class="num num-bold">' + fmt$k(totalMargin) + '</td></tr>';
  html += '</tbody></table></div>';

  html += '<div class="card"><div class="card-header"><span class="card-title">Forecast Reliability by Horizon</span><span class="card-sub">' + (bands.m0.isDefault ? 'Default values — accumulates as snapshots build up' : 'Computed from ' + bands.m0.n + '/' + bands.m1.n + '/' + bands.m2.n + ' historical snapshots') + '</span></div>';
  html += '<div class="acc-bands">';
  html += accCard('m0', 'Current Month (M0)', bands.m0);
  html += accCard('m1', '+1 Month (M+1)',     bands.m1);
  html += accCard('m2', '+2 Months (M+2)',    bands.m2);
  html += '</div></div>';

  document.getElementById('mainContent').innerHTML = html;
}

function updateDealHC(idx, monthKey, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  d.monthlyHC = d.monthlyHC || {};
  var oldV = d.monthlyHC[monthKey] || 0;
  var v = parseInt(value);
  if (!v || isNaN(v) || v <= 0) delete d.monthlyHC[monthKey];
  else d.monthlyHC[monthKey] = v;
  d.totalHC = sumMonths(d.monthlyHC);
  setDeals(deals);
  logActivity('Forecast', 'Edit HC', d.dealName + ' · ' + monthKey + ': ' + oldV + ' → ' + (d.monthlyHC[monthKey] || 0));
}
function updateDealField(idx, field, value) {
  var deals = getDeals();
  var d = deals[idx]; if (!d) return;
  var oldV = d[field];
  d[field] = value === '' || isNaN(parseFloat(value)) ? '' : parseFloat(value);
  setDeals(deals);
  var labels = { mrrAureum: 'MRR Aureum', winRateAdj: 'Win %', marginOverride: 'Margin %' };
  var label = labels[field] || field;
  var fmtVal = function(v){
    if (v === '' || v === undefined || v === null) return '—';
    if (field === 'winRateAdj' || field === 'marginOverride') return Math.round(v * 100) + '%';
    return v;
  };
  logActivity('Forecast', 'Edit ' + label, d.dealName + ': ' + fmtVal(oldV) + ' → ' + fmtVal(d[field]));
}

function saveDeal(idx) {

// ISO-week key: yyyy-Www. Snapshots are deduped on this key so multiple opens
// on the same week produce only one entry; weekly cadence aligns with Monday.
function weekKeyFromDate(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  var weekNum = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return date.getUTCFullYear() + '-W' + ('0' + weekNum).slice(-2);
}
function currentWeekKey() { return weekKeyFromDate(new Date()); }
function mondayOfWeekKey(weekKey) {
  var parts = weekKey.split('-W');
  var year = parseInt(parts[0], 10);
  var week = parseInt(parts[1], 10);
  var jan4 = new Date(Date.UTC(year, 0, 4));
  var jan4Day = jan4.getUTCDay() || 7;
  var mondayW1 = new Date(jan4); mondayW1.setUTCDate(jan4.getUTCDate() - (jan4Day - 1));
  var monday = new Date(mondayW1); monday.setUTCDate(mondayW1.getUTCDate() + (week - 1) * 7);
  return monday;
}
function weekShortLabel(weekKey) {
  var m = mondayOfWeekKey(weekKey);
  return m.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Snapshot shape: {weekKey, takenAt, takenBy, anchorMonth, dealsForecasted, totalHC, totalAdjRev, isDemo}
function computeTrendTotalsNow() {
  var deals  = getDeals();
  var anchor = getAnchorMonth();
  var months = [anchor, monthKeyAfter(anchor, 1), monthKeyAfter(anchor, 2)];
  var totHC = 0, totAdj = 0, count = 0;
  deals.forEach(function(d) {
    if (!d.inForecast) return;
    count++;
    months.forEach(function(mk) {
      totHC  += (d.monthlyHC || {})[mk] || 0;
      totAdj += adjustedRevenue(d, mk);
    });
  });
  return { dealsForecasted: count, totalHC: totHC, totalAdjRev: totAdj, anchorMonth: anchor };
}
function ensureWeeklyTrendSnapshot() {
  var snaps = getTrendSnapshots();
  var key   = currentWeekKey();
  if (snaps.find(function(s){ return s.weekKey === key && !s.isDemo; })) return;
  // Replace any demo snapshot at the current week with the real one.
  snaps = snaps.filter(function(s){ return s.weekKey !== key; });
  var t = computeTrendTotalsNow();
  snaps.push({
    weekKey: key,
    takenAt: new Date().toISOString(),
    takenBy: (currentUser && currentUser.email) || 'auto',
    anchorMonth: t.anchorMonth,
    dealsForecasted: t.dealsForecasted,
    totalHC: t.totalHC,
    totalAdjRev: t.totalAdjRev,
    isDemo: false
  });
  // Keep ordered by weekKey for deterministic rendering.
  snaps.sort(function(a,b){ return a.weekKey < b.weekKey ? -1 : a.weekKey > b.weekKey ? 1 : 0; });
  setTrendSnapshots(snaps);
  logActivity('Forecast', 'Weekly trend snapshot', key + ' · ' + t.dealsForecasted + ' deals · ' + t.totalHC + ' HC');
}
function forceTrendSnapshot() {
  var snaps = getTrendSnapshots();
  snaps = snaps.filter(function(s){ return s.weekKey !== currentWeekKey() || s.isDemo; });
  setTrendSnapshots(snaps);

function seedDemoTrendSnapshotsIfEmpty() {
  // One-time: seed 5 historical weeks + this week of demo points so Michael's first
  // visit shows a meaningful curve. Honestly labeled: every point carries isDemo:true.
  if (load('demo_trend_seeded_v1', false)) return;
  save('demo_trend_seeded_v1', true);  // local-only flag; not synced
  var existing = getTrendSnapshots();
  if (existing.length > 0) return;     // never overwrite real history
  var now = computeTrendTotalsNow();
  if (now.dealsForecasted === 0 && now.totalHC === 0) return; // no baseline yet
  // Multipliers chosen to show a realistic upward trajectory with a mild dip — not flat.
  var dealsScale = [0.78, 0.83, 0.91, 0.96, 0.93, 1.00];
  var hcScale    = [0.82, 0.85, 0.89, 0.92, 0.97, 1.00];
  var mrrScale   = [0.74, 0.80, 0.88, 0.94, 0.96, 1.00];
  var thisMonday = mondayOfWeekKey(currentWeekKey());
  var demos = [];
  for (var i = 5; i >= 0; i--) {
    var d = new Date(thisMonday); d.setUTCDate(thisMonday.getUTCDate() - i * 7);
    var wk = weekKeyFromDate(d);
    var idx = 5 - i;
    demos.push({
      weekKey: wk,
      takenAt: d.toISOString(),
      takenBy: 'demo-baseline',
      anchorMonth: now.anchorMonth,
      dealsForecasted: Math.round(now.dealsForecasted * dealsScale[idx]),
      totalHC:         Math.round(now.totalHC         * hcScale[idx]),
      totalAdjRev:     Math.round(now.totalAdjRev     * mrrScale[idx]),
      isDemo: true
    });
  }
  setTrendSnapshots(demos);
}

// Toggle granularity is rendered client-side; not persisted.
var trendGranularity = 'weekly';
function setTrendGranularity(g) { trendGranularity = g; renderTab(); }

function aggregateTrendByGranularity(snaps, granularity) {
  // Snapshots come in week order. For 'monthly' we keep the LAST snapshot of each
  // month; for 'quarterly' the last of each Q. 'weekly' keeps the last ~12 entries.
  if (granularity === 'weekly') {
    return snaps.slice(-12);
  }
  function bucketKey(s) {
    var m = mondayOfWeekKey(s.weekKey);
    var y = m.getUTCFullYear();
    var mo = m.getUTCMonth();
    if (granularity === 'monthly') return y + '-' + ('0' + (mo + 1)).slice(-2);
    var q = Math.floor(mo / 3) + 1;
    return y + '-Q' + q;
  }
  var buckets = {};
  snaps.forEach(function(s) { buckets[bucketKey(s)] = s; });
  var keys = Object.keys(buckets).sort();
  if (granularity === 'monthly') keys = keys.slice(-6);
  else                            keys = keys.slice(-4);
  return keys.map(function(k){ return buckets[k]; });
}
function trendXAxisLabel(s, granularity) {
  if (granularity === 'weekly') return weekShortLabel(s.weekKey);
  var m = mondayOfWeekKey(s.weekKey);
  if (granularity === 'monthly') return m.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
  var q = Math.floor(m.getUTCMonth() / 3) + 1;
  return 'Q' + q + ' ' + String(m.getUTCFullYear()).slice(-2);
}

var _trendChartInstances = {};
function renderTrendCharts(points) {
  if (typeof Chart === 'undefined') return;
  Object.keys(_trendChartInstances).forEach(function(k) {
    try { _trendChartInstances[k].destroy(); } catch(e) {}
  });
  _trendChartInstances = {};
  var labels = points.map(function(s){ return trendXAxisLabel(s, trendGranularity); });
  var navy   = '#0A1928';
  var gold   = '#E8B84B';
  var baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
    interaction: { mode: 'nearest', intersect: false },
    scales: {
      x: { grid: { display: false }, ticks: { font: { family: 'Roboto', size: 11 }, color: '#5a6a7a' } },
      y: { beginAtZero: true, grid: { color: '#eef2f6' }, ticks: { font: { family: 'Roboto', size: 11 }, color: '#5a6a7a' } }
    }
  };
  function mkChart(canvasId, data, color, fmtFn) {
    var ctx = document.getElementById(canvasId);
    if (!ctx) return;
    var opts = JSON.parse(JSON.stringify(baseOpts));
    if (fmtFn) {
      opts.scales.y.ticks.callback = function(v){ return fmtFn(v); };
      opts.plugins.tooltip.callbacks = { label: function(ctx2){ return fmtFn(ctx2.parsed.y); } };
    }
    _trendChartInstances[canvasId] = new Chart(ctx, {
      type: 'line',
      data: { labels: labels, datasets: [{
        data: data, borderColor: color, backgroundColor: color + '22',
        borderWidth: 2.5, tension: 0.28, fill: true, pointRadius: 4, pointBackgroundColor: color,
        pointHoverRadius: 6
      }]},
      options: opts
    });
  }
  mkChart('trendChartDeals', points.map(function(s){ return s.dealsForecasted; }), navy);
  mkChart('trendChartHC',    points.map(function(s){ return s.totalHC; }),         navy);
  mkChart('trendChartMRR',   points.map(function(s){ return s.totalAdjRev; }),     gold, function(v){ return fmt$k(v); });
}

function superSelect(progIdx, field) {
  var progs = getSuperPrograms();
  var cur = (progs[progIdx] || {})[field] || '';
  var opts = SUPER_OPTIONS[field] || [];
  var pillMap = SUPER_PILL[field];
  var cls = pillMap && pillMap[cur] ? pillMap[cur] : '';
  var bg = cls === 'pill-green' ? '#E8F5E9' : cls === 'pill-gold' ? '#FFF8E1' : cls === 'pill-red' ? '#FDECEA' : 'white';
  var h = '<select onchange="updateSuperProgram(' + progIdx + ', \'' + field + '\', this.value)" style="width:100%;min-width:90px;padding:4px 6px;font-size:10.5px;border:1px solid var(--border);border-radius:4px;font-family:inherit;background:' + bg + ';cursor:pointer">';
  if (opts.indexOf(cur) < 0 && cur) h += '<option value="' + esc(cur) + '" selected>' + esc(cur) + '</option>';
  opts.forEach(function(o) { h += '<option value="' + esc(o) + '"' + (o === cur ? ' selected' : '') + '>' + esc(o) + '</option>'; });
  h += '</select>';
  return h;
}

function saveSuperProgram(idx) {
  var progs = getSuperPrograms();
  var p = idx === null ? {} : progs[idx];
  p.client     = document.getElementById('sp_client').value.trim();
  p.activation = document.getElementById('sp_activation').value.trim();
  p.peakHC     = parseFloat(document.getElementById('sp_peak').value) || 0;
  p.phase1     = parseFloat(document.getElementById('sp_phase1').value) || 0;
  p.notes      = document.getElementById('sp_notes').value;

    SUPER_OPTIONS && Object.keys(SUPER_OPTIONS).forEach(function(f){ if (p[f] === undefined) p[f] = ''; });

function deleteSuperProgram(idx) {
  if (!confirm('Delete this super-deal program?')) return;

  closeModal();
  renderSuperDeals();
}

function renderFulfillmentView() {
  var deals = getDeals();
  var anchor = getAnchorMonth();
  var months = [];
  var idx = ALL_MONTHS.indexOf(anchor); if (idx < 0) idx = 0;
  for (var i = 0; i < 9 && idx + i < ALL_MONTHS.length; i++) months.push(ALL_MONTHS[idx + i]);
  var bdes = uniqueBdes(deals);
  function passF(d) {
    if (!passSearch('fulfill', (d.dealName || '') + ' ' + (d.client || '') + ' ' + (d.bde || ''))) return false;
    if (!passMulti('fulfill', 'bde', d.bde)) return false;
    return true;
  }
  var html = '';
  html += '<div class="page-title"><div><h1>Fulfillment View (Active Roles + Super-Deals)</h1><div class="sub">Headcount by deal-type for delivery / recruiting prioritization</div></div>';

  function fulfillTable(filter, title, isSuper) {
    var rows = deals.filter(function(d){ return filter(d) && passF(d); });
    var hcTot = months.map(function(){ return 0; });
    var h = '<div class="card"><div class="card-header"><span class="card-title">' + title + '</span><span class="card-sub">' + rows.length + ' deals</span></div>';
    h += '<div class="scroll-x"><table class="grid-tbl"><thead><tr><th>Client</th><th>Deal</th><th>Stage</th>';

    h += '<th class="num">Total</th></tr></thead><tbody>';
    rows.forEach(function(d) {
      h += '<tr' + (isSuper ? ' class="row-super"' : '') + '><td>' + esc(d.client) + '</td><td><b>' + esc(d.dealName) + '</b></td><td>' + stagePill(d.stage) + '</td>';
      var tot = 0;
      months.forEach(function(m, i) {

      });

  html += fulfillTable(function(d){ return !isSuperDeal(d) && /Closed Won|Active|Expanding|Recruit|Paper|Pricing/.test(d.status + ' ' + d.stage); }, 'Active Roles (non-Super)', false);

  document.getElementById('mainContent').innerHTML = html;
}

function renderMRRForecast() {
  var deals = getDeals();
  var html = '';
  html += '<div class="page-title"><div><h1>MRR Forecast 2026</h1><div class="sub">Monthly Recurring Revenue projection · adjusted by win rate</div></div></div>';
  html += '<div class="toolbar">' + searchBox('mrr', 'Search client…') + '</div>';
  var months = ALL_MONTHS;
  // Group by client (search filters by client name)
  var byClient = {};
  deals.forEach(function(d) { if (!passSearch('mrr', d.client || '')) return; if (!byClient[d.client]) byClient[d.client] = []; byClient[d.client].push(d); });
  var clients = Object.keys(byClient).sort();
  var html2 = '<div class="card" style="padding:6px"><div class="scroll-x"><table class="grid-tbl"><thead><tr><th>Client</th>';
  months.forEach(function(m){ html2 += '<th class="num">' + monthLabel(m) + '</th>'; });
  html2 += '<th class="num">Total Adj.</th></tr></thead><tbody>';
  var grand = months.map(function(){ return 0; });
  clients.forEach(function(c) {
    var sums = months.map(function(){ return 0; });
    byClient[c].forEach(function(d) {
      months.forEach(function(m, i){
        sums[i] += adjustedRevenue(d, m);
      });
    });
    var tot = sums.reduce(function(s,v){ return s + v; }, 0);
    if (tot < 1) return;
    html2 += '<tr><td>' + esc(c) + '</td>';
    sums.forEach(function(v, i){ grand[i] += v; html2 += '<td class="num">' + (v ? fmt$k(v) : '—') + '</td>'; });
    html2 += '<td class="num num-bold">' + fmt$k(tot) + '</td></tr>';
  });
  html2 += '<tr style="background:var(--navy);color:white;font-weight:700"><td style="color:white">TOTAL</td>';
  grand.forEach(function(v){ html2 += '<td class="num" style="color:white">' + fmt$k(v) + '</td>'; });
  html2 += '<td class="num" style="color:var(--gold)">' + fmt$k(grand.reduce(function(s,v){return s+v;},0)) + '</td></tr>';
  html2 += '</tbody></table></div></div>';
  html += html2;
  document.getElementById('mainContent').innerHTML = html;
}
